<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oriontec VP | Luxury Real Estate</title>
    <style>
        /* Luxury Glassmorphism Theme */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        /* Nav & Glass Effect */
        .glass {
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        nav {
            display: flex;
            justify-content: space-between;
            padding: 20px 50px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer; /* Hidden Admin Trigger */
            user-select: none;
        }

        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        /* Chat Widget */
        #chat-widget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 350px;
            height: 450px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 1000;
            transform: translateY(150%);
            transition: transform 0.3s ease;
        }

        #chat-widget.active {
            transform: translateY(0);
        }

        .chat-header {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 15px 15px 0 0;
        }

        .close-btn {
            cursor: pointer;
            font-size: 20px;
        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 80%;
            font-size: 14px;
        }

        .msg.user {
            background: rgba(255, 255, 255, 0.2);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .msg.admin {
            background: rgba(212, 175, 55, 0.6); /* Gold tint */
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .chat-input {
            display: flex;
            padding: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            background: rgba(0, 0, 0, 0.4);
            border-radius: 0 0 15px 15px;
        }

        .chat-input input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            outline: none;
            padding: 5px;
        }

        .chat-input input::placeholder {
            color: rgba(255,255,255,0.6);
        }

        .chat-input button {
            background: #d4af37;
            color: #000;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Floating Button */
        #chat-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #d4af37;
            color: #000;
            border: none;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 999;
        }

        /* Admin Mode Indicator */
        #admin-badge {
            display: none;
            background: red;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 10px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <nav class="glass">
        <!-- Hidden Admin Trigger: Click Logo 5 Times -->
        <div class="logo" id="logo-trigger">ORIONTEC VP <span id="admin-badge">ADMIN</span></div>
        <div class="links">
            Home | Properties | Contact
        </div>
    </nav>

    <div class="hero">
        <h1>Elevate Your Vision</h1>
        <p>Luxury architecture and glass facades for the modern era.</p>
    </div>

    <!-- Floating Action Button -->
    <button id="chat-toggle">💬</button>

    <!-- Chat Interface -->
    <div id="chat-widget" class="glass">
        <div class="chat-header">
            <span>VP Office Support</span>
            <span class="close-btn" id="close-chat">×</span>
        </div>
        <div class="chat-messages" id="chat-box">
            <!-- Messages will load here -->
        </div>
        <div class="chat-input">
            <input type="text" id="msg-input" placeholder="Type a message...">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <!-- Firebase SDK (Modern v10 ES Modules) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // Your Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyC30TcmMVhP_8HdFYS1WufRiZwSDYNMTF0",
            authDomain: "pulse2-92372.firebaseapp.com",
            databaseURL: "https://pulse2-92372-default-rtdb.firebaseio.com",
            projectId: "pulse2-92372",
            storageBucket: "pulse2-92372.firebasestorage.app",
            messagingSenderId: "276235725177",
            appId: "1:276235725177:web:0f4e0789fae80a435927a8"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, 'oriontec_vp_chats');

        // State Variables
        let isAdmin = false;
        let clickCount = 0;

        // UI Elements
        const chatWidget = document.getElementById('chat-widget');
        const chatToggle = document.getElementById('chat-toggle');
        const closeChat = document.getElementById('close-chat');
        const msgInput = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');
        const chatBox = document.getElementById('chat-box');
        const logoTrigger = document.getElementById('logo-trigger');
        const adminBadge = document.getElementById('admin-badge');

        // Toggle Chat
        chatToggle.addEventListener('click', () => {
            chatWidget.classList.add('active');
            chatToggle.style.display = 'none';
        });

        closeChat.addEventListener('click', () => {
            chatWidget.classList.remove('active');
            chatToggle.style.display = 'block';
        });

        // Hidden Admin Login Logic (Click logo 5 times)
        logoTrigger.addEventListener('click', () => {
            clickCount++;
            if (clickCount === 5) {
                const pwd = prompt("Enter VP Admin Password:");
                if (pwd === "sharan123") { // <-- You can change this password
                    isAdmin = true;
                    adminBadge.style.display = 'inline-block';
                    document.querySelector('.chat-header span').innerText = "VP Office (Admin Mode)";
                    alert("Admin Access Granted! Your replies will now show as Admin.");
                }
                clickCount = 0;
            }
            // Reset counter after 2 seconds to avoid accidental triggers
            setTimeout(() => { clickCount = 0; }, 2000);
        });

        // Send Message
        const sendMessage = () => {
            const text = msgInput.value.trim();
            if (text === "") return;

            const senderType = isAdmin ? 'admin' : 'user';

            push(chatRef, {
                text: text,
                sender: senderType,
                timestamp: Date.now()
            });

            msgInput.value = "";
        };

        sendBtn.addEventListener('click', sendMessage);
        msgInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Listen for New Messages
        onChildAdded(chatRef, (snapshot) => {
            const data = snapshot.val();
            const msgDiv = document.createElement('div');
            
            // If the message is from admin, give it admin styling, else user styling
            msgDiv.className = `msg ${data.sender === 'admin' ? 'admin' : 'user'}`;
            msgDiv.innerText = data.text;
            
            chatBox.appendChild(msgDiv);
            
            // Auto-scroll to bottom
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>
</html>

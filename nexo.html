<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXO - Join the Conversation</title>
    <style>
        /* CSS: Liquid Glass Theme & Layout */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            /* Cool animated gradient background to make the glass pop */
            background: linear-gradient(45deg, #0f2027, #203a43, #2c5364);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        /* LIQUID GLASS EFFECT */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        /* Profile Section */
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.3);
            margin-bottom: 15px;
        }

        input[type="file"], input[type="text"] {
            width: 100%;
            margin-bottom: 10px;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px;
            border-radius: 8px;
        }

        /* Post NEX Section */
        textarea {
            width: 100%;
            height: 100px;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 15px;
            border-radius: 12px;
            resize: none;
            font-size: 16px;
        }

        textarea:focus {
            outline: none;
            border-color: #00d2ff;
        }

        .post-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        #charCount {
            font-size: 12px;
            color: #aaa;
        }

        button {
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        /* Feed Section */
        .feed-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .nexo-post {
            display: flex;
            gap: 15px;
        }

        .nexo-post img.post-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }

        .nexo-header {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .verified-tick {
            width: 16px;
            height: 16px;
        }

        .hashtag { color: #00d2ff; }
        .mention { color: #fdf500; }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <h1 style="text-align: center; margin-bottom: 30px; letter-spacing: 2px;">NEXO</h1>

    <div class="container">
        <div class="glass-card">
            <h3>My Profile</h3>
            <div style="text-align: center; margin-top: 15px;">
                <img id="profilePreview" class="profile-img" src="https://via.placeholder.com/100" alt="Profile">
                <input type="file" id="imageInput" accept="image/*">
                
                <div class="nexo-header" style="justify-content: center;">
                    <span id="displayUsername">Current User</span>
                    <img src="https://aryasongs.github.io/Pulse/verified-account.png" class="verified-tick" id="profileVerifiedTick" style="display:none;" alt="Verified">
                </div>
                
                <input type="text" id="bioInput" placeholder="Update Bio...">
                <button onclick="saveProfile()" style="width: 100%; margin-top: 10px;">Save Profile</button>
            </div>
        </div>

        <div>
            <div class="glass-card">
                <textarea id="nexInput" maxlength="700" placeholder="What's happening? Drop a NEX..."></textarea>
                <div class="post-controls">
                    <span id="charCount">0 / 700</span>
                    <button id="postBtn">Post NEX</button>
                </div>
            </div>

            <div class="feed-container" id="feedContainer">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Your Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyC30TcmMVhP_8HdFYS1WufRiZwSDYNMTF0",
            authDomain: "pulse2-92372.firebaseapp.com",
            databaseURL: "https://pulse2-92372-default-rtdb.firebaseio.com",
            projectId: "pulse2-92372",
            storageBucket: "pulse2-92372.firebasestorage.app",
            messagingSenderId: "276235725177",
            appId: "1:276235725177:web:0f4e0789fae80a435927a8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- MOCK USER STATE (Replace with Firebase Auth later) ---
        let currentUser = {
            username: "@AdminNexo",
            profilePicBase64: "https://via.placeholder.com/100",
            isVerified: true // Set to true to show the tick!
        };

        // --- UI Setup based on User ---
        document.getElementById('displayUsername').innerText = currentUser.username;
        document.getElementById('profilePreview').src = currentUser.profilePicBase64;
        if(currentUser.isVerified) {
            document.getElementById('profileVerifiedTick').style.display = "inline-block";
        }

        // --- BASE64 IMAGE UPLOAD LOGIC ---
        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onloadend = function() {
                currentUser.profilePicBase64 = reader.result;
                document.getElementById('profilePreview').src = reader.result;
            }
            if (file) reader.readAsDataURL(file);
        });

        window.saveProfile = function() {
            const bio = document.getElementById('bioInput').value;
            alert("Profile Saved! (In a real app, this saves to Firestore 'users' collection)");
        }

        // --- NEX (TWEET) LOGIC ---
        const nexInput = document.getElementById('nexInput');
        const charCount = document.getElementById('charCount');

        nexInput.addEventListener('input', () => {
            charCount.innerText = `${nexInput.value.length} / 700`;
            if(nexInput.value.length >= 700) charCount.style.color = "red";
            else charCount.style.color = "#aaa";
        });

        document.getElementById('postBtn').addEventListener('click', async () => {
            const content = nexInput.value;
            if(content.trim() === "") return;

            // Highlight hashtags and mentions logic can be done on render, 
            // but we save the raw text to DB
            try {
                await addDoc(collection(db, "nexos"), {
                    username: currentUser.username,
                    profilePic: currentUser.profilePicBase64,
                    isVerified: currentUser.isVerified,
                    content: content,
                    timestamp: serverTimestamp()
                });
                nexInput.value = "";
                charCount.innerText = "0 / 700";
            } catch (e) {
                console.error("Error adding document: ", e);
                alert("Error posting NEX");
            }
        });

        // --- REAL-TIME FEED LOGIC ---
        const feedContainer = document.getElementById('feedContainer');
        const q = query(collection(db, "nexos"), orderBy("timestamp", "desc"));

        onSnapshot(q, (snapshot) => {
            feedContainer.innerHTML = ""; // Clear feed
            snapshot.forEach((doc) => {
                const nex = doc.data();
                
                // Format text to highlight #hashtags and @mentions
                let formattedContent = nex.content
                    .replace(/(#[a-z\d-]+)/ig, "<span class='hashtag'>$1</span>")
                    .replace(/(@[a-z\d-]+)/ig, "<span class='mention'>$1</span>");

                // Render the custom verified tick if user is verified
                const verifiedHtml = nex.isVerified 
                    ? `<img src="https://aryasongs.github.io/Pulse/verified-account.png" class="verified-tick" alt="Verified">` 
                    : "";

                const nexElement = document.createElement('div');
                nexElement.className = "glass-card nexo-post";
                nexElement.innerHTML = `
                    <img src="${nex.profilePic || 'https://via.placeholder.com/50'}" class="post-avatar">
                    <div>
                        <div class="nexo-header">
                            ${nex.username} ${verifiedHtml}
                        </div>
                        <p style="word-wrap: break-word;">${formattedContent}</p>
                    </div>
                `;
                feedContainer.appendChild(nexElement);
            });
        });
    </script>
</body>
</html>

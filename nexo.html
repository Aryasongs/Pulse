<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXO</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:radial-gradient(circle at top,#172554,#020617 55%);
  color:white;
}
.app{
  max-width:1200px;
  margin:auto;
  display:grid;
  grid-template-columns:240px 1fr 320px;
  gap:18px;
  padding:18px;
}
.glass{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.18);
  backdrop-filter:blur(22px);
  border-radius:24px;
  box-shadow:0 20px 60px rgba(0,0,0,.35);
}
.sidebar,.rightbar{padding:20px;height:calc(100vh - 36px);position:sticky;top:18px}
.logo{font-size:32px;font-weight:900}
.nav button,.auth button,.compose button,.profile button{
  width:100%;padding:14px;margin:8px 0;border:0;border-radius:18px;
  background:rgba(255,255,255,.12);color:white;font-weight:800;cursor:pointer
}
.nav button:hover,.compose button:hover{background:#1d9bf0}
.main{min-height:100vh}
.auth,.compose,.tweet,.profile{padding:18px;margin-bottom:16px}
input,textarea{
  width:100%;padding:14px;border-radius:16px;border:1px solid rgba(255,255,255,.16);
  background:rgba(255,255,255,.08);color:white;margin:8px 0;outline:none
}
textarea{resize:none;height:120px}
.row{display:flex;gap:12px;align-items:center}
.avatar{width:48px;height:48px;border-radius:50%;object-fit:cover;background:#334155}
.banner{width:100%;height:130px;border-radius:20px;object-fit:cover;background:#1e293b}
.name{font-weight:900}
.handle{color:#94a3b8;font-size:14px}
.verified{width:18px;height:18px;vertical-align:middle;margin-left:4px}
.tweet-text{white-space:pre-wrap;line-height:1.45}
.actions{display:flex;justify-content:space-between;margin-top:14px;color:#cbd5e1}
.actions button{
  background:transparent;border:0;color:#cbd5e1;font-weight:800;cursor:pointer
}
.tag,.hash{color:#38bdf8;font-weight:800}
.small{font-size:13px;color:#94a3b8}
.hidden{display:none}
@media(max-width:900px){
  .app{grid-template-columns:1fr}
  .sidebar,.rightbar{position:relative;height:auto}
}
</style>
</head>

<body>

<div class="app">

  <aside class="sidebar glass">
    <div class="logo">NEXO</div>
    <p class="small">Own your voice. Post your NEX.</p>
    <div class="nav">
      <button onclick="showHome()">Home</button>
      <button onclick="showProfile()">My Profile</button>
      <button onclick="logout()">Logout</button>
    </div>
  </aside>

  <main class="main">

    <section id="authBox" class="auth glass">
      <h2>Login / Create Account</h2>
      <input id="email" type="email" placeholder="Email">
      <input id="password" type="password" placeholder="Password">
      <button onclick="login()">Login</button>
      <button onclick="signup()">Create Account</button>
    </section>

    <section id="composeBox" class="compose glass hidden">
      <h2>Create NEX</h2>
      <textarea id="nexText" maxlength="700" placeholder="What's happening on NEXO? Use #hashtags or @username"></textarea>
      <div class="row">
        <span id="count">0/700</span>
        <button onclick="postNex()">Post NEX</button>
      </div>
    </section>

    <section id="profileBox" class="profile glass hidden">
      <h2>Edit Profile</h2>
      <img id="bannerPreview" class="banner">
      <input id="displayName" placeholder="Display name">
      <input id="username" placeholder="Username without @">
      <textarea id="bio" placeholder="Bio"></textarea>

      <label>Profile Image</label>
      <input type="file" id="avatarFile" accept="image/*">

      <label>Banner Image</label>
      <input type="file" id="bannerFile" accept="image/*">

      <button onclick="saveProfile()">Save Profile</button>
    </section>

    <section id="feed"></section>

  </main>

  <aside class="rightbar glass">
    <h3>Trending</h3>
    <div id="trends"></div>
  </aside>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
  signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getDatabase, ref, set, push, onValue, update, get, child
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC30TcmMVhP_8HdFYS1WufRiZwSDYNMTF0",
  authDomain: "pulse2-92372.firebaseapp.com",
  databaseURL: "https://pulse2-92372-default-rtdb.firebaseio.com",
  projectId: "pulse2-92372",
  storageBucket: "pulse2-92372.firebasestorage.app",
  messagingSenderId: "276235725177",
  appId: "1:276235725177:web:0f4e0789fae80a435927a8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const verifiedIcon = "https://aryasongs.github.io/Pulse/verified-account.png";
let currentUser = null;
let currentProfile = {};
let usersCache = {};

const $ = id => document.getElementById(id);

$("nexText").addEventListener("input",()=>{
  $("count").innerText = `${$("nexText").value.length}/700`;
});

window.signup = async()=>{
  const email=$("email").value;
  const pass=$("password").value;
  const cred = await createUserWithEmailAndPassword(auth,email,pass);
  const name = email.split("@")[0];
  await set(ref(db,"users/"+cred.user.uid),{
    uid:cred.user.uid,
    email,
    displayName:name,
    username:name.toLowerCase(),
    bio:"",
    avatar:"",
    banner:"",
    verified:false,
    createdAt:Date.now()
  });
};

window.login = async()=>{
  await signInWithEmailAndPassword(auth,$("email").value,$("password").value);
};

window.logout = async()=> signOut(auth);

onAuthStateChanged(auth, async(user)=>{
  currentUser=user;
  if(user){
    $("authBox").classList.add("hidden");
    $("composeBox").classList.remove("hidden");
    await loadMyProfile();
    loadUsers();
    loadFeed();
  }else{
    $("authBox").classList.remove("hidden");
    $("composeBox").classList.add("hidden");
    $("profileBox").classList.add("hidden");
    $("feed").innerHTML="";
  }
});

async function loadMyProfile(){
  const snap = await get(ref(db,"users/"+currentUser.uid));
  currentProfile = snap.val() || {};
}

function loadUsers(){
  onValue(ref(db,"users"),snap=>{
    usersCache = snap.val() || {};
  });
}

window.showHome=()=>{
  $("profileBox").classList.add("hidden");
  $("composeBox").classList.remove("hidden");
};

window.showProfile=()=>{
  $("profileBox").classList.remove("hidden");
  $("composeBox").classList.add("hidden");
  $("displayName").value=currentProfile.displayName||"";
  $("username").value=currentProfile.username||"";
  $("bio").value=currentProfile.bio||"";
  $("bannerPreview").src=currentProfile.banner||"";
};

function fileToBase64(file){
  return new Promise((resolve)=>{
    const reader = new FileReader();
    reader.onload=()=>resolve(reader.result);
    reader.readAsDataURL(file);
  });
}

window.saveProfile = async()=>{
  let avatar=currentProfile.avatar||"";
  let banner=currentProfile.banner||"";

  if($("avatarFile").files[0]) avatar = await fileToBase64($("avatarFile").files[0]);
  if($("bannerFile").files[0]) banner = await fileToBase64($("bannerFile").files[0]);

  await update(ref(db,"users/"+currentUser.uid),{
    displayName:$("displayName").value,
    username:$("username").value.toLowerCase().replaceAll("@",""),
    bio:$("bio").value,
    avatar,
    banner
  });

  await loadMyProfile();
  alert("Profile saved");
};

window.postNex = async()=>{
  const text=$("nexText").value.trim();
  if(!text) return alert("Write something first");
  if(text.length>700) return alert("NEX cannot be more than 700 letters");

  await push(ref(db,"nexes"),{
    uid:currentUser.uid,
    text,
    createdAt:Date.now(),
    likes:{},
    comments:{},
    reshares:{}
  });

  $("nexText").value="";
  $("count").innerText="0/700";
};

function formatText(text){
  return text
    .replace(/#(\w+)/g, `<span class="hash">#$1</span>`)
    .replace(/@(\w+)/g, `<span class="tag">@$1</span>`);
}

function userLine(user){
  const tick = user?.verified ? `<img class="verified" src="${verifiedIcon}">` : "";
  return `
    <div>
      <div class="name">${user?.displayName || "NEXO User"} ${tick}</div>
      <div class="handle">@${user?.username || "user"}</div>
    </div>
  `;
}

function loadFeed(){
  onValue(ref(db,"nexes"),snap=>{
    const data=snap.val()||{};
    const posts=Object.entries(data).sort((a,b)=>b[1].createdAt-a[1].createdAt);
    $("feed").innerHTML = posts.map(([id,nex])=>{
      const user=usersCache[nex.uid]||{};
      const likeCount=nex.likes?Object.keys(nex.likes).length:0;
      const commentCount=nex.comments?Object.keys(nex.comments).length:0;
      const reshareCount=nex.reshares?Object.keys(nex.reshares).length:0;

      return `
      <article class="tweet glass">
        <div class="row">
          <img class="avatar" src="${user.avatar || ""}">
          ${userLine(user)}
        </div>

        <p class="tweet-text">${formatText(nex.text)}</p>

        <div class="actions">
          <button onclick="likeNex('${id}')">♡ ${likeCount}</button>
          <button onclick="commentNex('${id}')">💬 ${commentCount}</button>
          <button onclick="reshareNex('${id}')">↻ ${reshareCount}</button>
        </div>

        <div id="comments-${id}">
          ${renderComments(nex.comments)}
        </div>
      </article>`;
    }).join("");

    buildTrends(posts);
  });
}

function renderComments(comments){
  if(!comments) return "";
  return Object.values(comments).map(c=>{
    const u=usersCache[c.uid]||{};
    return `
      <div style="margin-top:12px;padding:12px;border-radius:16px;background:rgba(255,255,255,.06)">
        <div class="row">
          <img class="avatar" style="width:32px;height:32px" src="${u.avatar || ""}">
          ${userLine(u)}
        </div>
        <p>${formatText(c.text)}</p>
      </div>
    `;
  }).join("");
}

window.likeNex = async(id)=>{
  await update(ref(db,`nexes/${id}/likes`),{
    [currentUser.uid]:true
  });
};

window.reshareNex = async(id)=>{
  await update(ref(db,`nexes/${id}/reshares`),{
    [currentUser.uid]:true
  });
};

window.commentNex = async(id)=>{
  const text = prompt("Write comment");
  if(!text) return;
  await push(ref(db,`nexes/${id}/comments`),{
    uid:currentUser.uid,
    text:text.slice(0,300),
    createdAt:Date.now()
  });
};

function buildTrends(posts){
  const map={};
  posts.forEach(([id,p])=>{
    const tags=p.text.match(/#\w+/g)||[];
    tags.forEach(t=>map[t]=(map[t]||0)+1);
  });
  $("trends").innerHTML = Object.entries(map)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,8)
    .map(([tag,count])=>`<p><b>${tag}</b><br><span class="small">${count} NEX posts</span></p>`)
    .join("") || "<p class='small'>No trends yet</p>";
}
</script>

</body>
</html>

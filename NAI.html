<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NEROX AI</title>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:radial-gradient(circle at top,#1e3a8a,#020617 60%);
  color:white;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.app{
  width:95%;
  max-width:1100px;
  height:92vh;
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(22px);
  border:1px solid rgba(255,255,255,.18);
  border-radius:28px;
  overflow:hidden;
  display:grid;
  grid-template-columns:300px 1fr;
  box-shadow:0 30px 90px rgba(0,0,0,.45);
}
.sidebar{
  padding:22px;
  background:rgba(0,0,0,.28);
  border-right:1px solid rgba(255,255,255,.12);
}
.logo{
  font-size:30px;
  font-weight:900;
  letter-spacing:1px;
}
.logo span{color:#60a5fa}
.userBox{
  margin-top:25px;
  padding:15px;
  border-radius:18px;
  background:rgba(255,255,255,.08);
}
button,input{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  margin-top:12px;
  font-size:15px;
}
button{
  background:linear-gradient(135deg,#2563eb,#7c3aed);
  color:white;
  font-weight:800;
  cursor:pointer;
}
button:hover{opacity:.9}
.logout{background:#ef4444}
.small{font-size:13px;color:#cbd5e1;word-break:break-all}
.stat{
  margin-top:12px;
  padding:12px;
  border-radius:14px;
  background:rgba(255,255,255,.08);
}
.chat{
  display:flex;
  flex-direction:column;
  height:100%;
}
.topbar{
  padding:20px;
  border-bottom:1px solid rgba(255,255,255,.12);
  font-weight:800;
}
.messages{
  flex:1;
  padding:20px;
  overflow-y:auto;
}
.msg{
  max-width:80%;
  margin:10px 0;
  padding:14px 16px;
  border-radius:18px;
  line-height:1.5;
  white-space:pre-wrap;
}
.me{
  margin-left:auto;
  background:#2563eb;
}
.ai{
  background:rgba(255,255,255,.12);
}
.composer{
  display:flex;
  gap:12px;
  padding:18px;
  border-top:1px solid rgba(255,255,255,.12);
}
.composer input{
  margin:0;
  background:rgba(255,255,255,.12);
  color:white;
  outline:none;
}
.composer button{
  margin:0;
  width:150px;
}
img.preview{
  max-width:220px;
  border-radius:16px;
  margin-top:10px;
  display:block;
}
.platform{
  padding:10px;
  border-radius:12px;
  background:rgba(255,255,255,.08);
  margin-top:8px;
}
@media(max-width:800px){
  .app{grid-template-columns:1fr}
  .sidebar{display:none}
}
</style>
</head>

<body>

<div class="app">
  <div class="sidebar">
    <div class="logo">NEROX <span>AI</span></div>
    <p class="small">Your Dozera account intelligence assistant.</p>

    <div id="loginBox">
      <input id="email" type="email" placeholder="Email">
      <input id="password" type="password" placeholder="Password">
      <button onclick="login()">Login</button>
      <button onclick="signup()">Create Account</button>
    </div>

    <div id="profileBox" style="display:none">
      <div class="userBox">
        <b id="userEmail"></b>
        <p class="small" id="uidText"></p>
      </div>
      <div class="stat" id="platformCount">Platforms: 0</div>
      <div class="stat" id="imageCount">Images: 0</div>
      <div class="stat" id="mailCount">Mails: 0</div>
      <button class="logout" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="chat">
    <div class="topbar">NEROX AI Console</div>
    <div class="messages" id="messages"></div>

    <div class="composer">
      <input id="ask" placeholder="Ask: Maine kis platform pe login kiya? Meri last mail kya thi? Meri images dikhao...">
      <button onclick="askAI()">Ask</button>
    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC30TcmMVhP_8HdFYS1WufRiZwSDYNMTF0",
  authDomain: "pulse2-92372.firebaseapp.com",
  databaseURL: "https://pulse2-92372-default-rtdb.firebaseio.com",
  projectId: "pulse2-92372",
  storageBucket: "pulse2-92372.firebasestorage.app",
  messagingSenderId: "276235725177",
  appId: "1:276235725177:web:0f4e0789fae80a435927a8"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let currentUser = null;
let userData = {
  platforms:{},
  posts:{},
  mails:{},
  images:{},
  activity:{}
};

function addMsg(text, who="ai", html=false){
  const box = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = "msg " + who;
  if(html) div.innerHTML = text;
  else div.textContent = text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

async function signup(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!email || !password) return alert("Email aur password daalo.");

  try{
    const res = await auth.createUserWithEmailAndPassword(email,password);

    await db.ref("users/" + res.user.uid).set({
      email,
      createdAt: Date.now(),
      platforms:{},
      posts:{},
      mails:{},
      images:{},
      activity:{}
    });

    addMsg("Account created. NEROX AI ready hai.", "ai");
  }catch(e){
    alert(e.message);
  }
}

async function login(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!email || !password) return alert("Email aur password daalo.");

  try{
    await auth.signInWithEmailAndPassword(email,password);
  }catch(e){
    alert(e.message);
  }
}

function logout(){
  auth.signOut();
}

auth.onAuthStateChanged(async user=>{
  if(user){
    currentUser = user;
    document.getElementById("loginBox").style.display="none";
    document.getElementById("profileBox").style.display="block";
    document.getElementById("userEmail").textContent=user.email;
    document.getElementById("uidText").textContent=user.uid;

    addMsg("Welcome back. Main NEROX AI hoon. Tum apne Dozera platforms, posts, images, mails aur activity ke baare mein puch sakte ho.");

    listenUserData(user.uid);
  }else{
    currentUser = null;
    document.getElementById("loginBox").style.display="block";
    document.getElementById("profileBox").style.display="none";
    document.getElementById("messages").innerHTML="";
    addMsg("Login karo, phir NEROX AI tumhara connected Firebase data read karega.");
  }
});

function listenUserData(uid){
  db.ref("users/" + uid).on("value", snap=>{
    userData = snap.val() || {};
    userData.platforms = userData.platforms || {};
    userData.posts = userData.posts || {};
    userData.mails = userData.mails || {};
    userData.images = userData.images || {};
    userData.activity = userData.activity || {};

    document.getElementById("platformCount").textContent =
      "Platforms: " + Object.keys(userData.platforms).length;

    document.getElementById("imageCount").textContent =
      "Images: " + Object.keys(userData.images).length;

    document.getElementById("mailCount").textContent =
      "Mails: " + Object.keys(userData.mails).length;
  });
}

function askAI(){
  const input = document.getElementById("ask");
  const q = input.value.trim();
  if(!q) return;
  input.value="";

  addMsg(q,"me");

  const answer = generateAnswer(q.toLowerCase());
  addMsg(answer.text,"ai",answer.html);
}

function generateAnswer(q){
  if(!currentUser){
    return {text:"Pehle login karo.", html:false};
  }

  if(q.includes("platform") || q.includes("login") || q.includes("dozera")){
    return showPlatforms();
  }

  if(q.includes("mail") || q.includes("email") || q.includes("last")){
    return showMails();
  }

  if(q.includes("image") || q.includes("photo") || q.includes("post")){
    return showImages();
  }

  if(q.includes("activity") || q.includes("kya kya kiya") || q.includes("history")){
    return showActivity();
  }

  if(q.includes("profile") || q.includes("account") || q.includes("meri information")){
    return showProfile();
  }

  return {
    text:
`Main tumhare Firebase account ka data read kar sakta hoon.

Try karo:
1. Maine kis kis Dozera platform pe login kiya?
2. Meri last mail kya thi?
3. Meri images dikhao
4. Maine kya kya activity ki?
5. Meri account information batao`,
    html:false
  };
}

function showProfile(){
  return {
    text:
`Account Information:

Email: ${currentUser.email}
UID: ${currentUser.uid}
Platforms: ${Object.keys(userData.platforms).length}
Images: ${Object.keys(userData.images).length}
Mails: ${Object.keys(userData.mails).length}`,
    html:false
  };
}

function showPlatforms(){
  const platforms = Object.values(userData.platforms || {});
  if(platforms.length === 0){
    return {text:"Abhi is user ke platforms ka data nahi mila.", html:false};
  }

  let html = "<b>Tumne ye Dozera platforms use kiye:</b><br><br>";

  platforms.forEach(p=>{
    html += `
      <div class="platform">
        <b>${escapeHTML(p.name || "Unknown Platform")}</b><br>
        Last Login: ${formatTime(p.lastLogin)}<br>
        Total Visits: ${p.visits || 1}
      </div>
    `;
  });

  return {text:html, html:true};
}

function showMails(){
  const mails = Object.values(userData.mails || {});
  if(mails.length === 0){
    return {text:"Is user ke mails ka data Firebase me nahi mila.", html:false};
  }

  mails.sort((a,b)=>(b.time || 0)-(a.time || 0));
  const last = mails[0];

  let text =
`Last Mail:

From: ${last.from || "Unknown"}
To: ${last.to || currentUser.email}
Subject: ${last.subject || "No subject"}
Time: ${formatTime(last.time)}

Message:
${last.body || last.message || "No body found"}`;

  return {text, html:false};
}

function showImages(){
  const images = Object.values(userData.images || {});
  if(images.length === 0){
    return {text:"Is user ki images/post images Firebase me nahi mili.", html:false};
  }

  let html = "<b>Ye images tumhare account se linked hain:</b><br><br>";

  images.forEach(img=>{
    const src = img.base64 || img.url || "";
    html += `
      <div class="platform">
        <b>${escapeHTML(img.title || "User Image")}</b><br>
        Uploaded: ${formatTime(img.time)}
        ${src ? `<img class="preview" src="${src}">` : ""}
      </div>
    `;
  });

  return {text:html, html:true};
}

function showActivity(){
  const acts = Object.values(userData.activity || {});
  if(acts.length === 0){
    return {text:"Activity history abhi empty hai.", html:false};
  }

  acts.sort((a,b)=>(b.time || 0)-(a.time || 0));

  let text = "Recent Activity:\n\n";
  acts.slice(0,15).forEach((a,i)=>{
    text += `${i+1}. ${a.action || "Activity"} — ${a.platform || "Unknown"} — ${formatTime(a.time)}\n`;
  });

  return {text, html:false};
}

function formatTime(t){
  if(!t) return "Unknown";
  return new Date(t).toLocaleString();
}

function escapeHTML(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
</script>

</body>
</html>

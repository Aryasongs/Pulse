<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEROX AI</title>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#020617,#111827,#1e1b4b);
  color:white;
}
.app{
  max-width:1100px;
  margin:auto;
  padding:20px;
}
.card{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.15);
  border-radius:22px;
  padding:20px;
  margin-top:18px;
  backdrop-filter:blur(18px);
}
h1{font-size:42px}
h1 span{color:#38bdf8}
input,button{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
  margin-top:12px;
  font-size:16px;
}
input{
  background:#020617;
  color:white;
  border:1px solid #334155;
}
button{
  background:linear-gradient(135deg,#2563eb,#7c3aed);
  color:white;
  font-weight:bold;
  cursor:pointer;
}
.logout{background:#dc2626}
.hidden{display:none}
.chat{
  height:450px;
  overflow-y:auto;
  background:#020617;
  border-radius:18px;
  padding:15px;
}
.msg{
  padding:13px;
  margin:10px 0;
  border-radius:16px;
  white-space:pre-wrap;
  line-height:1.5;
}
.user{
  background:#2563eb;
  margin-left:25%;
}
.ai{
  background:#1f2937;
  margin-right:25%;
}
img{
  max-width:240px;
  border-radius:16px;
  display:block;
  margin-top:10px;
}
.dataBox{
  background:#111827;
  padding:12px;
  border-radius:14px;
  margin:10px 0;
}
</style>
</head>

<body>

<div class="app">
  <h1>NEROX <span>AI</span></h1>
  <p>Login and search your connected Dozera platform data.</p>

  <div id="loginBox" class="card">
    <h2>Login</h2>
    <input id="email" type="email" placeholder="Email address">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <button onclick="signup()">Create Account</button>
  </div>

  <div id="mainBox" class="hidden">
    <div class="card">
      <h2>Account</h2>
      <p id="account"></p>
      <button class="logout" onclick="logout()">Logout</button>
    </div>

    <div class="card">
      <h2>NEROX AI Chat</h2>
      <div id="chat" class="chat"></div>

      <input id="question" placeholder="Ask in English: Which platforms did I login to? Show my last email. Show my images.">
      <button onclick="askAI()">Ask NEROX AI</button>
    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC30TcmMVhP_8HdFYS1WufRiZwSDYNMTF0",
  authDomain: "pulse2-92372.firebaseapp.com",
  databaseURL: "https://pulse2-92372-default-rtdb.firebaseio.com",
  projectId: "pulse2-92372",
  storageBucket: "pulse2-92372.firebasestorage.app",
  messagingSenderId: "276235725177",
  appId: "1:276235725177:web:0f4e0789fae80a435927a8"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let currentUser = null;
let userData = {};

function addMessage(text,type="ai",html=false){
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg " + type;

  if(html) div.innerHTML = text;
  else div.textContent = text;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function login(){
  const email = document.getElementById("email").value.trim();
  const pass = document.getElementById("password").value.trim();

  if(!email || !pass){
    alert("Enter email and password.");
    return;
  }

  auth.signInWithEmailAndPassword(email,pass)
  .catch(e=>alert(e.message));
}

function signup(){
  const email = document.getElementById("email").value.trim();
  const pass = document.getElementById("password").value.trim();

  if(!email || !pass){
    alert("Enter email and password.");
    return;
  }

  auth.createUserWithEmailAndPassword(email,pass)
  .then(res=>{
    const uid = res.user.uid;

    return db.ref("users/" + uid + "/profile").set({
      email: email,
      uid: uid,
      createdAt: Date.now()
    });
  })
  .catch(e=>alert(e.message));
}

function logout(){
  auth.signOut();
}

auth.onAuthStateChanged(user=>{
  if(user){
    currentUser = user;

    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("mainBox").classList.remove("hidden");

    document.getElementById("account").innerHTML =
      `<b>Email:</b> ${user.email}<br><b>UID:</b> ${user.uid}`;

    addMessage("Welcome to NEROX AI. I am reading your connected Firebase data now.");

    db.ref("users/" + user.uid).on("value",snap=>{
      userData = snap.val() || {};
      addMessage("Your latest data is synced.");
    });

  }else{
    currentUser = null;
    userData = {};
    document.getElementById("loginBox").classList.remove("hidden");
    document.getElementById("mainBox").classList.add("hidden");
    document.getElementById("chat").innerHTML = "";
  }
});

function askAI(){
  const input = document.getElementById("question");
  const q = input.value.trim();

  if(!q) return;

  input.value = "";
  addMessage(q,"user");

  const answer = searchFirebaseData(q.toLowerCase());
  addMessage(answer.text,"ai",answer.html);
}

function searchFirebaseData(q){
  if(!currentUser){
    return {text:"Please login first.",html:false};
  }

  if(q.includes("platform") || q.includes("login") || q.includes("logged")){
    return showPlatforms();
  }

  if(q.includes("email") || q.includes("mail") || q.includes("message")){
    return showEmails();
  }

  if(q.includes("image") || q.includes("photo") || q.includes("post")){
    return showImages();
  }

  if(q.includes("activity") || q.includes("history") || q.includes("what did i do")){
    return showActivity();
  }

  if(q.includes("profile") || q.includes("account") || q.includes("information")){
    return showProfile();
  }

  return {
    text:
`I can search your real Firebase data.

Ask:
- Which platforms did I login to?
- Show my last email
- Show my images
- Show my activity history
- Show my account information`,
    html:false
  };
}

function showProfile(){
  const profile = userData.profile || {};

  return {
    text:
`Account Information

Email: ${profile.email || currentUser.email}
UID: ${currentUser.uid}
Name: ${profile.name || "Not saved"}
Created At: ${formatDate(profile.createdAt)}

Platforms Found: ${Object.keys(userData.platforms || {}).length}
Emails Found: ${Object.keys(userData.emails || {}).length}
Images Found: ${Object.keys(userData.images || {}).length}
Activities Found: ${Object.keys(userData.activity || {}).length}`,
    html:false
  };
}

function showPlatforms(){
  const platforms = Object.values(userData.platforms || {});

  if(platforms.length === 0){
    return {text:"No platform login data found in Firebase for your account.",html:false};
  }

  let text = "Platforms you logged into:\n\n";

  platforms.forEach((p,i)=>{
    text += `${i+1}. ${p.name || p.platform || "Unknown Platform"}\n`;
    text += `Last Login: ${formatDate(p.lastLogin || p.time)}\n`;
    text += `Device: ${p.device || "Unknown"}\n`;
    text += `IP: ${p.ip || "Not saved"}\n\n`;
  });

  return {text,html:false};
}

function showEmails(){
  const emails = Object.values(userData.emails || {});

  if(emails.length === 0){
    return {text:"No email data found in Firebase for your account.",html:false};
  }

  emails.sort((a,b)=>(b.time || 0)-(a.time || 0));
  const e = emails[0];

  return {
    text:
`Last Email:

From: ${e.from || "Unknown"}
To: ${e.to || currentUser.email}
Subject: ${e.subject || "No subject"}
Time: ${formatDate(e.time)}

Message:
${e.body || e.message || "No message body saved."}`,
    html:false
  };
}

function showImages(){
  const images = Object.values(userData.images || {});

  if(images.length === 0){
    return {text:"No image data found in Firebase for your account.",html:false};
  }

  let html = "<b>Your saved images:</b><br><br>";

  images.forEach((img,i)=>{
    const src = img.base64 || img.imageBase64 || img.url || "";

    html += `
      <div class="dataBox">
        <b>${i+1}. ${escapeHTML(img.title || img.caption || "Image")}</b><br>
        Platform: ${escapeHTML(img.platform || "Unknown")}<br>
        Uploaded: ${formatDate(img.time || img.createdAt)}<br>
        ${src ? `<img src="${src}">` : "Image source not found."}
      </div>
    `;
  });

  return {text:html,html:true};
}

function showActivity(){
  const activity = Object.values(userData.activity || {});

  if(activity.length === 0){
    return {text:"No activity history found in Firebase for your account.",html:false};
  }

  activity.sort((a,b)=>(b.time || 0)-(a.time || 0));

  let text = "Your activity history:\n\n";

  activity.forEach((a,i)=>{
    text += `${i+1}. ${a.action || "Unknown action"}\n`;
    text += `Platform: ${a.platform || "Unknown"}\n`;
    text += `Time: ${formatDate(a.time)}\n\n`;
  });

  return {text,html:false};
}

function formatDate(t){
  if(!t) return "Unknown";
  return new Date(t).toLocaleString();
}

function escapeHTML(str){
  return String(str)
  .replaceAll("&","&amp;")
  .replaceAll("<","&lt;")
  .replaceAll(">","&gt;")
  .replaceAll('"',"&quot;")
  .replaceAll("'","&#039;");
}
</script>

</body>
</html>

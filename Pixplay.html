<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Pixplay V3 - Fixed Premium Engine</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; touch-action: manipulation; }
    body {
      background-color: #ffffff;
      color: #111111;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .masonry-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      grid-auto-rows: 10px;
      justify-content: center;
      gap: 0px 12px;
    }
    @media (min-width: 640px) {
      .masonry-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); grid-auto-rows: 10px; gap: 0px 16px; }
    }
    .masonry-item { 
      margin-bottom: 12px;
      will-change: transform;
      transform: translateZ(0);
    }
    @media (min-width: 640px) { .masonry-item { margin-bottom: 20px; } }
    
    /* Dynamic height calculation frames based on upload aspect ratio */
    .size-tall { grid-row-end: span 38; }
    .size-square { grid-row-end: span 26; }
    .size-wide { grid-row-end: span 18; }

    ::-webkit-scrollbar { display: none; }
    .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    .active-nav-item { color: #dc2626 !important; transform: scale(1.1); }
    
    .skeleton-shimmer {
      background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
      background-size: 200% 100%;
      animation: shimmerEngine 1.4s infinite linear;
    }
    @keyframes shimmerEngine {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    
    /* Crop box utility container */
    .crop-wrap { max-height: 320px; width: 100%; background-color: #111; display: flex; justify-content: center; align-items: center; overflow: hidden; }
  </style>
</head>
<body class="pb-24 md:pb-4">

  <header class="sticky top-0 bg-white/95 backdrop-blur z-40 px-6 py-3.5 hidden md:flex items-center justify-between border-b border-gray-100">
    <div class="flex items-center space-x-2 cursor-pointer" onclick="resetAndFetchFeed()">

        <i class="fa-solid fa-p text-white text-lg font-black"></i>
      </div>

      <input type="text" id="search-input-desktop" placeholder="Search ideas, photos, short videos instantly..." class="w-full bg-gray-100 hover:bg-gray-200 focus:bg-white focus:ring-4 focus:ring-red-100 p-3 pl-11 rounded-full text-sm outline-none transition">
    </div>

    <div class="flex items-center space-x-4">
      <button onclick="switchTab('home')" class="text-gray-800 font-bold text-sm px-2">Home</button>
      <button onclick="protectedActionTrigger('create')" class="text-gray-500 hover:text-black font-semibold text-sm px-2">Create</button>
      <button onclick="switchTab('settings')" class="text-gray-500 hover:text-black text-lg px-1"><i class="fa-solid fa-gear"></i></button>
      
      <div id="user-zone-desktop" class="hidden flex items-center space-x-3">
        <div onclick="switchTab('profile')" id="avatar-desktop" class="w-8 h-8 rounded-full bg-neutral-200 font-bold text-xs flex items-center justify-center cursor-pointer uppercase border shadow-sm">U</div>
        <button onclick="handleLogoutWorkflow()" class="text-gray-400 hover:text-red-600 text-sm"><i class="fa-solid fa-right-from-bracket"></i></button>
      </div>
      <div id="guest-zone-desktop" class="block">
        <button onclick="openAuthModal()" class="bg-red-600 hover:bg-red-700 text-white text-xs font-bold px-4 py-2 rounded-full transition shadow">Sign In</button>
      </div>
    </div>
  </header>

  <div id="toast" class="fixed top-6 left-1/2 transform -translate-x-1/2 bg-neutral-900/95 backdrop-blur text-white px-5 py-3 rounded-2xl text-xs font-bold shadow-2xl z-[100] flex items-center space-x-2.5 hidden opacity-0 transition-all duration-300">

  <main class="max-w-[1400px] mx-auto px-3 py-3 md:px-6">

      <div class="flex justify-center space-x-2 text-[10px] font-bold">

  <div id="report-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[60] flex items-center justify-center p-4 hidden">
    <div class="bg-white w-full max-w-sm rounded-3xl p-5 space-y-3 shadow-2xl">
      <h3 class="font-black text-base">Report Violation</h3>
      <select id="report-reason-select" class="w-full bg-gray-50 border p-2.5 rounded-xl text-xs font-bold outline-none">
        <option value="harassment">Harassment / Bullying</option>

      </div>
    </div>
  </div>

  <div id="compliance-slide-modal" class="fixed inset-0 bg-white z-50 flex flex-col p-6 overflow-y-auto hidden">
    <div class="max-w-xl mx-auto w-full flex items-center justify-between border-b pb-2 mb-4">
      <h2 id="compliance-title" class="text-base font-black">Legal Document</h2>
      <button onclick="document.getElementById('compliance-slide-modal').classList.add('hidden')" class="text-gray-400 text-lg"><i class="fa-solid fa-circle-xmark"></i></button>
    </div>
    <div class="max-w-xl mx-auto w-full text-xs text-gray-600 space-y-3" id="compliance-content-body"></div>
  </div>

  <div id="auth-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl space-y-4">
      <div class="text-center"><h3 id="auth-title" class="text-lg font-black">Welcome to Pixplay V3</h3></div>
      <div class="space-y-2">
        <div id="signup-name-wrapper" class="hidden"><input type="text" id="auth-name" placeholder="Name" class="w-full bg-gray-50 border p-2.5 rounded-xl text-xs outline-none"></div>
        <input type="email" id="auth-email" placeholder="Email" class="w-full bg-gray-50 border p-2.5 rounded-xl text-xs outline-none">
        <input type="password" id="auth-password" placeholder="Password" class="w-full bg-gray-50 border p-2.5 rounded-xl text-xs outline-none">
        <button id="auth-primary-btn" class="w-full bg-red-600 text-white p-3 rounded-full font-bold text-xs shadow">Validate Token</button>
      </div>
      <center><button onclick="toggleAuthMode()" id="auth-toggle-btn" class="text-red-600 text-xs font-bold">Create Account</button></center>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, ref, set, get, child, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC30TcmMVhP_8HdFYS1WufRiZwSDYNMTF0",
      authDomain: "pulse2-92372.firebaseapp.com",
      databaseURL: "https://pulse2-92372-default-rtdb.firebaseio.com",
      projectId: "pulse2-92372",
      storageBucket: "pulse2-92372.firebasestorage.app",
      messagingSenderId: "276235725177",
      appId: "1:276235725177:web:0f4e0789fae80a435927a8"
    };

    let app = initializeApp(firebaseConfig);
    let auth = getAuth(app);
    let db = getDatabase(app);

    let currentUser = null;
    let authMode = 'login';
    let globalPixStore = [];
    let displayedPixList = [];
    let activeProfileTab = 'created';
    let currentSelectedPix = null;
    
    let currentPageSize = 15;
    let isFetchingNextBatch = false;
    let endOfCloudStream = false;

    // Cropper lifecycle placeholder variable
    let activeCropperInstance = null;
    let rawUploadedFileBase64 = null;
    let finalProcessedPayloadBase64 = null;
    let detectedUploadType = 'image'; // image or video

    document.addEventListener("DOMContentLoaded", () => {
      triggerInitialSkeletons();
      fetchMasterCloudCatalog();
      setupSearchEngineLogic();
      setupInfiniteScrollObserver();
      setupUploaderSystem();
      buildTrendingTagsUI();
    });

    onAuthStateChanged(auth, (user) => {
      if(user) {
        currentUser = user;
        updateSystemAuthUI(true, user.email);
        if(user.email.includes("admin")) {
          document.getElementById('admin-console-box').classList.remove('hidden');
          listenReportsAuditStream();
        }
        listenUserNotificationsInbox(user.uid);
      } else {
        currentUser = null;
        updateSystemAuthUI(false);
      }
    });

    function triggerInitialSkeletons() {
      const grid = document.getElementById('pix-container');
      grid.innerHTML = '';
      const dummySizes = ['size-square', 'size-tall', 'size-wide'];
      for (let i = 0; i < 15; i++) {
        const skeleton = document.createElement('div');
        skeleton.className = `masonry-item ${dummySizes[i % 3]} skeleton-shimmer rounded-2xl shadow-sm`;
        grid.appendChild(skeleton);
      }
    }

    function updateSystemAuthUI(isLoggedIn, email = '') {
      if (isLoggedIn) {
        document.getElementById('guest-zone-desktop').classList.add('hidden');
        document.getElementById('user-zone-desktop').classList.remove('hidden');
        document.getElementById('avatar-desktop').innerText = email.charAt(0).toUpperCase();
        document.getElementById('avatar-mobile-top').innerText = email.charAt(0).toUpperCase();
        document.getElementById('profile-large-avatar').innerText = email.charAt(0).toUpperCase();
        document.getElementById('profile-email').innerText = email;
        document.getElementById('profile-name').innerText = email.split('@')[0];
      } else {
        document.getElementById('guest-zone-desktop').classList.remove('hidden');
        document.getElementById('user-zone-desktop').classList.add('hidden');
        document.getElementById('avatar-mobile-top').innerText = 'G';
        document.getElementById('profile-name').innerText = "Guest Engine";
        document.getElementById('profile-email').innerText = "Sign in to synchronize database sync";
        document.getElementById('admin-console-box').classList.add('hidden');
      }
    }

    async function fetchMasterCloudCatalog() {
      const FallbackNodes = ['nature','minimalist','cars','cyberpunk','travel','design'];
      let list = [];
      const gridClasses = ['size-wide', 'size-square', 'size-tall'];
      
      FallbackNodes.forEach((node, k) => {
        for(let i=0; i<4; i++) {
          const unsplashId = getAssetSeed(node, i);
          list.push({
            id: `static_node_${node}_${k}_${i}`,
            title: `${node.toUpperCase()} Workspace`,
            description: 'Premium curated layout architecture model sequence parameter.',
            lqipUrl: `https://images.unsplash.com/photo-${unsplashId}?w=80&q=20&blur=10`,
            imageUrl: `https://images.unsplash.com/photo-${unsplashId}?w=600&auto=format&fit=crop&q=75`,
            creator: 'system_framework', creatorUid: 'system', category: node, 
            size: gridClasses[(k+i) % 3], isRestricted: false, fileType: 'image'
          });
        }
      });

      try {
        const snap = await get(child(ref(db), 'public_pix'));
        if(snap.exists()) {
          let fbArray = [];
          Object.entries(snap.val()).forEach(([id, payload]) => {
            fbArray.unshift({
              id: id, title: payload.title, description: payload.description, 
              lqipUrl: payload.imageUrl, imageUrl: payload.imageUrl,
              creator: payload.creator || '@anonymous', creatorUid: payload.creatorUid,
              category: payload.category, size: payload.size || 'size-square', 
              isRestricted: payload.isRestricted || false, fileType: payload.fileType || 'image'
            });
          });
          globalPixStore = [...fbArray, ...list];
        } else { globalPixStore = list; }
      } catch(e) { globalPixStore = list; }

      resetAndFetchFeed();
    }

    // --- CRITICAL FIXED: CLEAN FLOW ROUTER PREVENTS WHITE BLANK LOG STUCK STAGE ---
    window.resetAndFetchFeed = function() {
      currentPageSize = 15;
      endOfCloudStream = false;
      isFetchingNextBatch = false;
      
      const infiniteTrigger = document.getElementById('infinite-scroll-trigger');
      if(infiniteTrigger) infiniteTrigger.classList.remove('hidden');
      
      displayedPixList = [...globalPixStore];
      renderUniversalMasonryGridFeed(false);
    };

    function renderUniversalMasonryGridFeed(appendMode = false) {
      const grid = document.getElementById('pix-container');
      if(!grid) return;
      if(!appendMode) grid.innerHTML = '';

      const totalSlice = displayedPixList.slice(0, currentPageSize);
      if(totalSlice.length >= displayedPixList.length) {
        endOfCloudStream = true;
        const trigger = document.getElementById('infinite-scroll-trigger');
        if(trigger) trigger.classList.add('hidden');
      }

      const activeRenderBatch = appendMode ? displayedPixList.slice(currentPageSize - 15, currentPageSize) : totalSlice;

      activeRenderBatch.forEach(pix => {
        const node = document.createElement('div');
        node.className = `masonry-item ${pix.size} relative group rounded-2xl overflow-hidden cursor-pointer bg-neutral-100 shadow-sm transition-shadow`;
        node.onclick = () => openPinModal(pix);
        
        let mediaTagPreview = `<img src="${pix.imageUrl}" class="w-full h-full object-cover relative z-10 transition-transform duration-300 group-hover:scale-105 ${pix.isRestricted ? 'restricted-pix' : ''}" loading="lazy">`;
        
        // Dynamic Short Video Player Indicator Icon Block Integration
        if(pix.fileType === 'video') {
          mediaTagPreview = `
            <video src="${pix.imageUrl}" class="w-full h-full object-cover relative z-10" muted loop></video>
            <div class="absolute top-2 right-2 bg-black/60 text-white w-6 h-6 rounded-full flex items-center justify-center z-20 text-[10px]"><i class="fa-solid fa-video"></i></div>
          `;
          // Custom micro video auto-play on dynamic workspace card mouse hover
          node.onmouseenter = () => { node.querySelector('video').play(); };
          node.onmouseleave = () => { node.querySelector('video').pause(); };
        }

        node.innerHTML = `
          <img src="${pix.lqipUrl || pix.imageUrl}" class="absolute inset-0 w-full h-full object-cover blur-md scale-105 z-0">
          ${mediaTagPreview}
          <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity duration-150 flex flex-col justify-between p-3 z-20">
            <div class="flex justify-between items-center w-full">
              <span class="text-white text-xs font-bold truncate pr-1">${pix.title}</span>
              <button onclick="event.stopPropagation(); protectedActionTrigger('save', '${pix.id}')" class="bg-red-600 text-white text-[10px] font-black px-3 py-1.5 rounded-full shadow">Save</button>
            </div>
            <div class="flex justify-between items-center w-full">
              <span class="text-white/80 text-[10px] truncate max-w-[90px]">@${pix.creator}</span>
              <div class="w-6 h-6 bg-white rounded-full flex items-center justify-center text-xs text-gray-800"><i class="fa-solid fa-heart"></i></div>
            </div>
          </div>
        `;
        grid.appendChild(node);
      });
    }

    function setupInfiniteScrollObserver() {
      const trigger = document.getElementById('infinite-scroll-trigger');
      const observer = new IntersectionObserver((entries) => {
        if(entries[0].isIntersecting && !isFetchingNextBatch && !endOfCloudStream) {
          isFetchingNextBatch = true;
          currentPageSize += 15;
          renderUniversalMasonryGridFeed(true);
          isFetchingNextBatch = false;
        }
      }, { rootMargin: '250px' });
      observer.observe(trigger);
    }

    // --- SEARCH LOGIC ENGINE WRAPPERS ---
    function setupSearchEngineLogic() {
      const desktopBar = document.getElementById('search-input-desktop');
      const mobileBar = document.getElementById('search-input-mobile');
      const triggerSearch = (queryStr) => {
        const token = queryStr.trim().toLowerCase();
        if(!token) { resetAndFetchFeed(); return; }
        displayedPixList = globalPixStore.filter(p => 
          p.title.toLowerCase().includes(token) || 
          (p.category && p.category.toLowerCase().includes(token))
        );
        renderUniversalMasonryGridFeed(false);
      };
      if(desktopBar) desktopBar.addEventListener('keypress', (e) => { if(e.key === 'Enter') triggerSearch(e.target.value); });
      if(mobileBar) mobileBar.addEventListener('keypress', (e) => { if(e.key === 'Enter') { triggerSearch(e.target.value); switchTab('home'); } });
    }

    // --- INTERACTIVE CROPPER & STRIKING UPLOADER CONNECTORS ---
    function setupUploaderSystem() {
      const fileInput = document.getElementById('file-uploader');
      
      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if(!file) return;

        const fileTypeToken = file.type.split('/')[0];
        
        if(fileTypeToken === 'video') {
          // Video Constraints Flow Validation
          detectedUploadType = 'video';
          const videoElement = document.createElement('video');
          videoElement.preload = 'metadata';
          videoElement.src = URL.createObjectURL(file);
          
          videoElement.onloadedmetadata = () => {
            window.URL.revokeObjectURL(videoElement.src);
            if(videoElement.duration > 10.1) {
              triggerToastSystem("Video constraint alert! Maximum clip duration: 10 seconds.", "fa-video-slash");
              fileInput.value = '';
              return;
            }
            
            // Convert valid video asset clip cleanly to structural database string pipeline
            const reader = new FileReader();
            reader.onload = (evt) => {
              finalProcessedPayloadBase64 = evt.target.result;
              document.getElementById('preview-holder').classList.remove('hidden');
              document.getElementById('image-preview').src = 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=150'; // Default video placeholder thumbnail
              triggerToastSystem("Video clip locked successfully (Max 10s verified).", "fa-video");
            };
            reader.readAsDataURL(file);
          };
        } 
        else if (fileTypeToken === 'image') {
          // Image Dynamic Crop Lifecycle Flow Initialization Trigger
          detectedUploadType = 'image';
          const reader = new FileReader();
          reader.onload = (evt) => {
            rawUploadedFileBase64 = evt.target.result;
            openImageEditorSandbox(rawUploadedFileBase64);
          };
          reader.readAsDataURL(file);
        }
      });

      document.getElementById('btn-publish-pix').onclick = () => {
        const title = document.getElementById('pix-title').value.trim();
        const desc = document.getElementById('pix-desc').value.trim();
        const cat = document.getElementById('pix-category').value.trim().toLowerCase() || 'nature';
        const finalAssetData = finalProcessedPayloadBase64;

        if(!title || !finalAssetData) { triggerToastSystem("Missing values or pending edits configuration file.","fa-exclamation"); return; }
        
        // Auto-assign Masonry structural scale factor dimensions metric values array blocks
        let finalSizeClass = 'size-square';
        if(detectedUploadType === 'image' && activeCropperInstance) {
          const cropData = activeCropperInstance.getData();
          if(cropData.height > cropData.width * 1.2) finalSizeClass = 'size-tall';
          if(cropData.width > cropData.height * 1.2) finalSizeClass = 'size-wide';
        }

        const payload = {
          title: title, description: desc || 'V3 architecture dynamic node framework object package layer.', imageUrl: finalAssetData,
          creator: currentUser.email.split('@')[0], creatorUid: currentUser.uid, category: cat, size: finalSizeClass, isRestricted: false, fileType: detectedUploadType
        };

        const key = push(ref(db, 'public_pix'));
        set(key, payload).then(() => {
          set(ref(db, `users/${currentUser.uid}/created/${key.key}`), payload);
          triggerToastSystem("Ecosystem published successfully!","fa-circle-check");
          closeCreateModal(); fetchMasterCloudCatalog();
        });
      };
    }

    // --- CROPPER ACTION MECHANICS FUNCTIONS ---
    function openImageEditorSandbox(sourceBase64) {
      document.getElementById('editor-modal').classList.remove('hidden');
      const sandboxImage = document.getElementById('crop-image-sandbox');
      sandboxImage.src = sourceBase64;

      if(activeCropperInstance) activeCropperInstance.destroy();
      
      // Initialize premium cropper window element presets
      activeCropperInstance = new Cropper(sandboxImage, {
        aspectRatio: 2/3, // Default Pinterest premium scale setup config aspect
        viewMode: 1,
        background: false,
        autoCropArea: 1
      });
    }

    window.changeCropRatio = function(numericalRatioValue) {
      if(activeCropperInstance) activeCropperInstance.setAspectRatio(numericalRatioValue);
    };

    window.rotateCropImage = function() {
      if(activeCropperInstance) activeCropperInstance.rotate(90);
    };

    window.cancelImageEditing = function() {
      document.getElementById('editor-modal').classList.add('hidden');
      document.getElementById('file-uploader').value = '';
    };

    window.saveCroppedImageResult = function() {
      if(!activeCropperInstance) return;
      // Extract compressed high quality modified base64 asset payload 
      finalProcessedPayloadBase64 = activeCropperInstance.getClippedCanvas ? activeCropperInstance.getClippedCanvas().toDataURL('image/jpeg', 0.75) : activeCropperInstance.getCroppedCanvas().toDataURL('image/jpeg', 0.75);
      
      document.getElementById('preview-holder').classList.remove('hidden');
      document.getElementById('image-preview').src = finalProcessedPayloadBase64;
      document.getElementById('editor-modal').classList.add('hidden');
      triggerToastSystem("Cropped custom layout configuration parameters applied.","fa-wand-magic-sparkles");
    };

    // --- PRECISE FULL-RESOLUTION OPEN MODAL FLOW ---
    window.openPinModal = function(pix) {
      currentSelectedPix = pix;
      
      const modalImg = document.getElementById('modal-image');
      const modalVid = document.getElementById('modal-video');
      
      // Reset absolute display variables elements configurations state vectors
      modalImg.classList.add('hidden');
      modalVid.classList.add('hidden');
      modalVid.pause();

      if(pix.fileType === 'video') {
        modalVid.src = pix.imageUrl;
        modalVid.classList.remove('hidden');
        modalVid.play();
      } else {
        modalImg.src = pix.imageUrl;
        modalImg.classList.remove('hidden');
      }

      document.getElementById('modal-title').innerText = pix.title;
      document.getElementById('modal-desc').innerText = pix.description;
      document.getElementById('modal-creator-strip').innerText = `Published by: @${pix.creator}`;

      document.getElementById('modal-action-save').onclick = () => protectedActionTrigger('save', pix.id);
      document.getElementById('modal-action-download').onclick = () => { window.open(pix.imageUrl, '_blank'); };
      
      // Synchronize Realtime Live Comment Node channels
      const commBox = document.getElementById('modal-comments-container');
      commBox.innerHTML = '';
      onValue(ref(db, `comments/${pix.id}`), (sn) => {
        commBox.innerHTML = '';
        if(sn.exists()) {
          Object.values(sn.val()).forEach(c => {
            const div = document.createElement('div'); div.className = "text-[11px] bg-gray-50 p-2 rounded-xl text-left font-semibold";
            div.innerHTML = `<span class="text-red-600">@${c.author}:</span> <span class="text-gray-700">${c.text}</span>`;
            commBox.appendChild(div);
          });
        } else { commBox.innerHTML = '<p class="text-[10px] text-gray-400 italic text-center py-2">No comments here yet.</p>'; }
      });

      document.getElementById('modal-btn-send-comment').onclick = () => {
        const inp = document.getElementById('modal-comment-input');
        if(!inp.value.trim() || !currentUser) return;
        push(ref(db, `comments/${pix.id}`), { author: currentUser.email.split('@')[0], text: inp.value.trim(), time: Date.now() });
        inp.value = '';
      };

      document.getElementById('pin-modal').classList.remove('hidden');
    };

    window.closePinModal = function() {
      document.getElementById('pin-modal').classList.add('hidden');
      document.getElementById('modal-video').pause();
    };

    // --- SMART RE-ROUTE SWITCH METHOD ELIMINATES STUCK PAGE ACTIONS ---
    window.switchTab = function(tabId) {
      document.querySelectorAll('.tab-panel').forEach(p => {
        p.classList.add('hidden');
        p.classList.remove('block');
      });
      
      const targetPanel = document.getElementById(`view-${tabId}`);
      if(targetPanel) {
        targetPanel.classList.remove('hidden');
        targetPanel.classList.add('block');
      }
      
      document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active-nav-item'));
      const activeMobIcon = document.getElementById(`mob-nav-${tabId}`);
      if(activeMobIcon) activeMobIcon.classList.add('active-nav-item');
      
      // Clean pipeline fetch triggers when moving back to main view panel loop
      if(tabId === 'home' || tabId === 'feed') {
        resetAndFetchFeed();
      }
      if(tabId === 'profile') syncUserProfileSubDashboard();
    };

    window.protectedActionTrigger = function(type, id) {
      if(!currentUser) { openAuthModal(); return; }
      if(type === 'create') document.getElementById('create-modal').classList.remove('hidden');
      if(type === 'save') {
        const matched = globalPixStore.find(p => p.id === id);
        if(matched) set(ref(db, `users/${currentUser.uid}/saved/${id}`), matched).then(() => triggerToastSystem("Saved to cloud cluster collections dashboard.","fa-bookmark"));
      }
    };

    window.openReportingWizard = function() {
      if(!currentUser) { openAuthModal(); return; }
      document.getElementById('report-modal').classList.remove('hidden');
    };

    window.submitContentViolationReport = function() {
      const selectReason = document.getElementById('report-reason-select').value;
      if(!currentSelectedPix) return;
      push(ref(db, 'reported_content'), {
        pixId: currentSelectedPix.id, title: currentSelectedPix.title, imageUrl: currentSelectedPix.imageUrl,
        reporterUid: currentUser.uid, reportedCreatorUid: currentSelectedPix.creatorUid || 'unknown_node',
        reason: selectReason, timestamp: Date.now()
      }).then(() => {
        document.getElementById('report-modal').classList.add('hidden'); closePinModal();
        triggerToastSystem("Report sent to admin team validation audit index.","fa-shield-halved");
      });
    };

    function listenReportsAuditStream() {
      const streamBox = document.getElementById('admin-reports-stream');
      onValue(ref(db, 'reported_content'), (snapshot) => {
        streamBox.innerHTML = '';
        if(snapshot.exists()) {
          Object.entries(snapshot.val()).forEach(([reportId, data]) => {
            const row = document.createElement('div');
            row.className = "bg-white p-3 rounded-xl border flex flex-col sm:flex-row items-start sm:items-center justify-between text-xs font-bold gap-2";
            row.innerHTML = `
              <div class="flex items-center space-x-3">
                <img src="${data.imageUrl}" class="w-10 h-10 object-cover rounded-lg shadow-inner">
                <div><h4 class="text-gray-900">${data.title}</h4><p class="text-orange-600 text-[10px] uppercase font-black">Reason: ${data.reason}</p></div>
              </div>
              <div class="flex space-x-1 w-full sm:w-auto">
                <button onclick="executeAdminResolutionLoop('${reportId}', '${data.pixId}', '${data.reportedCreatorUid}', 'approve')" class="bg-red-600 text-white px-2.5 py-1.5 rounded-lg text-[10px]">Remove</button>
                <button onclick="executeAdminResolutionLoop('${reportId}', '${data.pixId}', '${data.reportedCreatorUid}', 'reject')" class="bg-gray-200 text-gray-800 px-2.5 py-1.5 rounded-lg text-[10px]">Keep</button>
              </div>
            `;
            streamBox.appendChild(row);
          });
        } else { streamBox.innerHTML = '<p class="text-[11px] text-gray-400 italic text-center py-2">No pending flags audits logs profiles.</p>'; }
      });
    }

    window.executeAdminResolutionLoop = function(reportId, pixId, creatorUid, actionDecision) {
      if(actionDecision === 'approve') {
        if(pixId.startsWith('custom_')) {
          remove(ref(db, `public_pix/${pixId}`));
          if(creatorUid && creatorUid !== 'local') remove(ref(db, `users/${creatorUid}/created/${pixId}`));
        }
        if(creatorUid && creatorUid !== 'local') {
          push(ref(db, `notifications/${creatorUid}`), { text: "This content was removed because it went against our community guidelines.", type: "alert", timestamp: Date.now() });
        }
      } else {
        if(creatorUid && creatorUid !== 'local') {
          push(ref(db, `notifications/${creatorUid}`), { text: "This content wasn't removed, but we still want to help.", type: "info", timestamp: Date.now() });
        }
      }
      remove(ref(db, `reported_content/${reportId}`)).then(() => fetchMasterCloudCatalog());
    };

    function listenUserNotificationsInbox(uid) {
      const container = document.getElementById('notification-list-box');
      const badgeDot = document.getElementById('notif-badge-dot');
      onValue(ref(db, `notifications/${uid}`), (snapshot) => {
        if(!container) return;
        container.innerHTML = '';
        if(snapshot.exists()) {
          if(badgeDot) badgeDot.classList.remove('hidden');
          Object.values(snapshot.val()).reverse().forEach(notif => {
            const card = document.createElement('div');
            card.className = `p-3 rounded-xl text-xs font-bold ${notif.type === 'alert' ? 'bg-red-50 text-red-900' : 'bg-gray-50 text-gray-800'}`;
            card.innerHTML = `<p>${notif.text}</p>`;
            container.appendChild(card);
          });
        } else { if(badgeDot) badgeDot.classList.add('hidden'); container.innerHTML = '<p class="text-xs text-gray-400 italic text-center py-4">Inbox clear.</p>'; }
      });
    }

    function syncUserProfileSubDashboard() {
      if(!currentUser) return;
      get(child(ref(db), `users/${currentUser.uid}`)).then(snap => {
        const subgrid = document.getElementById('profile-sub-grid'); if(!subgrid) return;
        subgrid.innerHTML = '';
        if(snap.exists()) {
          const d = snap.val();
          const target = activeProfileTab === 'created' ? (d.created ? Object.values(d.created) : []) : (d.saved ? Object.values(d.saved) : []);
          if(target.length === 0) { subgrid.innerHTML = '<p class="col-span-full text-center text-gray-400 text-xs py-6 italic">Folder folder empty.</p>'; return; }
          target.forEach(pix => {
            const node = document.createElement('div'); node.className = `masonry-item size-square rounded-xl overflow-hidden shadow-sm`;
            node.innerHTML = `<img src="${pix.imageUrl}" class="w-full h-full object-cover">`;
            subgrid.appendChild(node);
          });
        }
      });
    }

    window.toggleProfileSubTab = function(type) {
      activeProfileTab = type;
      document.getElementById('subtab-btn-created').className = type === 'created' ? "border-b-2 border-black pb-2 text-black font-bold" : "pb-2 hover:text-black font-semibold";
      document.getElementById('subtab-btn-saved').className = type === 'saved' ? "border-b-2 border-black pb-2 text-black font-bold" : "pb-2 hover:text-black font-semibold";
      syncUserProfileSubDashboard();
    };

    window.openComplianceSlide = function(docType) {
      const title = document.getElementById('compliance-title');
      const body = document.getElementById('compliance-content-body');
      title.innerText = docType === 'privacy' ? 'Privacy Policy' : 'Terms & Conditions';
      body.innerHTML = `<p>Pixplay legal infrastructure terms verification framework system controls data handling nodes.</p>`;
      document.getElementById('compliance-slide-modal').classList.remove('hidden');
    };

    function buildTrendingTagsUI() {
      const box = document.getElementById('search-trending-tags'); if(!box) return; box.innerHTML = '';
      ['Cyberpunk', 'Cars', 'Minimalist', 'Aesthetic'].forEach(t => {
        const div = document.createElement('div'); div.className = "bg-neutral-900 text-white rounded-xl h-14 flex items-center justify-center font-bold text-xs cursor-pointer";
        div.onclick = () => { document.getElementById('search-input-mobile').value = t; setupSearchEngineLogic(); switchTab('home'); };
        div.innerHTML = `<span>${t}</span>`; box.appendChild(div);
      });
    }

    window.openAuthModal = function() { document.getElementById('auth-modal').classList.remove('hidden'); };
    window.closeAuthModal = function() { document.getElementById('auth-modal').classList.add('hidden'); };
    window.closeCreateModal = function() { document.getElementById('create-modal').classList.add('hidden'); document.getElementById('preview-holder').classList.add('hidden'); };
    window.toggleAuthMode = function() { authMode = authMode === 'login' ? 'signup' : 'login'; };

    document.getElementById('auth-primary-btn').onclick = () => {
      const email = document.getElementById('auth-email').value.trim();
      const pass = document.getElementById('auth-password').value;
      const name = document.getElementById('auth-name').value.trim();
      if(!email || pass.length < 6) return;
      if(authMode === 'signup') {
        createUserWithEmailAndPassword(auth, email, pass).then(c => { set(ref(db, `users/${c.user.uid}`), { name: name || 'User', email: email }); closeAuthModal(); });
      } else { signInWithEmailAndPassword(auth, email, pass).then(() => closeAuthModal()); }
    };

    window.handleLogoutWorkflow = function() { signOut(auth); };

    function triggerToastSystem(m, i) {
      const toast = document.getElementById('toast'); document.getElementById('toast-msg').innerText = m;
      document.getElementById('toast-icon').className = `fa-solid ${i} text-red-500`;
      toast.classList.remove('hidden'); setTimeout(() => toast.classList.add('opacity-100'), 5);
      setTimeout(() => { toast.classList.remove('opacity-100'); setTimeout(() => toast.classList.add('hidden'), 300); }, 2200);
    }

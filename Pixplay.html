    body {
      background-color: #ffffff;
      color: #111111;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .masonry-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      grid-auto-rows: 10px;
      justify-content: center;
    }
    .masonry-item { grid-row-end: span 26; margin-bottom: 16px; }
    .size-small { grid-row-end: span 22; }
    .size-medium { grid-row-end: span 30; }
    .size-large { grid-row-end: span 38; }
    ::-webkit-scrollbar { display: none; }
    .restricted-pix { filter: blur(30px) brightness(0.5); pointer-events: none; }
    .apple-gradient { background: linear-gradient(135deg, #ff2d55, #ff3b30); }
  </style>

        const dbSnapshot = await get(child(ref(db), 'public_pix'));
        if(dbSnapshot.exists()) {
          let firebasePixList = [];

            firebasePixList.unshift({
              id: id,
              title: payload.title,
              description: payload.description,
              imageUrl: payload.imageUrl,

          const filtered = globalPixStore.filter(p =>

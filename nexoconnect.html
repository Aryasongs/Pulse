<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Executive Command | Oriontec</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- Corporate Luxury Variables --- */
        :root {
            --glass-bg: rgba(10, 10, 12, 0.65);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-highlight: rgba(255, 255, 255, 0.05);
            --accent-primary: #f8f9fa; 
            --accent-blue: #0066cc; 
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
        }

        /* Anti-Zoom & Anti-Bounce */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: pan-x pan-y; }
        
        body { 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            height: 100vh; height: 100dvh; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background-image: url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .bg-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.9) 0%, rgba(5,10,20,0.8) 100%);
            backdrop-filter: blur(8px);
            z-index: -1;
        }

        h1, h2, h3, .brand-font { font-family: 'Montserrat', sans-serif; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        /* --- 1. Security Gateway (Login) --- */
        #gateway-screen { 
            width: 90%; max-width: 420px; padding: 40px; 
            background: var(--glass-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 16px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.6); 
            text-align: center; transition: opacity 0.5s ease; z-index: 10;
        }
        
        .gateway-logo { font-size: 22px; font-weight: 800; letter-spacing: 2px; margin-bottom: 25px; color: var(--accent-primary); display: flex; align-items: center; justify-content: center; gap: 10px; text-transform: uppercase; }
        
        .form-input { 
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); 
            color: var(--text-main); padding: 15px 18px; border-radius: 8px; margin-bottom: 15px; 
            outline: none; font-size: 16px !important; font-weight: 400; transition: 0.3s; 
        }
        .form-input:focus { border-color: var(--accent-primary); background: rgba(0,0,0,0.6); }

        .btn-primary { 
            width: 100%; background: var(--accent-primary); color: #000; 
            border: none; border-radius: 8px; padding: 16px; font-family: 'Montserrat', sans-serif; 
            font-size: 14px !important; font-weight: 700; cursor: pointer; transition: 0.3s; 
            margin-top: 10px; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-primary:active { transform: scale(0.98); }

        /* --- 2. Main Chat Interface --- */
        #chat-interface { 
            display: none; flex-direction: column; position: relative; opacity: 1; 
            width: 100%; max-width: 650px; height: 100dvh; 
            background: var(--glass-bg); backdrop-filter: blur(25px);
        }

        @media (min-width: 768px) {
            #chat-interface { height: 90vh; border-radius: 16px; border: 1px solid var(--glass-border); box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        }

        .chat-header { 
            padding: 20px; border-bottom: 1px solid var(--glass-border); 
            display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.4); 
        }
        .ceo-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.2); }
        .header-info { flex: 1; }
        .header-info h2 { font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 6px; letter-spacing: 0.5px; }
        .header-info p { font-size: 11px; color: var(--text-muted); font-weight: 500; margin-top: 3px; letter-spacing: 1px; text-transform: uppercase; }
        
        .action-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: 0.2s; }
        .action-btn:hover { background: rgba(255,0,0,0.5); border-color: red; }

        .chat-box { flex: 1; padding: 25px 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; scroll-behavior: smooth; }
        
        .msg-wrapper { display: flex; flex-direction: column; max-width: 85%; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-received { align-self: flex-start; }
        .msg-sent { align-self: flex-end; align-items: flex-end; }
        
        .sender-name { font-size: 10px; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        
        .bubble { padding: 14px 18px; font-size: 15px; line-height: 1.5; border-radius: 12px; word-wrap: break-word; font-weight: 300; }
        .msg-received .bubble { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-top-left-radius: 2px; }
        .msg-sent .bubble { background: rgba(0, 102, 204, 0.4); border: 1px solid rgba(0, 102, 204, 0.8); color: #fff; border-top-right-radius: 2px; }
        .bubble img { max-width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid var(--glass-border); }
        
        .msg-time { font-size: 10px; color: #71717A; margin-top: 6px; font-weight: 500; display: flex; align-items: center; gap: 5px;}
        .typing-indicator { display: none; padding: 0 20px 15px; align-items: center; gap: 8px; }

        .input-area { 
            padding: 15px 20px; background: rgba(0,0,0,0.4); border-top: 1px solid var(--glass-border); 
            display: flex; align-items: center; gap: 12px; padding-bottom: max(15px, env(safe-area-inset-bottom));
        }
        .icon-btn { background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; transition: 0.2s;}
        .icon-btn:hover { color: var(--text-main); }
        .input-wrapper { flex: 1; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); border-radius: 8px; padding: 12px 16px; display: flex; align-items: center; }
        .input-wrapper input { width: 100%; background: transparent; border: none; color: var(--text-main); font-size: 16px !important; outline: none; font-weight: 300;}
        .send-btn { color: var(--accent-primary); font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 12px; cursor: pointer; display: none; text-transform: uppercase; letter-spacing: 1px;}

        /* --- 3. Admin Command Center --- */
        #admin-panel { 
            display: none; width: 95%; max-width: 1400px; height: 95dvh; 
            background: var(--glass-bg); backdrop-filter: blur(30px); border: 1px solid var(--glass-border); border-radius: 16px; overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,0.8);
        }
        .admin-layout { display: flex; height: 100%; flex-direction: row; }
        .admin-sidebar { width: 350px; background: rgba(0,0,0,0.4); border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; }
        
        .admin-header { padding: 25px 20px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center;}
        .role-selector { 
            background: rgba(0,0,0,0.6); color: var(--text-main); border: 1px solid var(--glass-border); 
            padding: 14px; border-radius: 8px; width: 100%; margin-top: 15px; font-weight: 500; font-size: 13px; outline: none; cursor: pointer;
        }
        
        .user-list { flex: 1; overflow-y: auto; }
        .user-list-item { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; border-left: 3px solid transparent; transition: 0.2s;}
        .user-list-item:hover, .user-list-item.active-user { background: var(--glass-highlight); border-left-color: var(--accent-primary); }
        .user-list-item h4 { font-size: 15px; font-weight: 600; margin-bottom: 6px; letter-spacing: 0.5px;}
        .user-list-item p { font-size: 11px; color: var(--text-muted); }

        .admin-main { flex: 1; display: flex; flex-direction: column; }

        @media (max-width: 850px) {
            .admin-layout { flex-direction: column; }
            .admin-sidebar { width: 100%; height: 40%; border-right: none; border-bottom: 1px solid var(--glass-border); }
            .admin-main { height: 60%; }
        }

        #pass-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 1000; display: none; justify-content: center; align-items: center; }
        .pass-box { background: rgba(15,15,15,0.9); padding: 40px; border-radius: 12px; border: 1px solid var(--glass-border); width: 90%; max-width: 350px; text-align: center; }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div id="pass-modal">
        <div class="pass-box">
            <i class="fas fa-fingerprint" style="font-size: 32px; color: var(--accent-primary); margin-bottom: 20px;"></i>
            <h3 class="brand-font" style="margin-bottom: 25px; font-size: 16px; letter-spacing: 1px;">EXECUTIVE OVERRIDE</h3>
            <input type="password" id="admin-pass" class="form-input" placeholder="Security Clearance Key" required>
            <button class="btn-primary" onclick="verifyAdmin()">Authorize Access</button>
            <button onclick="closePassModal()" style="margin-top:15px; background:none; border:none; color:#888; font-size:12px; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <div id="gateway-screen">
        <div class="gateway-logo"><i class="fas fa-building"></i> ORIONTEC</div>
        <p style="font-size: 11px; color: var(--text-muted); margin-bottom: 30px; letter-spacing: 1.5px; text-transform: uppercase;">Secure Executive Gateway</p>
        
        <input type="text" id="entry-name" class="form-input" placeholder="Legal Full Name" required>
        <input type="text" id="entry-father" class="form-input" placeholder="Authorization ID (Father's Name)" required>
        <input type="email" id="entry-email" class="form-input" placeholder="Corporate Email Address" required>
        
        <button class="btn-primary" onclick="requestEntry()" id="btn-submit">Establish Link</button>
        <p style="font-size: 10px; color: #666; margin-top: 25px; letter-spacing: 1px; text-transform: uppercase;"><i class="fas fa-shield-alt"></i> AES-256 Encrypted Tunnel</p>
    </div>

    <div id="chat-interface">
        <div class="chat-header">
            <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?w=150" class="ceo-avatar" alt="Ananya Rao">
            <div class="header-info">
                <h2 class="brand-font">Ananya Rao <i class="fas fa-certificate" style="color:var(--accent-primary); font-size:12px; margin-left:4px;"></i></h2>
                <p>Chief Executive Officer</p>
            </div>
            <button class="action-btn" onclick="terminateSession()"><i class="fas fa-sign-out-alt"></i> Exit</button>
        </div>

        <div class="chat-box" id="user-chat-box"></div>
        
        <div class="typing-indicator" id="user-typing-indicator">
            <i class="fas fa-circle-notch fa-spin" style="color: var(--text-muted); font-size: 14px;"></i>
            <span style="font-size: 11px; color: var(--text-muted); font-weight: 500; margin-left: 8px;">Ananya Rao is typing...</span>
        </div>

        <div class="input-area">
            <button class="icon-btn" onclick="document.getElementById('user-media').click()"><i class="fas fa-paperclip"></i></button>
            <input type="file" id="user-media" accept="image/*" style="display: none;" onchange="uploadFile(event, 'user')">
            <div class="input-wrapper">
                <input type="text" id="user-msg-input" placeholder="Draft your message..." onkeyup="handleKey(event, 'user')">
                <span class="send-btn" id="user-send-btn" onclick="sendMsg('user')">Send</span>
            </div>
        </div>
    </div>

    <div id="admin-panel">
        <div class="admin-layout">
            <div class="admin-sidebar">
                <div class="admin-header">
                    <div>
                        <h3 class="brand-font" style="font-size: 16px; letter-spacing: 2px;">THE BOARDROOM</h3>
                    </div>
                    <button class="action-btn" onclick="terminateSession()"><i class="fas fa-sign-out-alt"></i> Log Out</button>
                </div>
                <div style="padding: 0 20px;">
                    <select class="role-selector" id="admin-role" onchange="updateHeader()">
                        <option value="Ananya Rao|Chief Executive Officer">Profile: Ananya Rao (CEO)</option>
                        <option value="Executive Board|Vice President">Profile: Vice President</option>
                        <option value="Regional HQ|India Managing Director">Profile: India MD</option>
                    </select>
                </div>
                <div class="user-list" id="admin-user-list"></div>
            </div>
            
            <div class="admin-main">
                <div class="chat-header">
                    <div class="header-info">
                        <h2 class="brand-font" style="font-size: 15px;">Monitoring Node: <span id="admin-target-name" style="color: var(--text-muted); font-weight:400;">Awaiting Selection</span></h2>
                    </div>
                </div>
                
                <div class="chat-box" id="admin-chat-box"></div>

                <div class="typing-indicator" id="admin-typing-indicator">
                    <i class="fas fa-circle-notch fa-spin" style="color: var(--text-muted); font-size: 14px;"></i>
                    <span style="font-size: 11px; color: var(--text-muted); margin-left:8px;">Client is typing...</span>
                </div>

                <div class="input-area">
                    <button class="icon-btn" onclick="document.getElementById('admin-media').click()"><i class="fas fa-paperclip"></i></button>
                    <input type="file" id="admin-media" accept="image/*" style="display: none;" onchange="uploadFile(event, 'admin')">
                    <div class="input-wrapper">
                        <input type="text" id="admin-msg-input" placeholder="Deploy Executive Response..." onkeyup="handleKey(event, 'admin')" disabled>
                        <span class="send-btn" id="admin-send-btn" onclick="sendMsg('admin')">Transmit</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Prevent Mobile Zoom & Scroll Bounce ---
        document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
        document.addEventListener('touchmove', function(e) { if(e.touches.length > 1) e.preventDefault(); }, { passive: false });
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (e) {
            let now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) e.preventDefault();
            lastTouchEnd = now;
        }, false);

        // --- Firebase Init ---
        const firebaseConfig = {
            apiKey: "AIzaSyC30TcmMVhP_8HdFYS1WufRiZwSDYNMTF0",
            databaseURL: "https://pulse2-92372-default-rtdb.firebaseio.com",
            projectId: "pulse2-92372"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let sessionID = "";
        let visitorName = "";
        let adminTarget = "";
        let typingTimer = null;

        const formatTime = (ts) => new Intl.DateTimeFormat('en-US', { hour: 'numeric', minute: 'numeric', hour12: true }).format(new Date(ts));

        // --- CORE FIX: Synchronous LocalStorage Persistence (100% Refresh Proof) ---
        (function restoreSession() {
            try {
                const adminState = localStorage.getItem('oriontec_admin_session');
                const userState = localStorage.getItem('oriontec_user_session');

                if (adminState === 'active') {
                    document.getElementById('gateway-screen').style.display = 'none';
                    document.getElementById('admin-panel').style.display = 'flex';
                    // Minor delay to ensure Firebase DOM elements are fully ready
                    setTimeout(() => loadCommandCenter(), 300);
                } else if (userState) {
                    const data = JSON.parse(userState);
                    sessionID = data.sessionID;
                    visitorName = data.name;

                    document.getElementById('gateway-screen').style.display = 'none';
                    document.getElementById('chat-interface').style.display = 'flex';
                    setTimeout(() => initUserChat(), 300);
                }
            } catch (e) {
                console.error("Local storage sync error:", e);
                localStorage.removeItem('oriontec_user_session');
            }
        })();

        // Terminate Session manually
        function terminateSession() {
            localStorage.removeItem('oriontec_admin_session');
            localStorage.removeItem('oriontec_user_session');
            window.location.reload();
        }

        // --- Gateway Logic ---
        function closePassModal() { document.getElementById('pass-modal').style.display = 'none'; }

        async function requestEntry() {
            const name = document.getElementById('entry-name').value.trim();
            const father = document.getElementById('entry-father').value.trim();
            const email = document.getElementById('entry-email').value.trim();

            if(!name || !father || !email) return alert("System requires all fields to grant clearance.");

            if(email.toLowerCase() === "admin@oriontec.com") {
                document.getElementById('pass-modal').style.display = "flex";
                return;
            }

            const btn = document.getElementById('btn-submit');
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Securing Line...';
            btn.disabled = true;

            visitorName = name;
            sessionID = "EXEC_NODE_" + Date.now().toString(36);

            // SAVE TO LOCAL STORAGE
            try {
                localStorage.setItem('oriontec_user_session', JSON.stringify({ sessionID: sessionID, name: visitorName }));
            } catch(e) { console.warn("Browser prevented session save."); }

            let loc = "Encrypted Global Node";
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                if(data.city) loc = `${data.city}, ${data.country_name}`;
            } catch(e) {}

            db.ref(`corporate_comms/${sessionID}/profile`).set({
                name: name, father: father, email: email, location: loc, timestamp: Date.now()
            });

            document.getElementById('gateway-screen').style.display = 'none';
            document.getElementById('chat-interface').style.display = 'flex';
            
            initUserChat();
            deploySystemMessages(loc);
        }

        // --- Admin Verification ---
        function verifyAdmin() {
            const pass = document.getElementById('admin-pass').value;
            if(pass === "Ananya2026") {
                // SAVE ADMIN TO LOCAL STORAGE
                try { localStorage.setItem('oriontec_admin_session', 'active'); } catch(e){}
                
                document.getElementById('pass-modal').style.display = 'none';
                document.getElementById('gateway-screen').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'flex';
                loadCommandCenter();
            } else {
                alert("Clearance Denied. Invalid Key.");
            }
        }

        // --- Communications Engine ---
        function deploySystemMessages(loc) {
            setTimeout(() => pushMsg(sessionID, `Network Secured. IP Vector verified from ${loc}.`, "SYSTEM AI", "Protocol"), 1000);
            setTimeout(() => pushMsg(sessionID, `Welcome to the Oriontec Executive Lounge, ${visitorName}. CEO Ananya Rao's office has authorized this connection. An executive will join momentarily.`, "SYSTEM AI", "Protocol"), 4000);
        }

        function handleKey(e, context) {
            const input = document.getElementById(`${context}-msg-input`);
            document.getElementById(`${context}-send-btn`).style.display = input.value.trim().length > 0 ? "block" : "none";
            
            if (e.key === 'Enter') sendMsg(context);

            const target = context === 'user' ? sessionID : adminTarget;
            const flag = context === 'user' ? 'userTyping' : 'adminTyping';
            
            if(target) {
                db.ref(`corporate_comms/${target}/typing/${flag}`).set(true);
                clearTimeout(typingTimer);
                typingTimer = setTimeout(() => db.ref(`corporate_comms/${target}/typing/${flag}`).set(false), 2000);
            }
        }

        function sendMsg(context) {
            const input = document.getElementById(`${context}-msg-input`);
            const text = input.value.trim();
            if(!text) return;

            if(context === 'user') {
                pushMsg(sessionID, text, visitorName, 'Client');
            } else {
                const roleData = document.getElementById('admin-role').value.split('|');
                pushMsg(adminTarget, text, roleData[0], roleData[1]);
            }
            input.value = "";
            document.getElementById(`${context}-send-btn`).style.display = "none";
        }

        function pushMsg(id, text, sender, role, media = null) {
            db.ref(`corporate_comms/${id}/messages`).push({ text, sender, role, media, timestamp: Date.now() });
        }

        function uploadFile(e, context) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    if(context === 'user') pushMsg(sessionID, "Encrypted File Transmitted", visitorName, 'Client', ev.target.result);
                    else {
                        const roleData = document.getElementById('admin-role').value.split('|');
                        pushMsg(adminTarget, "Encrypted File Transmitted", roleData[0], roleData[1], ev.target.result);
                    }
                };
                reader.readAsDataURL(file);
            }
        }

        const parseLinks = (text) => text.replace(/(https?:\/\/[^\s]+)/g, url => `<a href="${url}" target="_blank" style="color:#60a5fa; text-decoration:underline;">${url}</a>`);

        // --- Sync UI ---
        function initUserChat() {
            syncBox(sessionID, 'user');
            db.ref(`corporate_comms/${sessionID}/typing/adminTyping`).on('value', snap => {
                document.getElementById('user-typing-indicator').style.display = snap.val() ? "flex" : "none";
            });
        }

        function syncBox(id, context) {
            const box = document.getElementById(`${context}-chat-box`);
            db.ref(`corporate_comms/${id}/messages`).on('value', snap => {
                box.innerHTML = '';
                snap.forEach(child => {
                    const msg = child.val();
                    const isMine = (context === 'user' && msg.role === 'Client') || (context === 'admin' && msg.role !== 'Client');
                    const msgClass = isMine ? 'msg-sent' : 'msg-received';
                    const senderLabel = isMine ? '' : `<div class="sender-name">${msg.sender} <span style="font-weight:400; text-transform:none;">| ${msg.role}</span></div>`;
                    const mediaTag = msg.media ? `<img src="${msg.media}">` : '';

                    box.innerHTML += `
                        <div class="msg-wrapper ${msgClass}">
                            ${senderLabel}
                            <div class="bubble">${parseLinks(msg.text)}${mediaTag}</div>
                            <div class="msg-time">${formatTime(msg.timestamp)} ${isMine ? '<i class="fas fa-check-double" style="margin-left:4px; color:var(--accent-primary)"></i>' : ''}</div>
                        </div>
                    `;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        // --- Admin Panel Loader ---
        function loadCommandCenter() {
            db.ref('corporate_comms').on('value', snap => {
                const list = document.getElementById('admin-user-list');
                list.innerHTML = '';
                snap.forEach(child => {
                    const p = child.val().profile;
                    if(p) {
                        const uid = child.key;
                        list.innerHTML += `
                            <div class="user-list-item ${uid === adminTarget ? 'active-user' : ''}" onclick="selectUser('${uid}', '${p.name}')">
                                <h4>${p.name}</h4>
                                <p>${p.email}</p>
                                <p style="color:var(--accent-primary); margin-top:5px; font-weight:600;"><i class="fas fa-map-marker-alt"></i> ${p.location}</p>
                            </div>
                        `;
                    }
                });
            });
        }

        function selectUser(id, name) {
            adminTarget = id;
            document.getElementById('admin-target-name').innerText = name;
            document.getElementById('admin-msg-input').disabled = false;
            
            document.querySelectorAll('.user-list-item').forEach(el => el.classList.remove('active-user'));
            event.currentTarget.classList.add('active-user');

            syncBox(id, 'admin');
            
            db.ref(`corporate_comms/${id}/typing/userTyping`).on('value', snap => {
                document.getElementById('admin-typing-indicator').style.display = snap.val() ? "flex" : "none";
            });
        }

        function updateHeader() {
            const role = document.getElementById('admin-role').value.split('|')[0];
            const currentText = document.getElementById('admin-target-name').innerText.split(' (')[0];
            document.getElementById('admin-target-name').innerText = `${currentText} (as ${role})`;
        }
    </script>
</body>
</html>

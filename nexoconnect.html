<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Zoom completely disabled for native app-like feel -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Executive Protocol | Oriontec</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <!-- FontAwesome & Google Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* High-End Dark Mode & Glassmorphism Theme */
        :root {
            --bg-deep: #050505;
            --bg-panel: #111111;
            --border-glow: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent: #2563eb;
            --aura-gradient: linear-gradient(135deg, #1e3a8a, #3b82f6, #93c5fd);
            --msg-received: #1f1f1f;
            --msg-sent: #2563eb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-deep); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; user-select: none; }
        
        a { color: #93c5fd; text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        /* --- Intake Screen --- */
        #intake-screen { width: 100%; max-width: 420px; padding: 40px; text-align: center; background: rgba(17, 17, 17, 0.8); backdrop-filter: blur(20px); border: 1px solid var(--border-glow); border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .intake-logo { font-size: 28px; font-weight: 800; letter-spacing: 2px; margin-bottom: 5px; background: var(--aura-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; }
        .form-input { width: 100%; background: #000; border: 1px solid #333; color: var(--text-main); padding: 16px; border-radius: 10px; margin-bottom: 15px; outline: none; font-size: 14px; transition: 0.3s; }
        .form-input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(37, 99, 235, 0.2); }
        .btn-connect { width: 100%; background: var(--text-main); color: #000; padding: 16px; border: none; border-radius: 10px; font-weight: 800; font-size: 14px; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-connect:hover { background: var(--accent); color: #fff; }

        /* --- Main Chat Interface --- */
        #chat-interface { display: none; width: 100%; max-width: 550px; height: 100vh; background: var(--bg-deep); flex-direction: column; position: relative; border-left: 1px solid #222; border-right: 1px solid #222; }
        
        /* Glassmorphism Header */
        .chat-header { padding: 15px 20px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 15px; background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(15px); position: absolute; top: 0; width: 100%; z-index: 10; }
        .header-avatar { width: 46px; height: 46px; border-radius: 50%; background: var(--aura-gradient); padding: 2px; position: relative; }
        .header-avatar img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid #000; object-fit: cover; }
        .online-dot { position: absolute; bottom: 0; right: 0; width: 12px; height: 12px; background: #10b981; border: 2px solid #000; border-radius: 50%; }
        
        .header-info { flex: 1; }
        .header-info h2 { font-size: 16px; font-weight: 800; display: flex; align-items: center; gap: 5px; }
        .verified-badge { color: var(--accent); font-size: 13px; }
        .header-info p { font-size: 11px; color: var(--text-muted); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }

        .chat-box { flex: 1; padding: 90px 20px 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; }
        
        /* Message Bubbles */
        .msg-wrapper { display: flex; flex-direction: column; max-width: 80%; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-received { align-self: flex-start; }
        .msg-sent { align-self: flex-end; align-items: flex-end; }
        
        .sender-name { font-size: 10px; color: var(--accent); margin-bottom: 5px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .bubble { padding: 14px 18px; border-radius: 20px; font-size: 15px; line-height: 1.5; word-wrap: break-word; user-select: text; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .msg-received .bubble { background: var(--msg-received); border-top-left-radius: 4px; border: 1px solid #222; }
        .msg-sent .bubble { background: var(--msg-sent); border-top-right-radius: 4px; color: #fff; }
        
        .bubble img { max-width: 100%; border-radius: 12px; margin-top: 8px; cursor: pointer; }
        .msg-time { font-size: 10px; color: var(--text-muted); margin-top: 5px; font-weight: 600; display: flex; align-items: center; gap: 4px; }

        /* Typing Indicator Animation */
        .typing-indicator { display: none; padding: 0 20px 10px; align-items: center; gap: 5px; }
        .dot { width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%; animation: blink 1.4s infinite both; }
        .dot:nth-child(1) { animation-delay: 0.2s; } .dot:nth-child(2) { animation-delay: 0.4s; } .dot:nth-child(3) { animation-delay: 0.6s; }
        @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }
        .typing-text { font-size: 11px; color: var(--text-muted); margin-left: 5px; font-weight: 600; }

        /* Input Area */
        .chat-input-area { padding: 15px 20px; background: var(--bg-deep); border-top: 1px solid #222; display: flex; align-items: center; gap: 12px; z-index: 10; }
        .icon-btn { background: none; border: none; color: var(--text-muted); font-size: 22px; cursor: pointer; transition: 0.2s; }
        .icon-btn:hover { color: var(--text-main); }
        .input-wrapper { flex: 1; background: #111; border: 1px solid #333; border-radius: 24px; padding: 12px 18px; display: flex; align-items: center; }
        .input-wrapper input { width: 100%; background: none; border: none; color: var(--text-main); outline: none; font-size: 15px; }
        .send-btn { color: var(--accent); font-weight: 800; font-size: 14px; text-transform: uppercase; display: none; cursor: pointer; }

        /* --- Admin Dashboard --- */
        #admin-panel { display: none; width: 100%; max-width: 1300px; height: 95vh; background: var(--bg-deep); border: 1px solid #222; border-radius: 16px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .admin-layout { display: flex; height: 100%; }
        .admin-sidebar { width: 320px; background: #0a0a0a; border-right: 1px solid #222; display: flex; flex-direction: column; }
        
        .admin-header { padding: 25px 20px; border-bottom: 1px solid #222; background: #111; }
        .role-selector { background: #000; color: var(--text-main); border: 1px solid #333; padding: 12px; border-radius: 8px; width: 100%; margin-top: 15px; font-weight: 600; outline: none; font-size: 13px; cursor: pointer; }
        
        .user-list { flex: 1; overflow-y: auto; }
        .user-list-item { padding: 18px 20px; border-bottom: 1px solid #222; cursor: pointer; transition: 0.2s; border-left: 3px solid transparent; }
        .user-list-item:hover, .user-list-item.active-user { background: #111; border-left-color: var(--accent); }
        .user-list-item h4 { font-size: 14px; margin-bottom: 5px; font-weight: 800; }
        .user-list-item p { font-size: 11px; color: var(--text-muted); line-height: 1.4; }
        .geo-tag { display: inline-block; background: rgba(37, 99, 235, 0.2); color: #93c5fd; padding: 2px 6px; border-radius: 4px; font-size: 9px; margin-top: 5px; text-transform: uppercase; font-weight: 800; }

        .admin-main { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        /* Modal for Admin Login */
        #password-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: none; justify-content: center; align-items: center; }
        .pass-box { background: #111; padding: 30px; border-radius: 12px; border: 1px solid #333; width: 300px; text-align: center; }
    </style>
</head>
<body>

    <!-- Admin Password Prompt -->
    <div id="password-modal">
        <div class="pass-box">
            <h3 style="margin-bottom: 15px; font-weight: 800;">Admin Authentication</h3>
            <input type="password" id="admin-pass" class="form-input" placeholder="Enter Secure Key">
            <button class="btn-connect" onclick="loginAdmin()">Verify</button>
        </div>
    </div>

    <!-- 1. Executive Intake Form -->
    <div id="intake-screen">
        <div class="intake-logo">OFFICE OF THE CEO</div>
        <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 30px; font-weight: 600;">Secure transmission gateway to Ananya Rao.</p>
        
        <input type="text" id="entry-name" class="form-input" placeholder="Full Legal Name" required>
        <input type="text" id="entry-father" class="form-input" placeholder="Father's Name (Required for Clearance)" required>
        <input type="email" id="entry-email" class="form-input" placeholder="Professional Email" required>
        
        <button class="btn-connect" onclick="startVerification()">Request Executive Access</button>
        <p style="font-size: 10px; color: #555; margin-top: 25px; font-weight: 600;">ENCRYPTED CONNECTION • IP LOGGED</p>
    </div>

    <!-- 2. Main User Chat Interface -->
    <div id="chat-interface">
        <div class="chat-header">
            <div class="header-avatar">
                <!-- Professional Corporate Avatar -->
                <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?w=150" alt="CEO">
                <div class="online-dot"></div>
            </div>
            <div class="header-info">
                <h2 id="active-header-name">Ananya Rao <i class="fas fa-certificate verified-badge"></i></h2>
                <p id="active-header-title">Chief Executive Officer</p>
            </div>
            <i class="fas fa-shield-alt" style="color: #4ade80; font-size: 18px;" title="Encrypted"></i>
        </div>

        <div class="chat-box" id="user-chat-box"></div>
        
        <div class="typing-indicator" id="user-typing-indicator">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <span class="typing-text">Ananya Rao is typing...</span>
        </div>

        <div class="chat-input-area">
            <button class="icon-btn" onclick="document.getElementById('user-media').click()"><i class="fas fa-plus-circle"></i></button>
            <input type="file" id="user-media" accept="image/*" style="display: none;" onchange="uploadMedia(event, 'user')">
            <button class="icon-btn" onclick="alert('Voice transmission securely locked for this tier.')"><i class="fas fa-microphone"></i></button>
            
            <div class="input-wrapper">
                <input type="text" id="user-msg-input" placeholder="Type your message..." onkeyup="handleTyping('user', event)">
                <span class="send-btn" id="user-send-btn" onclick="dispatchMessage('user')">Send</span>
            </div>
        </div>
    </div>

    <!-- 3. Hidden Admin Command Center -->
    <div id="admin-panel">
        <div class="admin-layout">
            <div class="admin-sidebar">
                <div class="admin-header">
                    <h3 style="font-weight: 900; letter-spacing: 1px;">EXECUTIVE HUB</h3>
                    <select class="role-selector" id="admin-role-selector" onchange="updateAdminRole()">
                        <option value="Ananya Rao|Chief Executive Officer">Operate as: Ananya Rao (CEO)</option>
                        <option value="Executive Board|Vice President">Operate as: Vice President</option>
                        <option value="Regional HQ|India Managing Director">Operate as: India Managing Director</option>
                    </select>
                </div>
                <div class="user-list" id="admin-users-list"></div>
            </div>
            
            <div class="admin-main">
                <div class="chat-header">
                    <div class="header-info">
                        <h2>Monitoring Link: <span id="admin-viewing-user" style="color: var(--accent);">Select Node</span></h2>
                    </div>
                </div>
                
                <div class="chat-box" id="admin-chat-box">
                    <p style="text-align: center; color: #444; margin-top: 50px; font-weight: 800;">AWAITING NODE SELECTION</p>
                </div>

                <div class="typing-indicator" id="admin-typing-indicator">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                    <span class="typing-text">User is typing...</span>
                </div>

                <div class="chat-input-area">
                    <button class="icon-btn" onclick="document.getElementById('admin-media').click()"><i class="fas fa-image"></i></button>
                    <input type="file" id="admin-media" accept="image/*" style="display: none;" onchange="uploadMedia(event, 'admin')">
                    <div class="input-wrapper">
                        <input type="text" id="admin-msg-input" placeholder="Deploy Executive Response..." onkeyup="handleTyping('admin', event)" disabled>
                        <span class="send-btn" id="admin-send-btn" onclick="dispatchMessage('admin')">Send</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Firebase System Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyC30TcmMVhP_8HdFYS1WufRiZwSDYNMTF0",
            authDomain: "pulse2-92372.firebaseapp.com",
            databaseURL: "https://pulse2-92372-default-rtdb.firebaseio.com",
            projectId: "pulse2-92372"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let activeUID = ""; 
        let activeName = "";
        let adminTrackingUID = "";
        let typingTimeout = null;

        // Formats time nicely e.g., "10:45 PM"
        const formatTime = (ts) => new Intl.DateTimeFormat('en-US', { hour: 'numeric', minute: 'numeric', hour12: true }).format(new Date(ts));

        // --- 2. Security Intake & API Tracker ---
        async function startVerification() {
            const name = document.getElementById('entry-name').value;
            const father = document.getElementById('entry-father').value;
            const email = document.getElementById('entry-email').value;

            if(!name || !father || !email) return alert("System Requires All Fields for Clearance.");

            // ADMIN TRIGGER
            if(email === "admin@oriontec.com") {
                document.getElementById('password-modal').style.display = "flex";
                return;
            }

            // Normal User Flow - Fetch Location via Free API
            let userLocation = "Unknown Vector";
            document.querySelector('.btn-connect').innerText = "Securing Connection...";
            
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                if(data.city && data.country_name) userLocation = `${data.city}, ${data.country_name}`;
            } catch (e) { console.warn("Location tracking bypass detected."); }

            // Firebase Anonymous Auth for Users
            try {
                const cred = await auth.signInAnonymously();
                activeUID = cred.user.uid;
                activeName = name;

                // Create Profile Node
                await db.ref(`executive_protocol/${activeUID}/profile`).set({
                    name: name,
                    father: father,
                    email: email,
                    location: userLocation,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });

                // UI Transition
                document.getElementById('intake-screen').style.display = "none";
                document.getElementById('chat-interface').style.display = "flex";

                syncChat(activeUID, 'user');
                deployAIAura(userLocation);

            } catch (err) {
                alert("Connection Failed: " + err.message);
                document.querySelector('.btn-connect').innerText = "Request Executive Access";
            }
        }

        // --- 3. Admin Authentication Logic ---
        async function loginAdmin() {
            const pass = document.getElementById('admin-pass').value;
            if(!pass) return;
            try {
                // Since this is a standalone demo, if the user hasn't created this admin user in their firebase auth, 
                // we simulate the login via a hardcoded password for demonstration. 
                // For real production, use: await auth.signInWithEmailAndPassword("admin@oriontec.com", pass);
                if(pass === "Ananya2026") {
                    document.getElementById('password-modal').style.display = "none";
                    document.getElementById('intake-screen').style.display = "none";
                    document.getElementById('admin-panel').style.display = "flex";
                    initializeAdminCommand();
                } else {
                    alert("Incorrect Security Key.");
                }
            } catch (e) { alert(e.message); }
        }

        // --- 4. Artificial Intelligence "Aura" Engine ---
        function deployAIAura(loc) {
            // First Message
            setTimeout(() => {
                pushDB(activeUID, `System Identity Verified. Secure tunnel established from ${loc}.`, "ORIONTEC AI", "System Protocol");
            }, 1500);

            // Second Message (The Impression)
            setTimeout(() => {
                pushDB(activeUID, `Please hold, ${activeName}. The office of CEO Ananya Rao has been notified of your clearance. Ms. Rao or a designated Executive Board Member will connect with you shortly.`, "ORIONTEC AI", "System Protocol");
            }, 4000);
        }

        // --- 5. Message Core Functions ---
        function handleTyping(context, e) {
            const input = document.getElementById(`${context}-msg-input`);
            document.getElementById(`${context}-send-btn`).style.display = input.value.trim().length > 0 ? "block" : "none";
            
            if (e.key === 'Enter') dispatchMessage(context);

            // Database Typing Flag
            const targetUID = context === 'user' ? activeUID : adminTrackingUID;
            const flagNode = context === 'user' ? 'userTyping' : 'adminTyping';
            
            if(targetUID) {
                db.ref(`executive_protocol/${targetUID}/typing/${flagNode}`).set(true);
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    db.ref(`executive_protocol/${targetUID}/typing/${flagNode}`).set(false);
                }, 2000);
            }
        }

        function dispatchMessage(context) {
            const inputEl = document.getElementById(`${context}-msg-input`);
            const text = inputEl.value.trim();
            if(!text) return;

            if(context === 'user') {
                pushDB(activeUID, text, activeName, 'User');
            } else if (context === 'admin') {
                const roleParts = document.getElementById('admin-role-selector').value.split('|');
                pushDB(adminTrackingUID, text, roleParts[0], roleParts[1]);
            }

            inputEl.value = "";
            document.getElementById(`${context}-send-btn`).style.display = "none";
        }

        function pushDB(uid, text, sender, role, media = null) {
            db.ref(`executive_protocol/${uid}/messages`).push({
                text: text,
                sender: sender,
                role: role,
                media: media,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
        }

        // Base64 Images
        function uploadMedia(event, context) {
            const file = event.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    if(context === 'user') pushDB(activeUID, "Attached Encrypted Image", activeName, 'User', e.target.result);
                    if(context === 'admin') {
                        const roleParts = document.getElementById('admin-role-selector').value.split('|');
                        pushDB(adminTrackingUID, "Attached Encrypted Image", roleParts[0], roleParts[1], e.target.result);
                    }
                };
                reader.readAsDataURL(file);
            }
        }

        // Clickable URL Parser
        const linkify = (text) => text.replace(/(https?:\/\/[^\s]+)/g, url => `<a href="${url}" target="_blank">${url}</a>`);

        // --- 6. Real-Time Chat Sync ---
        function syncChat(uid, context) {
            const chatBox = document.getElementById(`${context}-chat-box`);
            const indicator = document.getElementById(`${context}-typing-indicator`);

            // Listen for Messages
            db.ref(`executive_protocol/${uid}/messages`).on('value', (snapshot) => {
                chatBox.innerHTML = '';
                snapshot.forEach(child => {
                    const msg = child.val();
                    let isMine = (context === 'user' && msg.role === 'User') || (context === 'admin' && msg.role !== 'User');
                    
                    const msgClass = isMine ? 'msg-sent' : 'msg-received';
                    const senderTag = isMine ? '' : `<div class="sender-name">${msg.sender} <span style="color:#666">| ${msg.role}</span></div>`;
                    const mediaTag = msg.media ? `<img src="${msg.media}">` : '';
                    
                    chatBox.innerHTML += `
                        <div class="msg-wrapper ${msgClass}">
                            ${senderTag}
                            <div class="bubble">${linkify(msg.text)}${mediaTag}</div>
                            <div class="msg-time">${formatTime(msg.timestamp)} ${isMine ? '<i class="fas fa-check-double" style="color:var(--accent); margin-left:4px;"></i>' : ''}</div>
                        </div>
                    `;
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            });

            // Listen for Typing Activity
            const typingListenNode = context === 'user' ? 'adminTyping' : 'userTyping';
            db.ref(`executive_protocol/${uid}/typing/${typingListenNode}`).on('value', (snap) => {
                indicator.style.display = snap.val() ? "flex" : "none";
                if(snap.val()) chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        // --- 7. Admin Features ---
        function initializeAdminCommand() {
            db.ref('executive_protocol').on('value', (snapshot) => {
                const list = document.getElementById('admin-users-list');
                list.innerHTML = '';
                snapshot.forEach(child => {
                    const profile = child.val().profile;
                    if(profile) {
                        const uid = child.key;
                        list.innerHTML += `
                            <div class="user-list-item ${uid === adminTrackingUID ? 'active-user' : ''}" onclick="openNode('${uid}', '${profile.name}')">
                                <h4>${profile.name}</h4>
                                <p>${profile.email}</p>
                                <span class="geo-tag"><i class="fas fa-map-marker-alt"></i> ${profile.location}</span>
                            </div>
                        `;
                    }
                });
            });
        }

        function openNode(uid, name) {
            adminTrackingUID = uid;
            document.getElementById('admin-viewing-user').innerText = name;
            document.getElementById('admin-msg-input').disabled = false;
            
            // Re-render user list to highlight active
            document.querySelectorAll('.user-list-item').forEach(el => el.classList.remove('active-user'));
            event.currentTarget.classList.add('active-user');

            syncChat(uid, 'admin');
        }

        function updateAdminRole() {
            // Updates header dynamically for Admin visually
            const role = document.getElementById('admin-role-selector').value.split('|')[0];
            document.getElementById('admin-viewing-user').innerText += ` (as ${role})`;
        }
    </script>
</body>
</html>

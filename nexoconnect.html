<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Encrypted Channel | Oriontec</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- Modern Tech CEO Theme (Obsidian & Electric Blue) --- */
        :root {
            --bg-base: #000000;
            --bg-panel: #0A0A0A;
            --bg-input: #121212;
            --border-subtle: #27272A;
            --accent-blue: #007AFF; /* Corporate Apple Blue */
            --accent-hover: #005bb5;
            --text-main: #FFFFFF;
            --text-muted: #A1A1AA;
            --system-green: #34C759;
            --system-red: #FF3B30;
        }

        /* Bulletproof anti-zoom and anti-scroll-bounce css */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: pan-x pan-y; }
        
        body { 
            background-color: var(--bg-base); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            height: 100vh; height: 100dvh; /* For mobile safari */
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overscroll-behavior-y: none; /* Stops pull-to-refresh bounce */
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

        /* --- 1. Security Gateway (Intake Screen) --- */
        #gateway-screen { 
            width: 100%; max-width: 400px; padding: 40px; 
            background: var(--bg-panel); 
            border: 1px solid var(--border-subtle); border-radius: 12px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); 
            text-align: center; transition: opacity 0.5s ease; 
        }
        
        .gateway-logo { font-size: 20px; font-weight: 800; letter-spacing: 1px; margin-bottom: 25px; color: var(--text-main); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .gateway-logo i { color: var(--accent-blue); font-size: 24px; }
        
        /* 16px font-size is MANDATORY to stop iOS Safari from zooming in on focus */
        .form-input { 
            width: 100%; background: var(--bg-input); border: 1px solid var(--border-subtle); 
            color: var(--text-main); padding: 14px 16px; border-radius: 8px; margin-bottom: 12px; 
            outline: none; font-size: 16px !important; font-weight: 500; transition: 0.2s; 
        }
        .form-input:focus { border-color: var(--accent-blue); }
        .form-input::placeholder { color: #52525B; font-weight: 400; }

        .btn-primary { 
            width: 100%; background: var(--accent-blue); color: #fff; 
            border: none; border-radius: 8px; padding: 16px; font-family: 'Inter', sans-serif; 
            font-size: 16px !important; font-weight: 600; cursor: pointer; transition: 0.2s; 
            margin-top: 10px; 
        }
        .btn-primary:active { background: var(--accent-hover); transform: scale(0.98); }

        .sys-text { font-size: 11px; color: var(--text-muted); margin-top: 20px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }

        /* --- 2. Main Chat Interface --- */
        #chat-interface { 
            display: none; width: 100%; max-width: 500px; height: 100vh; height: 100dvh;
            background: var(--bg-base); flex-direction: column; position: relative; 
            border-left: 1px solid var(--border-subtle); border-right: 1px solid var(--border-subtle); 
            opacity: 0; transition: opacity 0.5s ease;
        }

        .chat-header { 
            padding: 16px 20px; border-bottom: 1px solid var(--border-subtle); 
            display: flex; align-items: center; gap: 12px; background: rgba(10,10,10,0.95); backdrop-filter: blur(10px); z-index: 10;
        }
        .ceo-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
        .header-info { flex: 1; }
        .header-info h2 { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
        .verified-badge { color: var(--accent-blue); font-size: 14px; }
        .header-info p { font-size: 12px; color: var(--text-muted); font-weight: 500; margin-top: 2px; }
        .secure-badge { background: rgba(52, 199, 89, 0.15); color: var(--system-green); padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; }

        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
        
        .msg-wrapper { display: flex; flex-direction: column; max-width: 80%; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-received { align-self: flex-start; }
        .msg-sent { align-self: flex-end; align-items: flex-end; }
        
        .sender-name { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; }
        
        .bubble { padding: 12px 16px; font-size: 15px; line-height: 1.5; border-radius: 18px; word-wrap: break-word; }
        .msg-received .bubble { background: var(--bg-input); border: 1px solid var(--border-subtle); border-bottom-left-radius: 4px; }
        .msg-sent .bubble { background: var(--accent-blue); color: #fff; border-bottom-right-radius: 4px; }
        .bubble img { max-width: 100%; border-radius: 8px; margin-top: 8px; }
        
        .msg-time { font-size: 10px; color: #71717A; margin-top: 6px; font-weight: 500; }

        /* Typing Indicator */
        .typing-indicator { display: none; padding: 0 20px 10px; align-items: center; gap: 8px; }
        .typing-text { font-size: 12px; color: var(--text-muted); font-weight: 500; }

        /* Input Area */
        .input-area { 
            padding: 12px 16px; background: var(--bg-panel); border-top: 1px solid var(--border-subtle); 
            display: flex; align-items: center; gap: 12px; padding-bottom: max(12px, env(safe-area-inset-bottom));
        }
        .icon-btn { background: none; border: none; color: var(--text-muted); font-size: 22px; cursor: pointer; }
        .input-wrapper { flex: 1; background: var(--bg-input); border: 1px solid var(--border-subtle); border-radius: 24px; padding: 10px 16px; display: flex; align-items: center; }
        .input-wrapper input { width: 100%; background: transparent; border: none; color: var(--text-main); font-size: 16px !important; outline: none; }
        .send-btn { color: var(--accent-blue); font-weight: 700; font-size: 14px; cursor: pointer; display: none; }

        /* --- 3. Admin Command Center --- */
        #admin-panel { 
            display: none; width: 100%; max-width: 1200px; height: 90vh; 
            background: var(--bg-base); border: 1px solid var(--border-subtle); border-radius: 12px; overflow: hidden; 
        }
        .admin-layout { display: flex; height: 100%; }
        .admin-sidebar { width: 320px; background: var(--bg-panel); border-right: 1px solid var(--border-subtle); display: flex; flex-direction: column; }
        
        .admin-header { padding: 20px; border-bottom: 1px solid var(--border-subtle); }
        .role-selector { 
            background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border-subtle); 
            padding: 12px; border-radius: 8px; width: 100%; margin-top: 16px; font-weight: 600; font-size: 14px; outline: none; 
        }
        
        .user-list { flex: 1; overflow-y: auto; }
        .user-list-item { padding: 16px 20px; border-bottom: 1px solid var(--border-subtle); cursor: pointer; border-left: 3px solid transparent; }
        .user-list-item:hover, .user-list-item.active-user { background: var(--bg-input); border-left-color: var(--accent-blue); }
        .user-list-item h4 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .user-list-item p { font-size: 12px; color: var(--text-muted); }

        .admin-main { flex: 1; display: flex; flex-direction: column; }

        /* Admin Login Modal */
        #pass-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .pass-box { background: var(--bg-panel); padding: 30px; border-radius: 12px; border: 1px solid var(--border-subtle); width: 320px; text-align: center; }
    </style>
</head>
<body>

    <div id="pass-modal">
        <div class="pass-box">
            <h3 style="margin-bottom: 20px; font-weight: 700;">Command Center Override</h3>
            <input type="password" id="admin-pass" class="form-input" placeholder="Enter Security Key" required>
            <button class="btn-primary" onclick="verifyAdmin()">Authorize</button>
        </div>
    </div>

    <div id="gateway-screen">
        <div class="gateway-logo"><i class="fas fa-layer-group"></i> ORIONTEC</div>
        <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 24px; font-weight: 500;">Secure connection to the Office of the CEO</p>
        
        <input type="text" id="entry-name" class="form-input" placeholder="Full Legal Name" required>
        <input type="text" id="entry-father" class="form-input" placeholder="Father's Name (Clearance ID)" required>
        <input type="email" id="entry-email" class="form-input" placeholder="Registered Email" required>
        
        <button class="btn-primary" onclick="requestEntry()" id="btn-submit">Establish Connection</button>
        <p class="sys-text"><i class="fas fa-lock"></i> End-to-End Encrypted Tunnel</p>
    </div>

    <div id="chat-interface">
        <div class="chat-header">
            <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?w=150" class="ceo-avatar" alt="CEO">
            <div class="header-info">
                <h2>Ananya Rao <i class="fas fa-check-circle verified-badge"></i></h2>
                <p>Chief Executive Officer</p>
            </div>
            <div class="secure-badge">SECURE</div>
        </div>

        <div class="chat-box" id="user-chat-box"></div>
        
        <div class="typing-indicator" id="user-typing-indicator">
            <i class="fas fa-circle-notch fa-spin" style="color: var(--text-muted); font-size: 14px;"></i>
            <span class="typing-text">Ananya Rao is typing...</span>
        </div>

        <div class="input-area">
            <button class="icon-btn" onclick="document.getElementById('user-media').click()"><i class="fas fa-plus"></i></button>
            <input type="file" id="user-media" accept="image/*" style="display: none;" onchange="uploadFile(event, 'user')">
            
            <div class="input-wrapper">
                <input type="text" id="user-msg-input" placeholder="Message..." onkeyup="handleKey(event, 'user')">
                <span class="send-btn" id="user-send-btn" onclick="sendMsg('user')">Send</span>
            </div>
        </div>
    </div>

    <div id="admin-panel">
        <div class="admin-layout">
            <div class="admin-sidebar">
                <div class="admin-header">
                    <h3 style="font-weight: 700; letter-spacing: 0.5px;">COMMAND CENTER</h3>
                    <select class="role-selector" id="admin-role" onchange="updateHeader()">
                        <option value="Ananya Rao|Chief Executive Officer">Respond as: Ananya Rao (CEO)</option>
                        <option value="Executive Board|Vice President">Respond as: Vice President</option>
                        <option value="Regional Office|India Managing Director">Respond as: India MD</option>
                    </select>
                </div>
                <div class="user-list" id="admin-user-list"></div>
            </div>
            
            <div class="admin-main">
                <div class="chat-header">
                    <div class="header-info">
                        <h2>Monitoring: <span id="admin-target-name" style="color: var(--text-muted);">Select a connection</span></h2>
                    </div>
                </div>
                
                <div class="chat-box" id="admin-chat-box"></div>

                <div class="typing-indicator" id="admin-typing-indicator">
                    <i class="fas fa-circle-notch fa-spin" style="color: var(--text-muted); font-size: 14px;"></i>
                    <span class="typing-text">Client is typing...</span>
                </div>

                <div class="input-area">
                    <button class="icon-btn" onclick="document.getElementById('admin-media').click()"><i class="fas fa-image"></i></button>
                    <input type="file" id="admin-media" accept="image/*" style="display: none;" onchange="uploadFile(event, 'admin')">
                    <div class="input-wrapper">
                        <input type="text" id="admin-msg-input" placeholder="Type response..." onkeyup="handleKey(event, 'admin')" disabled>
                        <span class="send-btn" id="admin-send-btn" onclick="sendMsg('admin')">Send</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- BULLETPROOF ZOOM & BOUNCE PREVENTION FOR MOBILE ---
        document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
        document.addEventListener('touchmove', function(e) { if(e.touches.length > 1) { e.preventDefault(); } }, { passive: false });
        // Prevent double tap to zoom
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (event) {
            let now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) { event.preventDefault(); }
            lastTouchEnd = now;
        }, false);

        // --- 1. System Config (No Firebase Auth) ---
        const firebaseConfig = {
            apiKey: "AIzaSyC30TcmMVhP_8HdFYS1WufRiZwSDYNMTF0",
            databaseURL: "https://pulse2-92372-default-rtdb.firebaseio.com",
            projectId: "pulse2-92372"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let sessionID = "";
        let visitorName = "";
        let adminTarget = "";
        let typingTimer = null;

        const formatTime = (ts) => new Intl.DateTimeFormat('en-US', { hour: 'numeric', minute: 'numeric', hour12: true }).format(new Date(ts));

        // --- 2. Security Gateway ---
        async function requestEntry() {
            const name = document.getElementById('entry-name').value.trim();
            const father = document.getElementById('entry-father').value.trim();
            const email = document.getElementById('entry-email').value.trim();

            if(!name || !father || !email) return alert("System requires all fields.");

            if(email.toLowerCase() === "admin@oriontec.com") {
                document.getElementById('pass-modal').style.display = "flex";
                return;
            }

            const btn = document.getElementById('btn-submit');
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Authenticating...';
            btn.disabled = true;

            visitorName = name;
            sessionID = "REQ_" + Date.now().toString(36);

            let loc = "Encrypted Connection";
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                if(data.city) loc = `${data.city}, ${data.country_name}`;
            } catch(e) {}

            db.ref(`comms_network/${sessionID}/profile`).set({
                name: name, father: father, email: email, location: loc, timestamp: Date.now()
            });

            setTimeout(() => {
                document.getElementById('gateway-screen').style.display = 'none';
                const chatUI = document.getElementById('chat-interface');
                chatUI.style.display = 'flex';
                setTimeout(() => chatUI.style.opacity = '1', 50);
                
                initUserChat();
                deploySystemMessages(loc);
            }, 1000);
        }

        // --- 3. Admin Verification ---
        function verifyAdmin() {
            const pass = document.getElementById('admin-pass').value;
            if(pass === "Ananya2026") {
                document.getElementById('pass-modal').style.display = 'none';
                document.getElementById('gateway-screen').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'flex';
                loadCommandCenter();
            } else {
                alert("Incorrect Security Key.");
            }
        }

        // --- 4. System Logic & Messages ---
        function deploySystemMessages(loc) {
            setTimeout(() => {
                pushMsg(sessionID, `Identity verified. Encrypted tunnel established from ${loc}.`, "SYSTEM", "Automated");
            }, 1000);

            setTimeout(() => {
                pushMsg(sessionID, `Welcome to the Executive Network, ${visitorName}. CEO Ananya Rao's office is active. She or an Executive Board Member will respond shortly.`, "SYSTEM", "Automated");
            }, 3500);
        }

        function handleKey(e, context) {
            const input = document.getElementById(`${context}-msg-input`);
            document.getElementById(`${context}-send-btn`).style.display = input.value.trim().length > 0 ? "block" : "none";
            
            if (e.key === 'Enter') sendMsg(context);

            const target = context === 'user' ? sessionID : adminTarget;
            const flag = context === 'user' ? 'userTyping' : 'adminTyping';
            
            if(target) {
                db.ref(`comms_network/${target}/typing/${flag}`).set(true);
                clearTimeout(typingTimer);
                typingTimer = setTimeout(() => {
                    db.ref(`comms_network/${target}/typing/${flag}`).set(false);
                }, 2000);
            }
        }

        function sendMsg(context) {
            const input = document.getElementById(`${context}-msg-input`);
            const text = input.value.trim();
            if(!text) return;

            if(context === 'user') {
                pushMsg(sessionID, text, visitorName, 'Client');
            } else {
                const roleData = document.getElementById('admin-role').value.split('|');
                pushMsg(adminTarget, text, roleData[0], roleData[1]);
            }

            input.value = "";
            document.getElementById(`${context}-send-btn`).style.display = "none";
        }

        function pushMsg(id, text, sender, role, media = null) {
            db.ref(`comms_network/${id}/messages`).push({ text, sender, role, media, timestamp: Date.now() });
        }

        function uploadFile(e, context) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    if(context === 'user') pushMsg(sessionID, "Sent an attachment", visitorName, 'Client', ev.target.result);
                    else {
                        const roleData = document.getElementById('admin-role').value.split('|');
                        pushMsg(adminTarget, "Sent an attachment", roleData[0], roleData[1], ev.target.result);
                    }
                };
                reader.readAsDataURL(file);
            }
        }

        const parseLinks = (text) => text.replace(/(https?:\/\/[^\s]+)/g, url => `<a href="${url}" target="_blank" style="color:var(--accent-blue); text-decoration:underline;">${url}</a>`);

        // --- 5. Sync Data ---
        function initUserChat() {
            syncBox(sessionID, 'user');
            db.ref(`comms_network/${sessionID}/typing/adminTyping`).on('value', snap => {
                document.getElementById('user-typing-indicator').style.display = snap.val() ? "flex" : "none";
            });
        }

        function syncBox(id, context) {
            const box = document.getElementById(`${context}-chat-box`);
            db.ref(`comms_network/${id}/messages`).on('value', snap => {
                box.innerHTML = '';
                snap.forEach(child => {
                    const msg = child.val();
                    const isMine = (context === 'user' && msg.role === 'Client') || (context === 'admin' && msg.role !== 'Client');
                    const msgClass = isMine ? 'msg-sent' : 'msg-received';
                    const senderLabel = isMine ? '' : `<div class="sender-name">${msg.sender} <span style="font-weight:400">| ${msg.role}</span></div>`;
                    const mediaTag = msg.media ? `<img src="${msg.media}">` : '';

                    box.innerHTML += `
                        <div class="msg-wrapper ${msgClass}">
                            ${senderLabel}
                            <div class="bubble">${parseLinks(msg.text)}${mediaTag}</div>
                            <div class="msg-time">${formatTime(msg.timestamp)}</div>
                        </div>
                    `;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        // --- 6. Admin Panel Functions ---
        function loadCommandCenter() {
            db.ref('comms_network').on('value', snap => {
                const list = document.getElementById('admin-user-list');
                list.innerHTML = '';
                snap.forEach(child => {
                    const p = child.val().profile;
                    if(p) {
                        const uid = child.key;
                        list.innerHTML += `
                            <div class="user-list-item ${uid === adminTarget ? 'active-user' : ''}" onclick="selectUser('${uid}', '${p.name}')">
                                <h4>${p.name}</h4>
                                <p>${p.email}</p>
                                <p style="color:var(--accent-blue); margin-top:4px;"><i class="fas fa-globe"></i> ${p.location}</p>
                            </div>
                        `;
                    }
                });
            });
        }

        function selectUser(id, name) {
            adminTarget = id;
            document.getElementById('admin-target-name').innerText = name;
            document.getElementById('admin-msg-input').disabled = false;
            
            document.querySelectorAll('.user-list-item').forEach(el => el.classList.remove('active-user'));
            event.currentTarget.classList.add('active-user');

            syncBox(id, 'admin');
            
            db.ref(`comms_network/${id}/typing/userTyping`).on('value', snap => {
                document.getElementById('admin-typing-indicator').style.display = snap.val() ? "flex" : "none";
            });
        }

        function updateHeader() {
            const role = document.getElementById('admin-role').value.split('|')[0];
            const currentText = document.getElementById('admin-target-name').innerText.split(' (')[0];
            document.getElementById('admin-target-name').innerText = `${currentText} (Operating as ${role})`;
        }
    </script>
</body>
</html>

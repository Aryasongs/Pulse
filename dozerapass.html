<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied - Oriontec Security Systems</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at 50% 50%, #0a0813 0%, #020104 100%);
            color: #f3f4f6;
            min-height: 100vh;
            overflow: hidden;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.7);
        }
        .brand-gradient {
            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 50%, #7f1d1d 100%);
        }
        .text-gradient {
            background: linear-gradient(135deg, #ffffff 40%, #f87171 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 6px 100%;
            z-index: 20;
            pointer-events: none;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="scanlines"></div>

    <main class="w-full max-w-lg z-10">
        <div class="glass-panel rounded-3xl p-8 text-center relative overflow-hidden border-t-2 border-t-red-600">
            
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-red-950/40 border border-red-500/30 text-red-500 text-3xl mb-6 shadow-2xl shadow-red-500/10">
                <i class="fa-solid fa-shield-xenon animate-pulse"></i>
            </div>

            <h1 class="text-2xl font-black tracking-tight text-gradient mb-2 uppercase font-mono">Website Blocked</h1>
            <p class="text-sm text-gray-400 max-w-sm mx-auto mb-6">
                Access to this endpoint has been strictly restricted and intercepted by <span class="text-red-400 font-bold font-mono">Oriontec Infrastructure Security</span>.
            </p>

            <div class="bg-black/60 border border-white/5 rounded-2xl p-4 text-left font-mono text-xs text-gray-500 space-y-2">
                <div class="flex justify-between">
                    <span>SECURITY NODE:</span>
                    <span class="text-red-400 font-bold">ORIONTEC-FW-ACTIVE</span>
                </div>
                <div class="flex justify-between">
                    <span>ACCESS STATUS:</span>
                    <span class="text-gray-400">TERMINATED / REVOKED</span>
                </div>
                <div class="flex justify-between">
                    <span>STANCE ACTION:</span>
                    <span class="text-gray-400">IP LOGGED & BOUNDED</span>
                </div>
            </div>

            <div class="mt-8 pt-4 border-t border-white/5 flex items-center justify-center gap-2 text-[11px] text-gray-600 font-mono tracking-widest uppercase">
                <i class="fa-solid fa-microchip text-red-600/60"></i> Oriontec Core Network Guard
            </div>
        </div>
    </main>

</body>
</html>

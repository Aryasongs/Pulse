<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse - Secure Master Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-neutral-950 text-white font-sans min-h-screen flex items-center justify-center p-4">

  <div id="admin-auth-box" class="w-full max-w-md bg-neutral-900 border border-neutral-800 rounded-3xl p-6 shadow-2xl space-y-4 block">
    <div class="text-center mb-2">
      <div class="bg-gradient-to-r from-red-500 to-pink-500 w-12 h-12 rounded-2xl mx-auto flex items-center justify-center shadow-lg mb-3">
        <i class="fa-solid fa-lock text-xl text-white"></i>
      </div>
      <h1 class="text-xl font-bold tracking-tight">Pulse Security Gateway</h1>
      <p class="text-neutral-400 text-xs mt-0.5">Authorized Personnel Only</p>
    </div>

    <div id="login-error-msg" class="hidden p-3 bg-red-500/20 text-red-400 border border-red-500/30 rounded-xl text-xs font-medium text-center"></div>

    <div class="space-y-3">
      <input type="email" id="admin-email" placeholder="Master Email (sgursharn076@gmail.com)" class="w-full p-3 rounded-xl bg-neutral-800 border border-neutral-700 text-white text-sm focus:outline-none focus:border-pink-500">
      <input type="text" id="admin-phone" placeholder="Master Phone (7973804008)" class="w-full p-3 rounded-xl bg-neutral-800 border border-neutral-700 text-white text-sm focus:outline-none focus:border-pink-500">
      <input type="password" id="admin-password" placeholder="Enter Secure Password" class="w-full p-3 rounded-xl bg-neutral-800 border border-neutral-700 text-white text-sm focus:outline-none focus:border-pink-500">
      
      <button id="btn-admin-login" class="w-full bg-gradient-to-r from-pink-500 to-red-500 p-3.5 rounded-xl font-bold text-sm text-white shadow-lg active:scale-95 transition mt-2">
        Verify Identity & Access
      </button>
    </div>
  </div>

  <div id="admin-dashboard-box" class="w-full max-w-lg bg-neutral-900 border border-neutral-800 rounded-3xl p-6 shadow-2xl space-y-6 hidden">
    
    <div class="flex justify-between items-center border-b border-neutral-800 pb-4">
      <div class="flex items-center space-x-3">
        <div class="bg-gradient-to-r from-pink-500 to-red-500 w-10 h-10 rounded-xl flex items-center justify-center shadow-md">
          <i class="fa-solid fa-sliders text-base text-white"></i>
        </div>
        <div>
          <h2 class="text-base font-bold tracking-tight">Pulse Music Console</h2>
          <p class="text-neutral-400 text-[10px] uppercase font-semibold tracking-wider">Status: Live Engine Sync</p>
        </div>
      </div>
      <button id="btn-admin-logout" class="bg-neutral-800 hover:bg-red-500/20 hover:text-red-400 text-neutral-400 px-3 py-1.5 rounded-xl text-xs font-medium transition flex items-center space-x-1.5">
        <i class="fa-solid fa-right-from-bracket text-[10px]"></i>
        <span>Lock Console</span>
      </button>
    </div>

    <div id="status-msg" class="hidden p-3 rounded-xl text-xs font-medium text-center"></div>

    <div class="space-y-4">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-[11px] text-pink-500 font-semibold uppercase tracking-wider block mb-1 ml-1">Song Title *</label>
          <input type="text" id="song-title" placeholder="e.g., Barota" class="w-full p-3 rounded-xl bg-neutral-800 border border-neutral-700 text-white text-sm focus:outline-none focus:border-pink-500">
        </div>
        <div>
          <label class="text-[11px] text-pink-500 font-semibold uppercase tracking-wider block mb-1 ml-1">Artist Name *</label>
          <input type="text" id="song-artist" placeholder="Sidhu Moose Wala, The Kidd" class="w-full p-3 rounded-xl bg-neutral-800 border border-neutral-700 text-white text-sm focus:outline-none focus:border-pink-500">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-[11px] text-purple-400 font-semibold uppercase tracking-wider block mb-1 ml-1">Album Name (Optional)</label>
          <input type="text" id="song-album" placeholder="e.g., Bermuda Triangle" class="w-full p-3 rounded-xl bg-neutral-800 border border-neutral-700 text-white text-sm focus:outline-none focus:border-purple-500">
        </div>
        <div>
          <label class="text-[11px] text-neutral-400 font-semibold uppercase tracking-wider block mb-1 ml-1">Duration</label>
          <input type="text" id="song-duration" placeholder="3:42" class="w-full p-3 rounded-xl bg-neutral-800 border border-neutral-700 text-white text-sm focus:outline-none focus:border-pink-500">
        </div>
      </div>

      <div>
        <label class="text-[11px] text-pink-500 font-semibold uppercase tracking-wider block mb-1 ml-1">MP3 Audio Link (Direct URL) *</label>
        <input type="url" id="song-src" placeholder="https://aryasongs.github.io/Pulse/barota.mp3" class="w-full p-3 rounded-xl bg-neutral-800 border border-neutral-700 text-white text-sm focus:outline-none focus:border-pink-500">
      </div>

      <div>
        <label class="text-[11px] text-pink-500 font-semibold uppercase tracking-wider block mb-1 ml-1">Cover Art Link (Direct Image URL) *</label>
        <input type="url" id="song-cover" placeholder="https://aryasongs.github.io/Pulse/IMG_6107.jpeg" class="w-full p-3 rounded-xl bg-neutral-800 border border-neutral-700 text-white text-sm focus:outline-none focus:border-pink-500">
      </div>

      <div>
        <label class="text-[11px] text-neutral-400 font-semibold uppercase tracking-wider block mb-1 ml-1">Extra Search Keywords / Tags (Comma Separated)</label>
        <input type="text" id="song-tags" placeholder="punjabi, hiphop, gangsta, sidhu" class="w-full p-3 rounded-xl bg-neutral-800 border border-neutral-700 text-white text-sm focus:outline-none focus:border-pink-500">
      </div>

      <button id="btn-submit-song" class="w-full bg-gradient-to-r from-pink-500 to-red-500 p-4 rounded-xl font-bold text-sm text-white shadow-lg active:scale-95 transition mt-2 flex items-center justify-center space-x-2">
        <i class="fa-solid fa-cloud-arrow-up"></i>
        <span>Publish Track Live</span>
      </button>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // Pulse Application Firebase Core Credentials
    const firebaseConfig = {
      apiKey: "AIzaSyC30TcmMVhP_8HdFYS1WufRiZwSDYNMTF0",
      authDomain: "pulse2-92372.firebaseapp.com",
      databaseURL: "https://pulse2-92372-default-rtdb.firebaseio.com",
      projectId: "pulse2-92372",
      storageBucket: "pulse2-92372.firebasestorage.app",
      messagingSenderId: "276235725177",
      appId: "1:276235725177:web:0f4e0789fae80a435927a8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    const authBox = document.getElementById('admin-auth-box');
    const dashboardBox = document.getElementById('admin-dashboard-box');
    const loginError = document.getElementById('login-error-msg');
    const statusMsg = document.getElementById('status-msg');

    // 1. DYNAMIC IDENTITY AND SECURITY ROUTE VALIDATION
    document.getElementById('btn-admin-login').addEventListener('click', () => {
      const email = document.getElementById('admin-email').value.trim();
      const phone = document.getElementById('admin-phone').value.trim();
      const password = document.getElementById('admin-password').value;

      loginError.classList.add('hidden');

      // Double structural security verification
      if (email !== "sgursharn076@gmail.com" || phone !== "7973804008") {
        loginError.innerText = "CRITICAL ERROR: Invalid Master Email or Phone Number!";
        loginError.classList.remove('hidden');
        return;
      }

      if (!password) {
        loginError.innerText = "Please input your secure database password.";
        loginError.classList.remove('hidden');
        return;
      }

      // Firebase Authentication process integration
      signInWithEmailAndPassword(auth, email, password)
        .then(() => {
          authBox.style.display = 'none';
          dashboardBox.classList.remove('hidden');
          document.getElementById('admin-password').value = '';
        })
        .catch((error) => {
          loginError.innerText = "AUTHENTICATION FAILED: " + error.message;
          loginError.classList.remove('hidden');
        });
    });

    // Handle Authentication State Shifts smoothly
    onAuthStateChanged(auth, (user) => {
      if (user && user.email === "sgursharn076@gmail.com") {
        authBox.style.display = 'none';
        dashboardBox.classList.remove('hidden');
      } else {
        authBox.style.display = 'block';
        dashboardBox.classList.add('hidden');
      }
    });

    // Secure Dashboard Lockout Configuration
    document.getElementById('btn-admin-logout').addEventListener('click', () => {
      signOut(auth).then(() => {
        authBox.style.display = 'block';
        dashboardBox.classList.add('hidden');
      });
    });

    // Helper to display status notifications
    function displayStatus(text, isError = false) {
      statusMsg.innerText = text;
      statusMsg.className = `p-3 rounded-xl text-xs font-medium text-center block ${isError ? 'bg-red-500/20 text-red-400 border border-red-500/30' : 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30'}`;
      setTimeout(() => statusMsg.classList.add('hidden'), 4000);
    }

    // 2. SONG & AUTOMATIC ALBUM ARCHITECTURE INGESTION PIPELINE
    document.getElementById('btn-submit-song').addEventListener('click', () => {
      const title = document.getElementById('song-title').value.trim();
      const artist = document.getElementById('song-artist').value.trim();
      const album = document.getElementById('song-album').value.trim();
      const src = document.getElementById('song-src').value.trim();
      const cover = document.getElementById('song-cover').value.trim();
      const duration = document.getElementById('song-duration').value.trim() || "3:00";
      const tagsRaw = document.getElementById('song-tags').value.trim();

      if (!title || !artist || !src || !cover) {
        return displayStatus("VALIDATION FAILURE: Title, Artist, MP3 URL, and Cover Image Link are mandatory!", true);
      }

      // Smart dynamic keyword engineering engine for the automated search system
      let tagsArray = [];
      
      // Basic split for raw tags inputs
      if (tagsRaw) {
        tagsArray = tagsRaw.split(',').map(item => item.trim().toLowerCase());
      }

      // Auto-indexing Album details inside search keywords
      if (album) {
        tagsArray.push(album.toLowerCase());
        tagsArray.push("album");
      }

      // Auto-indexing primary components to maximize search radar query optimization
      tagsArray.push(title.toLowerCase());
      artist.split(',').forEach(art => tagsArray.push(art.trim().toLowerCase()));

      // Clean duplicates from our engineered tags array
      const finalizedTags = [...new Set(tagsArray)];

      const songId = "s_" + Date.now();

      const songDataPayload = {
        id: songId,
        title: title,
        artist: artist,
        src: src,
        cover: cover,
        duration: duration,
        tags: finalizedTags
      };

      // Push payload structurally to Firebase node
      set(ref(db, 'global_songs/' + songId), songDataPayload)
        .then(() => {
          displayStatus(`Success! "${title}" has been securely broadcasted live. Search radar has auto-indexed the data.`);
          
          // Form cleanup
          document.getElementById('song-title').value = '';
          document.getElementById('song-artist').value = '';
          document.getElementById('song-album').value = '';
          document.getElementById('song-src').value = '';
          document.getElementById('song-cover').value = '';
          document.getElementById('song-tags').value = '';
          document.getElementById('song-duration').value = '';
        })
        .catch((err) => {
          displayStatus("Database Pipeline Blocked: " + err.message, true);
        });
    });
  </script>
</body>
</html>

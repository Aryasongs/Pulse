<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Safe Random Video Chat</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #020617;
      color: white;
    }

    header {
      padding: 16px;
      text-align: center;
      background: #0f172a;
      font-size: 22px;
      font-weight: 800;
    }

    .app {
      max-width: 1150px;
      margin: auto;
      padding: 14px;
    }

    .warning {
      background: #7f1d1d;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 12px;
      text-align: center;
      font-weight: bold;
    }

    .videos {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    video {
      width: 100%;
      height: 360px;
      background: black;
      border-radius: 16px;
      object-fit: cover;
    }

    #status {
      margin-top: 12px;
      padding: 12px;
      background: #111827;
      border-radius: 12px;
      font-weight: bold;
    }

    .controls, .chatBox {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: none;
      padding: 12px 16px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      color: white;
    }

    .start { background: #16a34a; }
    .next { background: #2563eb; }
    .stop { background: #dc2626; }
    .gray { background: #374151; }
    .report { background: #ea580c; }

    input {
      flex: 1;
      min-width: 180px;
      border: none;
      outline: none;
      padding: 13px;
      border-radius: 10px;
    }

    #messages {
      margin-top: 12px;
      height: 220px;
      overflow-y: auto;
      background: #020617;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 10px;
    }

    .msg {
      padding: 8px;
      margin-bottom: 7px;
      background: #1e293b;
      border-radius: 8px;
    }

    .banned {
      filter: blur(70px);
    }

    @media(max-width: 768px) {
      .videos {
        grid-template-columns: 1fr;
      }

      video {
        height: 270px;
      }
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/nsfwjs@4.2.1"></script>
</head>

<body>

<header>Safe Random Video Chat</header>

<div class="app">

  <div class="warning">
    Explicit or inappropriate content is prohibited. Users may be banned automatically.
  </div>

  <div class="videos">
    <video id="localVideo" autoplay muted playsinline></video>
    <video id="remoteVideo" autoplay playsinline></video>
  </div>

  <div id="status">Status: Ready</div>

  <div class="controls">
    <button class="start" onclick="startChat()">Start Chat</button>
    <button class="next" onclick="nextChat()">Next Stranger</button>
    <button class="stop" onclick="stopChat()">Stop</button>
    <button class="gray" onclick="toggleMic()">Mute Mic</button>
    <button class="gray" onclick="toggleCamera()">Camera Off</button>
    <button class="gray" onclick="switchCamera()">Switch Camera</button>
    <button class="report" onclick="reportUser()">Report</button>
  </div>

  <div id="messages"></div>

  <div class="chatBox">
    <input id="chatInput" placeholder="Type message..." />
    <button class="start" onclick="sendMessage()">Send</button>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getDatabase,
    ref,
    set,
    get,
    push,
    remove,
    onValue,
    onChildAdded,
    serverTimestamp,
    onDisconnect
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC30TcmMVhP_8HdFYS1WufRiZwSDYNMTF0",
    authDomain: "pulse2-92372.firebaseapp.com",
    databaseURL: "https://pulse2-92372-default-rtdb.firebaseio.com",
    projectId: "pulse2-92372",
    storageBucket: "pulse2-92372.firebasestorage.app",
    messagingSenderId: "276235725177",
    appId: "1:276235725177:web:0f4e0789fae80a435927a8"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const localVideo = document.getElementById("localVideo");
  const remoteVideo = document.getElementById("remoteVideo");
  const statusBox = document.getElementById("status");
  const messagesBox = document.getElementById("messages");
  const chatInput = document.getElementById("chatInput");

  let localStream = null;
  let remoteStream = null;
  let pc = null;
  let roomId = null;
  let isCreator = false;
  let micOn = true;
  let cameraOn = true;
  let usingBackCamera = false;
  let nsfwModel = null;
  let banned = false;
  let nsfwInterval = null;

  let userId = localStorage.getItem("safeChatUserId");
  if (!userId) {
    userId = "user_" + Math.random().toString(36).substring(2, 14);
    localStorage.setItem("safeChatUserId", userId);
  }

  const servers = {
    iceServers: [
      { urls: "stun:stun.l.google.com:19302" },
      { urls: "stun:stun1.l.google.com:19302" },
      { urls: "stun:stun2.l.google.com:19302" }
    ]
  };

  function status(text) {
    statusBox.innerText = "Status: " + text;
  }

  async function loadNSFW() {
    try {
      status("Loading AI moderation...");
      nsfwModel = await nsfwjs.load();
      status("AI moderation active. Ready.");
    } catch (err) {
      console.error(err);
      status("AI moderation failed to load.");
    }
  }

  loadNSFW();

  async function checkBan() {
    const snap = await get(ref(db, "bannedUsers/" + userId));
    if (snap.exists()) {
      banned = true;
      alert("You are banned from using this chat.");
      status("Banned");
      return true;
    }
    return false;
  }

  async function banUser(reason) {
    if (banned) return;
    banned = true;

    localVideo.classList.add("banned");
    status("Explicit content detected. You are banned.");

    await set(ref(db, "bannedUsers/" + userId), {
      userId,
      reason,
      time: serverTimestamp()
    });

    await push(ref(db, "moderationLogs"), {
      userId,
      roomId: roomId || "none",
      reason,
      time: serverTimestamp()
    });

    setTimeout(async () => {
      await stopChat();
      alert("You were banned for inappropriate content.");
    }, 1200);
  }

  async function initMedia() {
    const constraints = {
      video: {
        facingMode: usingBackCamera ? "environment" : "user",
        width: { ideal: 1280 },
        height: { ideal: 720 }
      },
      audio: true
    };

    localStream = await navigator.mediaDevices.getUserMedia(constraints).catch(async () => {
      return await navigator.mediaDevices.getUserMedia({
        video: true,
        audio: true
      });
    });

    localVideo.srcObject = localStream;
    startNSFWDetection();
  }

  function createPeerConnection() {
    pc = new RTCPeerConnection(servers);
    remoteStream = new MediaStream();
    remoteVideo.srcObject = remoteStream;

    localStream.getTracks().forEach(track => {
      pc.addTrack(track, localStream);
    });

    pc.ontrack = event => {
      event.streams[0].getTracks().forEach(track => {
        remoteStream.addTrack(track);
      });
    };

    pc.onicecandidate = event => {
      if (!event.candidate || !roomId) return;

      const path = isCreator
        ? `rooms/${roomId}/callerCandidates`
        : `rooms/${roomId}/calleeCandidates`;

      push(ref(db, path), event.candidate.toJSON());
    };

    pc.onconnectionstatechange = () => {
      status("Connection: " + pc.connectionState);

      if (pc.connectionState === "disconnected" || pc.connectionState === "failed") {
        status("Stranger disconnected");
      }
    };
  }

  async function startChat() {
    try {
      if (await checkBan()) return;

      status("Opening camera...");
      if (!localStream) await initMedia();

      status("Searching for stranger...");

      const waitingSnap = await get(ref(db, "waitingUsers"));
      let matchedUser = null;

      if (waitingSnap.exists()) {
        const users = waitingSnap.val();

        for (let id in users) {
          if (id !== userId) {
            matchedUser = id;
            break;
          }
        }
      }

      if (matchedUser) {
        isCreator = false;
        roomId = "room_" + Math.random().toString(36).substring(2, 14);

        await remove(ref(db, "waitingUsers/" + matchedUser));

        await set(ref(db, "rooms/" + roomId), {
          users: {
            [matchedUser]: true,
            [userId]: true
          },
          createdAt: serverTimestamp()
        });

        await set(ref(db, "matchedRooms/" + matchedUser), roomId);
        await set(ref(db, "matchedRooms/" + userId), roomId);

        createPeerConnection();
        await createAnswerFlow();

      } else {
        isCreator = true;

        await set(ref(db, "waitingUsers/" + userId), {
          createdAt: serverTimestamp()
        });

        onDisconnect(ref(db, "waitingUsers/" + userId)).remove();

        onValue(ref(db, "matchedRooms/" + userId), async snap => {
          if (snap.exists() && !roomId) {
            roomId = snap.val();

            await remove(ref(db, "waitingUsers/" + userId));

            createPeerConnection();
            await createOfferFlow();
          }
        });

        status("Waiting for stranger...");
      }

    } catch (err) {
      console.error(err);
      status("Error: " + err.message);
    }
  }

  async function createOfferFlow() {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    await set(ref(db, `rooms/${roomId}/offer`), {
      type: offer.type,
      sdp: offer.sdp
    });

    onValue(ref(db, `rooms/${roomId}/answer`), async snap => {
      if (snap.exists() && !pc.currentRemoteDescription) {
        await pc.setRemoteDescription(new RTCSessionDescription(snap.val()));
      }
    });

    listenCandidates("calleeCandidates");
    listenMessages();

    status("Connected. Waiting for stranger video...");
  }

  async function createAnswerFlow() {
    onValue(ref(db, `rooms/${roomId}/offer`), async snap => {
      if (snap.exists() && !pc.currentRemoteDescription) {
        await pc.setRemoteDescription(new RTCSessionDescription(snap.val()));

        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);

        await set(ref(db, `rooms/${roomId}/answer`), {
          type: answer.type,
          sdp: answer.sdp
        });
      }
    });

    listenCandidates("callerCandidates");
    listenMessages();

    status("Connecting...");
  }

  function listenCandidates(path) {
    onChildAdded(ref(db, `rooms/${roomId}/${path}`), async snap => {
      try {
        await pc.addIceCandidate(new RTCIceCandidate(snap.val()));
      } catch (err) {
        console.error(err);
      }
    });
  }

  function listenMessages() {
    messagesBox.innerHTML = "";

    onChildAdded(ref(db, `rooms/${roomId}/messages`), snap => {
      const data = snap.val();

      const div = document.createElement("div");
      div.className = "msg";
      div.innerText = (data.from === userId ? "You: " : "Stranger: ") + data.text;

      messagesBox.appendChild(div);
      messagesBox.scrollTop = messagesBox.scrollHeight;
    });
  }

  async function sendMessage() {
    const text = chatInput.value.trim();

    if (!text || !roomId || banned) return;

    await push(ref(db, `rooms/${roomId}/messages`), {
      from: userId,
      text,
      time: serverTimestamp()
    });

    chatInput.value = "";
  }

  async function stopChat() {
    try {
      if (pc) {
        pc.close();
        pc = null;
      }

      if (roomId) {
        await remove(ref(db, "rooms/" + roomId));
        await remove(ref(db, "matchedRooms/" + userId));
      }

      await remove(ref(db, "waitingUsers/" + userId));

      roomId = null;
      remoteVideo.srcObject = null;
      messagesBox.innerHTML = "";

      status(banned ? "Banned" : "Stopped");

    } catch (err) {
      console.error(err);
    }
  }

  async function nextChat() {
    if (banned) return;
    await stopChat();
    setTimeout(startChat, 700);
  }

  function toggleMic() {
    if (!localStream) return;

    micOn = !micOn;
    localStream.getAudioTracks().forEach(track => {
      track.enabled = micOn;
    });

    status(micOn ? "Mic on" : "Mic muted");
  }

  function toggleCamera() {
    if (!localStream) return;

    cameraOn = !cameraOn;
    localStream.getVideoTracks().forEach(track => {
      track.enabled = cameraOn;
    });

    status(cameraOn ? "Camera on" : "Camera off");
  }

  async function switchCamera() {
    try {
      if (!localStream) {
        usingBackCamera = !usingBackCamera;
        await initMedia();
        return;
      }

      usingBackCamera = !usingBackCamera;

      const newStream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: usingBackCamera ? "environment" : "user",
          width: { ideal: 1280 },
          height: { ideal: 720 }
        },
        audio: true
      });

      const newVideoTrack = newStream.getVideoTracks()[0];
      const newAudioTrack = newStream.getAudioTracks()[0];

      if (pc) {
        const videoSender = pc.getSenders().find(sender => sender.track && sender.track.kind === "video");
        if (videoSender) await videoSender.replaceTrack(newVideoTrack);

        const audioSender = pc.getSenders().find(sender => sender.track && sender.track.kind === "audio");
        if (audioSender && newAudioTrack) await audioSender.replaceTrack(newAudioTrack);
      }

      localStream.getTracks().forEach(track => track.stop());
      localStream = newStream;
      localVideo.srcObject = newStream;

      status(usingBackCamera ? "Back camera enabled" : "Front camera enabled");

    } catch (err) {
      console.error(err);
      status("Camera switch failed");
    }
  }

  async function reportUser() {
    if (!roomId) {
      alert("No active stranger to report.");
      return;
    }

    await push(ref(db, "reports"), {
      roomId,
      reporter: userId,
      reason: "Manual user report",
      time: serverTimestamp()
    });

    alert("Report submitted.");
  }

  function startNSFWDetection() {
    if (nsfwInterval) clearInterval(nsfwInterval);

    nsfwInterval = setInterval(async () => {
      if (!nsfwModel || !localVideo || banned) return;
      if (localVideo.readyState < 2) return;

      try {
        const predictions = await nsfwModel.classify(localVideo);

        const porn = predictions.find(p => p.className === "Porn")?.probability || 0;
        const hentai = predictions.find(p => p.className === "Hentai")?.probability || 0;
        const sexy = predictions.find(p => p.className === "Sexy")?.probability || 0;

        if (porn > 0.72 || hentai > 0.72 || sexy > 0.92) {
          await banUser("Adult/nude content detected by AI");
        }

      } catch (err) {
        console.error("NSFW detection error:", err);
      }
    }, 2000);
  }

  window.startChat = startChat;
  window.nextChat = nextChat;
  window.stopChat = stopChat;
  window.sendMessage = sendMessage;
  window.toggleMic = toggleMic;
  window.toggleCamera = toggleCamera;
  window.switchCamera = switchCamera;
  window.reportUser = reportUser;

  window.addEventListener("beforeunload", () => {
    remove(ref(db, "waitingUsers/" + userId));
    remove(ref(db, "matchedRooms/" + userId));
    if (roomId) remove(ref(db, "rooms/" + roomId));
  });
</script>

</body>
</html>

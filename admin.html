<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Random Video Chat</title>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }
    header {
      padding: 16px;
      text-align: center;
      background: #111827;
      font-size: 22px;
      font-weight: bold;
    }
    .app {
      max-width: 1100px;
      margin: auto;
      padding: 15px;
    }
    .videos {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    video {
      width: 100%;
      height: 360px;
      background: black;
      border-radius: 14px;
      object-fit: cover;
    }
    .controls, .chatBox {
      margin-top: 15px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      border: none;
      padding: 12px 18px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }
    .start { background: #22c55e; color: white; }
    .next { background: #3b82f6; color: white; }
    .stop { background: #ef4444; color: white; }
    .gray { background: #374151; color: white; }
    .report { background: #f97316; color: white; }
    #status {
      margin-top: 15px;
      padding: 12px;
      background: #1f2937;
      border-radius: 10px;
    }
    #messages {
      margin-top: 15px;
      height: 220px;
      overflow-y: auto;
      background: #020617;
      border-radius: 10px;
      padding: 10px;
    }
    .msg {
      padding: 8px;
      margin: 6px 0;
      background: #1e293b;
      border-radius: 8px;
    }
    input {
      flex: 1;
      padding: 13px;
      border-radius: 10px;
      border: none;
      outline: none;
    }
    @media(max-width: 768px) {
      .videos { grid-template-columns: 1fr; }
      video { height: 260px; }
    }
  </style>
</head>

<body>
<header>Random Video Chat</header>

<div class="app">
  <div class="videos">
    <video id="localVideo" autoplay muted playsinline></video>
    <video id="remoteVideo" autoplay playsinline></video>
  </div>

  <div id="status">Status: Ready</div>

  <div class="controls">
    <button class="start" onclick="startChat()">Start Chat</button>
    <button class="next" onclick="nextChat()">Next Stranger</button>
    <button class="stop" onclick="stopChat()">Stop</button>
    <button class="gray" onclick="toggleMic()">Mute Mic</button>
    <button class="gray" onclick="toggleCamera()">Camera Off</button>
    <button class="report" onclick="reportUser()">Report</button>
  </div>

  <div id="messages"></div>

  <div class="chatBox">
    <input id="chatInput" placeholder="Type message..." />
    <button class="start" onclick="sendMessage()">Send</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getDatabase,
    ref,
    set,
    get,
    push,
    remove,
    onValue,
    onChildAdded,
    serverTimestamp,
    onDisconnect
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC30TcmMVhP_8HdFYS1WufRiZwSDYNMTF0",
    authDomain: "pulse2-92372.firebaseapp.com",
    databaseURL: "https://pulse2-92372-default-rtdb.firebaseio.com",
    projectId: "pulse2-92372",
    storageBucket: "pulse2-92372.firebasestorage.app",
    messagingSenderId: "276235725177",
    appId: "1:276235725177:web:0f4e0789fae80a435927a8"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const localVideo = document.getElementById("localVideo");
  const remoteVideo = document.getElementById("remoteVideo");
  const statusBox = document.getElementById("status");
  const messagesBox = document.getElementById("messages");
  const chatInput = document.getElementById("chatInput");

  let localStream;
  let remoteStream;
  let pc;
  let userId = "user_" + Math.random().toString(36).substring(2, 12);
  let roomId = null;
  let isCreator = false;
  let micOn = true;
  let cameraOn = true;

  const servers = {
    iceServers: [
      { urls: "stun:stun.l.google.com:19302" },
      { urls: "stun:stun1.l.google.com:19302" }
    ]
  };

  function status(text) {
    statusBox.innerText = "Status: " + text;
  }

  async function initMedia() {
    localStream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: true
    });
    localVideo.srcObject = localStream;
  }

  function createPeerConnection() {
    pc = new RTCPeerConnection(servers);
    remoteStream = new MediaStream();
    remoteVideo.srcObject = remoteStream;

    localStream.getTracks().forEach(track => {
      pc.addTrack(track, localStream);
    });

    pc.ontrack = event => {
      event.streams[0].getTracks().forEach(track => {
        remoteStream.addTrack(track);
      });
    };

    pc.onicecandidate = event => {
      if (event.candidate && roomId) {
        const path = isCreator
          ? `rooms/${roomId}/callerCandidates`
          : `rooms/${roomId}/calleeCandidates`;

        push(ref(db, path), event.candidate.toJSON());
      }
    };

    pc.onconnectionstatechange = () => {
      status("Connection: " + pc.connectionState);
      if (pc.connectionState === "disconnected" || pc.connectionState === "failed") {
        status("Stranger disconnected");
      }
    };
  }

  async function startChat() {
    try {
      status("Opening camera...");
      if (!localStream) await initMedia();

      status("Searching for stranger...");
      const waitingRef = ref(db, "waitingUsers");
      const snapshot = await get(waitingRef);

      let matchedUser = null;

      if (snapshot.exists()) {
        const users = snapshot.val();
        for (let id in users) {
          if (id !== userId) {
            matchedUser = id;
            break;
          }
        }
      }

      if (matchedUser) {
        isCreator = false;
        roomId = "room_" + Math.random().toString(36).substring(2, 12);

        await remove(ref(db, "waitingUsers/" + matchedUser));

        await set(ref(db, "rooms/" + roomId), {
          users: {
            [matchedUser]: true,
            [userId]: true
          },
          createdAt: serverTimestamp()
        });

        await set(ref(db, `matchedRooms/${matchedUser}`), roomId);
        await set(ref(db, `matchedRooms/${userId}`), roomId);

        createPeerConnection();
        await createAnswerFlow();

      } else {
        isCreator = true;
        await set(ref(db, "waitingUsers/" + userId), {
          createdAt: serverTimestamp()
        });

        onDisconnect(ref(db, "waitingUsers/" + userId)).remove();

        onValue(ref(db, "matchedRooms/" + userId), async snap => {
          if (snap.exists() && !roomId) {
            roomId = snap.val();
            await remove(ref(db, "waitingUsers/" + userId));
            createPeerConnection();
            await createOfferFlow();
          }
        });

        status("Waiting for stranger...");
      }
    } catch (err) {
      console.error(err);
      status("Error: " + err.message);
    }
  }

  async function createOfferFlow() {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    await set(ref(db, `rooms/${roomId}/offer`), {
      type: offer.type,
      sdp: offer.sdp
    });

    onValue(ref(db, `rooms/${roomId}/answer`), async snap => {
      if (snap.exists() && !pc.currentRemoteDescription) {
        const answer = snap.val();
        await pc.setRemoteDescription(new RTCSessionDescription(answer));
      }
    });

    listenCandidates("calleeCandidates");
    listenMessages();
    status("Connected. Waiting for video...");
  }

  async function createAnswerFlow() {
    onValue(ref(db, `rooms/${roomId}/offer`), async snap => {
      if (snap.exists() && !pc.currentRemoteDescription) {
        const offer = snap.val();
        await pc.setRemoteDescription(new RTCSessionDescription(offer));

        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);

        await set(ref(db, `rooms/${roomId}/answer`), {
          type: answer.type,
          sdp: answer.sdp
        });
      }
    });

    listenCandidates("callerCandidates");
    listenMessages();
    status("Connecting...");
  }

  function listenCandidates(path) {
    onChildAdded(ref(db, `rooms/${roomId}/${path}`), async snap => {
      const candidate = new RTCIceCandidate(snap.val());
      await pc.addIceCandidate(candidate);
    });
  }

  function listenMessages() {
    messagesBox.innerHTML = "";

    onChildAdded(ref(db, `rooms/${roomId}/messages`), snap => {
      const data = snap.val();
      const div = document.createElement("div");
      div.className = "msg";
      div.innerText = (data.from === userId ? "You: " : "Stranger: ") + data.text;
      messagesBox.appendChild(div);
      messagesBox.scrollTop = messagesBox.scrollHeight;
    });
  }

  async function sendMessage() {
    const text = chatInput.value.trim();
    if (!text || !roomId) return;

    await push(ref(db, `rooms/${roomId}/messages`), {
      from: userId,
      text,
      time: serverTimestamp()
    });

    chatInput.value = "";
  }

  async function stopChat() {
    try {
      if (pc) pc.close();
      pc = null;

      if (roomId) {
        await remove(ref(db, "rooms/" + roomId));
        await remove(ref(db, "matchedRooms/" + userId));
      }

      await remove(ref(db, "waitingUsers/" + userId));

      roomId = null;
      remoteVideo.srcObject = null;
      messagesBox.innerHTML = "";
      status("Stopped");
    } catch (err) {
      console.error(err);
    }
  }

  async function nextChat() {
    await stopChat();
    setTimeout(startChat, 800);
  }

  function toggleMic() {
    if (!localStream) return;
    micOn = !micOn;
    localStream.getAudioTracks().forEach(track => track.enabled = micOn);
    status(micOn ? "Mic on" : "Mic muted");
  }

  function toggleCamera() {
    if (!localStream) return;
    cameraOn = !cameraOn;
    localStream.getVideoTracks().forEach(track => track.enabled = cameraOn);
    status(cameraOn ? "Camera on" : "Camera off");
  }

  async function reportUser() {
    if (!roomId) return alert("No active stranger to report.");

    await push(ref(db, "reports"), {
      roomId,
      reporter: userId,
      time: serverTimestamp(),
      reason: "User reported from video chat"
    });

    alert("Report submitted.");
  }

  window.startChat = startChat;
  window.stopChat = stopChat;
  window.nextChat = nextChat;
  window.sendMessage = sendMessage;
  window.toggleMic = toggleMic;
  window.toggleCamera = toggleCamera;
  window.reportUser = reportUser;

  window.addEventListener("beforeunload", () => {
    if (roomId) remove(ref(db, "rooms/" + roomId));
    remove(ref(db, "waitingUsers/" + userId));
    remove(ref(db, "matchedRooms/" + userId));
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse - Secure Master Control Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-neutral-950 text-white font-sans min-h-screen flex items-center justify-center p-4">

  <!-- 1. CLOSED SECURITY GATEWAY (LOGIN) -->
  <div id="admin-auth-box" class="w-full max-w-md bg-neutral-900 border border-neutral-800 rounded-3xl p-6 shadow-2xl space-y-4 block">
    <div class="text-center mb-2">
      <div class="bg-gradient-to-r from-red-500 to-pink-500 w-12 h-12 rounded-2xl mx-auto flex items-center justify-center shadow-lg mb-3">
        <i class="fa-solid fa-shield-halved text-xl text-white"></i>
      </div>
      <h1 class="text-xl font-bold tracking-tight">Pulse Console Auth</h1>
      <p class="text-neutral-400 text-xs mt-0.5">Enter cloud storage credentials to unlock</p>
    </div>

    <div id="login-error-msg" class="hidden p-3 bg-red-500/20 text-red-400 border border-red-500/30 rounded-xl text-xs font-medium text-center"></div>

    <div class="space-y-3">
      <input type="email" id="admin-email" placeholder="Admin Email" class="w-full p-3 rounded-xl bg-neutral-800 border border-neutral-700 text-white text-sm focus:outline-none focus:border-pink-500">
      <input type="password" id="admin-password" placeholder="Admin Password" class="w-full p-3 rounded-xl bg-neutral-800 border border-neutral-700 text-white text-sm focus:outline-none focus:border-pink-500">
      
      <button id="btn-admin-login" class="w-full bg-gradient-to-r from-pink-500 to-red-500 p-3.5 rounded-xl font-bold text-sm text-white shadow-lg active:scale-95 transition mt-2">
        Sign In & Initialize Sync
      </button>
    </div>
  </div>

  <!-- 2. LIVE MUSIC & ALBUM INGESTION CONSOLE (HIDDEN BY DEFAULT) -->
  <div id="admin-dashboard-box" class="w-full max-w-lg bg-neutral-900 border border-neutral-800 rounded-3xl p-6 shadow-2xl space-y-6 hidden">
    
    <!-- Header -->
    <div class="flex justify-between items-center border-b border-neutral-800 pb-4">
      <div class="flex items-center space-x-3">
        <div class="bg-gradient-to-r from-pink-500 to-red-500 w-10 h-10 rounded-xl flex items-center justify-center shadow-md">
          <i class="fa-solid fa-sliders text-base text-white"></i>
        </div>
        <div>
          <h2 class="text-base font-bold tracking-tight">Console Managed Live</h2>
          <p id="active-user-badge" class="text-neutral-400 text-[10px] uppercase font-semibold tracking-wider">Connecting...</p>
        </div>
      </div>
      <button id="btn-admin-logout" class="bg-neutral-800 hover:bg-red-500/20 hover:text-red-400 text-neutral-400 px-3 py-1.5 rounded-xl text-xs font-medium transition flex items-center space-x-1.5">
        <i class="fa-solid fa-lock text-[10px]"></i>
        <span>Lock System</span>
      </button>
    </div>

    <!-- Live Status Updates -->
    <div id="status-msg" class="hidden p-3 rounded-xl text-xs font-medium text-center"></div>

    <!-- Data Broadcast Form -->
    <div class="space-y-4">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-[11px] text-pink-500 font-semibold uppercase tracking-wider block mb-1 ml-1">Song Title *</label>
          <input type="text" id="song-title" placeholder="e.g., Barota" class="w-full p-3 rounded-xl bg-neutral-800 border border-neutral-700 text-white text-sm focus:outline-none focus:border-pink-500">
        </div>
        <div>
          <label class="text-[11px] text-pink-500 font-semibold uppercase tracking-wider block mb-1 ml-1">Artist Name *</label>
          <input type="text" id="song-artist" placeholder="Sidhu Moose Wala, The Kidd" class="w-full p-3 rounded-xl bg-neutral-800 border border-neutral-700 text-white text-sm focus:outline-none focus:border-pink-500">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-[11px] text-purple-400 font-semibold uppercase tracking-wider block mb-1 ml-1">Album Name (Optional)</label>
          <input type="text" id="song-album" placeholder="e.g., Bermuda Triangle" class="w-full p-3 rounded-xl bg-neutral-800 border border-neutral-700 text-white text-sm focus:outline-none focus:border-purple-500">
        </div>
        <div>
          <label class="text-[11px] text-neutral-400 font-semibold uppercase tracking-wider block mb-1 ml-1">Track Duration</label>
          <input type="text" id="song-duration" placeholder="3:42" class="w-full p-3 rounded-xl bg-neutral-800 border border-neutral-700 text-white text-sm focus:outline-none focus:border-pink-500">
        </div>
      </div>

      <div>
        <label class="text-[11px] text-pink-500 font-semibold uppercase tracking-wider block mb-1 ml-1">Direct MP3 Link *</label>
        <input type="url" id="song-src" placeholder="https://example.com/stream.mp3" class="w-full p-3 rounded-xl bg-neutral-800 border border-neutral-700 text-white text-sm focus:outline-none focus:border-pink-500">
      </div>

      <div>
        <label class="text-[11px] text-pink-500 font-semibold uppercase tracking-wider block mb-1 ml-1">Direct Cover Art Link *</label>
        <input type="url" id="song-cover" placeholder="https://example.com/cover.jpg" class="w-full p-3 rounded-xl bg-neutral-800 border border-neutral-700 text-white text-sm focus:outline-none focus:border-pink-500">
      </div>

      <div>
        <label class="text-[11px] text-neutral-400 font-semibold uppercase tracking-wider block mb-1 ml-1">Custom Tags / Keywords (Comma Separated)</label>
        <input type="text" id="song-tags" placeholder="punjabi, hiphop, rap" class="w-full p-3 rounded-xl bg-neutral-800 border border-neutral-700 text-white text-sm focus:outline-none focus:border-pink-500">
      </div>

      <button id="btn-submit-song" class="w-full bg-gradient-to-r from-pink-500 to-red-500 p-4 rounded-xl font-bold text-sm text-white shadow-lg active:scale-95 transition mt-2 flex items-center justify-center space-x-2">
        <i class="fa-solid fa-cloud-arrow-up"></i>
        <span>Broadcast Track to Main Website</span>
      </button>
    </div>

  </div>

  <!-- FIREBASE ENGINE IMPLEMENTATION -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // Original Project Configurations
    const firebaseConfig = {
      apiKey: "AIzaSyC30TcmMVhP_8HdFYS1WufRiZwSDYNMTF0",
      authDomain: "pulse2-92372.firebaseapp.com",
      databaseURL: "https://pulse2-92372-default-rtdb.firebaseio.com",
      projectId: "pulse2-92372",
      storageBucket: "pulse2-92372.firebasestorage.app",
      messagingSenderId: "276235725177",
      appId: "1:276235725177:web:0f4e0789fae80a435927a8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    const authBox = document.getElementById('admin-auth-box');
    const dashboardBox = document.getElementById('admin-dashboard-box');
    const loginError = document.getElementById('login-error-msg');
    const statusMsg = document.getElementById('status-msg');
    const userBadge = document.getElementById('active-user-badge');

    // 1. SECURE DEPLOYED LOGIN HANDLER (NO HARDCODED EMAIL/PASSWORDS)
    document.getElementById('btn-admin-login').addEventListener('click', () => {
      const email = document.getElementById('admin-email').value.trim();
      const password = document.getElementById('admin-password').value;

      loginError.classList.add('hidden');

      if (!email || !password) {
        loginError.innerText = "Error: Input fields cannot be empty!";
        loginError.classList.remove('hidden');
        return;
      }

      // Live verification directly via Firebase Secure Servers
      signInWithEmailAndPassword(auth, email, password)
        .then(() => {
          loginError.classList.add('hidden');
          document.getElementById('admin-password').value = '';
        })
        .catch((error) => {
          loginError.innerText = "ACCESS DENIED: " + error.message;
          loginError.classList.remove('hidden');
        });
    });

    // Persistent State Tracker
    onAuthStateChanged(auth, (user) => {
      if (user) {
        authBox.style.display = 'none';
        dashboardBox.classList.remove('hidden');
        userBadge.innerText = `User: ${user.email}`;
      } else {
        authBox.style.display = 'block';
        dashboardBox.classList.add('hidden');
      }
    });

    // Logout Trigger
    document.getElementById('btn-admin-logout').addEventListener('click', () => {
      signOut(auth);
    });

    function showToast(text, isError = false) {
      statusMsg.innerText = text;
      statusMsg.className = `p-3 rounded-xl text-xs font-medium text-center block ${isError ? 'bg-red-500/20 text-red-400 border border-red-500/30' : 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30'}`;
      setTimeout(() => statusMsg.classList.add('hidden'), 4000);
    }

    // 2. SONG UPLOAD & SEARCH ADAPTIVE AUTO-MODIFICATION LOGIC
    document.getElementById('btn-submit-song').addEventListener('click', () => {
      const title = document.getElementById('song-title').value.trim();
      const artist = document.getElementById('song-artist').value.trim();
      const album = document.getElementById('song-album').value.trim();
      const src = document.getElementById('song-src').value.trim();
      const cover = document.getElementById('song-cover').value.trim();
      const duration = document.getElementById('song-duration').value.trim() || "3:00";
      const tagsRaw = document.getElementById('song-tags').value.trim();

      if (!title || !artist || !src || !cover) {
        return showToast("Validation Error: Please fill all compulsory fields (*)", true);
      }

      // Search engine automation architecture
      // Hum naye keywords engine me map karenge jisse main web app automatically indexing update karle
      let smartSearchKeywords = [];

      if (tagsRaw) {
        smartSearchKeywords = tagsRaw.split(',').map(t => t.trim().toLowerCase());
      }

      // Album tracking inclusion
      if (album) {
        smartSearchKeywords.push(album.toLowerCase());
        smartSearchKeywords.push("album");
      }

      // Core indexing injection for perfect global matching
      smartSearchKeywords.push(title.toLowerCase());
      artist.split(',').forEach(a => smartSearchKeywords.push(a.trim().toLowerCase()));

      // Removing any duplicate items
      const finalizedTags = [...new Set(smartSearchKeywords)];

      const trackId = "track_" + Date.now();

      const songPayload = {
        id: trackId,
        title: title,
        artist: artist,
        src: src,
        cover: cover,
        duration: duration,
        tags: finalizedTags // Ye tag database me jate hi search bar filter ke andar match ho jayenge
      };

      // Writing data inside the Firebase DB
      set(ref(db, 'global_songs/' + trackId), songPayload)
        .then(() => {
          showToast(`Success! "${title}" has been published. Search panel auto-modified!`);
          
          // Clear inputs
          document.getElementById('song-title').value = '';
          document.getElementById('song-artist').value = '';
          document.getElementById('song-album').value = '';
          document.getElementById('song-src').value = '';
          document.getElementById('song-cover').value = '';
          document.getElementById('song-tags').value = '';
          document.getElementById('song-duration').value = '';
        })
        .catch((err) => {
          showToast("Upload pipeline failed: " + err.message, true);
        });
    });
  </script>
</body>
</html>

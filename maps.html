<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GSP Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;overflow:hidden;background:#07111f}
#map{width:100vw;height:100vh}

.liquid{
  background:
    radial-gradient(circle at 18% 12%,rgba(255,255,255,.96),transparent 30%),
    linear-gradient(135deg,rgba(255,255,255,.72),rgba(255,255,255,.22));
  backdrop-filter:blur(36px) saturate(220%);
  -webkit-backdrop-filter:blur(36px) saturate(220%);
  border:1px solid rgba(255,255,255,.52);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.92),inset 0 -24px 50px rgba(255,255,255,.13),0 26px 75px rgba(0,0,0,.32)
}

.top{
  position:fixed;top:14px;left:50%;transform:translateX(-50%);
  width:min(94%,680px);z-index:999;border-radius:30px;padding:10px;display:flex;gap:10px
}
.top input{
  flex:1;height:50px;border:0;outline:0;border-radius:22px;
  background:rgba(255,255,255,.58);padding:0 16px;font-size:15px;color:#111827
}
.btn{
  border:0;cursor:pointer;border-radius:20px;font-weight:900
}
.blue{
  width:56px;background:linear-gradient(135deg,#007aff,#5ac8fa);color:white
}
.blue svg{width:22px;height:22px;fill:white}

.maptypes{
  position:fixed;top:86px;left:50%;transform:translateX(-50%);
  z-index:998;width:min(94%,680px);display:flex;gap:8px;overflow-x:auto;padding:8px;border-radius:22px
}
.maptypes button{
  white-space:nowrap;border:0;border-radius:999px;padding:9px 13px;
  background:rgba(255,255,255,.58);font-weight:850;color:#111827
}
.maptypes button.active{background:#111827;color:white}

.controls{
  position:fixed;right:18px;bottom:24px;z-index:999;display:flex;flex-direction:column;gap:14px
}
.circle{
  width:60px;height:60px;border-radius:22px;border:0;display:grid;place-items:center;cursor:pointer;
  transition:.22s cubic-bezier(.2,.8,.2,1)
}
.circle svg{width:25px;height:25px;fill:#111827;opacity:.92}
.circle:hover{transform:translateY(-2px) scale(1.03)}
.circle:active{transform:scale(.94)}

.panel{
  position:fixed;left:16px;bottom:22px;z-index:999;
  width:min(92%,410px);max-height:58vh;overflow:auto;border-radius:30px;padding:18px;color:#111827
}
.title{font-weight:950;font-size:17px;margin-bottom:8px}
.text{font-size:13px;color:rgba(17,24,39,.76);line-height:1.48}

input,textarea,select{
  width:100%;margin-top:9px;padding:12px;border-radius:16px;
  border:1px solid rgba(0,0,0,.08);outline:0;background:rgba(255,255,255,.68)
}
textarea{min-height:72px}
.submit{width:100%;margin-top:10px;padding:13px;border-radius:18px;background:#111827;color:white;border:0;font-weight:900}
.secondary{width:100%;margin-top:8px;padding:12px;border-radius:18px;background:rgba(255,255,255,.56);color:#111827;border:0;font-weight:900}

.imgs{display:flex;gap:8px;overflow-x:auto;margin-top:10px}
.imgs img{width:94px;height:94px;object-fit:cover;border-radius:18px}
.review{margin-top:8px;padding:10px;border-radius:16px;background:rgba(255,255,255,.45)}
.stars{color:#f59e0b;font-weight:950}

.gps-dot{
  width:22px;height:22px;border-radius:50%;background:#007aff;border:4px solid white;
  box-shadow:0 0 0 10px rgba(0,122,255,.16),0 8px 24px rgba(0,0,0,.28)
}
.gps-heading{
  width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:26px solid #007aff;
  filter:drop-shadow(0 5px 8px rgba(0,0,0,.28));transform-origin:50% 80%
}
.place-icon{
  width:42px;height:42px;border-radius:16px;display:grid;place-items:center;border:2px solid white;
  box-shadow:0 10px 25px rgba(0,0,0,.28)
}
.place-icon svg{width:22px;height:22px;fill:white}
.leaflet-div-icon{background:transparent;border:0}
.leaflet-control-zoom{display:none}
.leaflet-popup-content-wrapper{border-radius:18px}
</style>
</head>

<body>

<div class="top liquid">
  <input id="searchInput" placeholder="Search places, roads, shops...">
  <button class="btn blue" onclick="searchPlace()">
    <svg viewBox="0 0 24 24"><path d="M12 2 3 21l9-4 9 4-9-19Zm0 4.8 4.5 10.1-4.5-2-4.5 2L12 6.8Z"/></svg>
  </button>
</div>

<div class="maptypes liquid">
  <button onclick="setMapType('default')" class="active" id="btn-default">Default</button>
  <button onclick="setMapType('satellite')" id="btn-satellite">Satellite</button>
  <button onclick="setMapType('terrain')" id="btn-terrain">Terrain</button>
  <button onclick="setMapType('biking')" id="btn-biking">Biking</button>
  <button onclick="notFree('Transit')">Transit</button>
  <button onclick="notFree('Traffic')">Traffic</button>
  <button onclick="openStreetView()">Street View</button>
</div>

<div id="map"></div>

<div class="controls">
  <button class="circle liquid" onclick="startLiveGPS()" title="Live GPS">
    <svg viewBox="0 0 24 24"><path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Zm9 3h-2.07A7.01 7.01 0 0 0 13 5.07V3h-2v2.07A7.01 7.01 0 0 0 5.07 11H3v2h2.07A7.01 7.01 0 0 0 11 18.93V21h2v-2.07A7.01 7.01 0 0 0 18.93 13H21v-2Zm-9 6a5 5 0 1 1 0-10 5 5 0 0 1 0 10Z"/></svg>
  </button>

  <button class="circle liquid" onclick="openAddShop()" title="Add Place">
    <svg viewBox="0 0 24 24"><path d="M11 11V5h2v6h6v2h-6v6h-2v-6H5v-2h6Z"/></svg>
  </button>

  <button class="circle liquid" onclick="toggleFollow()" title="Follow Mode">
    <svg viewBox="0 0 24 24"><path d="M12 2 4 22l8-4 8 4-8-20Zm0 5.5 4.1 10.2-4.1-2-4.1 2L12 7.5Z"/></svg>
  </button>
</div>

<div class="panel liquid" id="panel">
  <div class="title">GSP Map Ready</div>
  <div class="text">Live GPS dot move hoga, direction arrow show hogi, aur places category icons ke sath map pe show honge.</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { getDatabase, ref, push, onValue, set, update, get } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC30TcmMVhP_8HdFYS1WufRiZwSDYNMTF0",
  authDomain: "pulse2-92372.firebaseapp.com",
  databaseURL: "https://pulse2-92372-default-rtdb.firebaseio.com",
  projectId: "pulse2-92372",
  storageBucket: "pulse2-92372.firebasestorage.app",
  messagingSenderId: "276235725177",
  appId: "1:276235725177:web:0f4e0789fae80a435927a8"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.map = L.map("map",{zoomControl:false}).setView([28.6139,77.2090],13);

const layers = {
  default: L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"© OpenStreetMap"}),
  satellite: L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",{maxZoom:19,attribution:"Tiles © Esri"}),
  terrain: L.tileLayer("https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png",{maxZoom:17,attribution:"© OpenTopoMap"}),
  biking: L.tileLayer("https://tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png",{maxZoom:19,attribution:"© CyclOSM"})
};

let currentLayer = layers.default.addTo(map);
let selectedLatLng = null;
let searchMarker = null;
let accuracyCircle = null;
let gpsMarker = null;
let routeLine = null;
let watchId = null;
let followUser = true;
let lastPosition = null;
let shopMarkers = {};

function panel(title, html){
  document.getElementById("panel").innerHTML = `<div class="title">${title}</div><div class="text">${html}</div>`;
}

window.setMapType = function(type){
  map.removeLayer(currentLayer);
  currentLayer = layers[type].addTo(map);
  document.querySelectorAll(".maptypes button").forEach(b=>b.classList.remove("active"));
  document.getElementById("btn-"+type)?.classList.add("active");
};

window.notFree = function(name){
  panel(name + " Layer", `${name} live layer normally paid/provider API se milta hai. Free reliable layer guaranteed nahi hota.`);
};

window.openStreetView = function(){
  const c = selectedLatLng || map.getCenter();
  window.open(`https://www.mapillary.com/app/?lat=${c.lat}&lng=${c.lng}&z=17`,"_blank");
};

function bearingBetween(lat1,lng1,lat2,lng2){
  const toRad = d => d * Math.PI / 180;
  const toDeg = r => r * 180 / Math.PI;
  const y = Math.sin(toRad(lng2-lng1)) * Math.cos(toRad(lat2));
  const x = Math.cos(toRad(lat1))*Math.sin(toRad(lat2)) - Math.sin(toRad(lat1))*Math.cos(toRad(lat2))*Math.cos(toRad(lng2-lng1));
  return (toDeg(Math.atan2(y,x)) + 360) % 360;
}

function gpsIcon(heading){
  const rotation = Number.isFinite(heading) ? heading : 0;
  return L.divIcon({
    className:"",
    iconSize:[44,44],
    iconAnchor:[22,22],
    html:`
      <div style="width:44px;height:44px;display:grid;place-items:center;position:relative">
        <div class="gps-heading" style="position:absolute;transform:rotate(${rotation}deg) translateY(-14px);"></div>
        <div class="gps-dot" style="position:absolute"></div>
      </div>
    `
  });
}

window.startLiveGPS = function(){
  if(!navigator.geolocation){
    panel("GPS Not Supported","Browser GPS support nahi karta.");
    return;
  }

  if(watchId){
    panel("Live GPS Already On","Your location dot real-time update ho raha hai.");
    return;
  }

  panel("Starting Live GPS","Location permission allow karo. Move karoge to dot bhi move hoga.");

  watchId = navigator.geolocation.watchPosition(pos=>{
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    const acc = pos.coords.accuracy;

    let heading = pos.coords.heading;
    if((heading === null || Number.isNaN(heading)) && lastPosition){
      heading = bearingBetween(lastPosition.lat,lastPosition.lng,lat,lng);
    }

    selectedLatLng = {lat,lng};

    if(!gpsMarker){
      gpsMarker = L.marker([lat,lng],{icon:gpsIcon(heading)}).addTo(map).bindPopup("You are here");
    }else{
      gpsMarker.setLatLng([lat,lng]);
      gpsMarker.setIcon(gpsIcon(heading));
    }

    if(accuracyCircle) map.removeLayer(accuracyCircle);
    accuracyCircle = L.circle([lat,lng],{radius:acc,weight:1,fillOpacity:.13}).addTo(map);

    if(lastPosition){
      if(routeLine) routeLine.addLatLng([lat,lng]);
      else routeLine = L.polyline([[lastPosition.lat,lastPosition.lng],[lat,lng]],{weight:5,opacity:.75}).addTo(map);
    }

    lastPosition = {lat,lng};

    if(followUser) map.setView([lat,lng],17,{animate:true});

    panel("Live GPS Active",`Lat: ${lat.toFixed(5)}<br>Lng: ${lng.toFixed(5)}<br>Accuracy: ${Math.round(acc)}m<br>Direction: ${Math.round(heading || 0)}°`);
  },()=>{
    panel("Location Blocked","GPS permission denied ya signal unavailable.");
  },{enableHighAccuracy:true,timeout:12000,maximumAge:0});
};

window.toggleFollow = function(){
  followUser = !followUser;
  panel("Follow Mode", followUser ? "ON — map automatically aapki location follow karega." : "OFF — map move nahi karega, sirf dot update hoga.");
};

window.searchPlace = async function(){
  const q = document.getElementById("searchInput").value.trim();
  if(!q) return panel("Search Required","Type place name first.");

  panel("Searching",`Looking for <b>${q}</b>...`);

  try{
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(q)}`);
    const data = await res.json();

    if(!data.length) return panel("No Result","Try a more specific name.");

    const place = data[0];
    const lat = Number(place.lat);
    const lng = Number(place.lon);

    selectedLatLng = {lat,lng};
    map.setView([lat,lng],16);

    if(searchMarker) map.removeLayer(searchMarker);
    searchMarker = L.marker([lat,lng]).addTo(map).bindPopup(place.display_name).openPopup();

    panel("Place Found",place.display_name);
  }catch(e){
    panel("Search Failed","Network error.");
  }
};

map.on("click", e=>{
  selectedLatLng = e.latlng;
  panel("Location Selected",`Lat: ${e.latlng.lat.toFixed(5)}<br>Lng: ${e.latlng.lng.toFixed(5)}<br><br>Tap + to add place here.`);
});

function normalizeCategory(c){
  c = (c || "").toLowerCase();
  if(c.includes("hospital")) return "hospital";
  if(c.includes("clinic") || c.includes("doctor")) return "clinic";
  if(c.includes("medical") || c.includes("pharmacy")) return "pharmacy";
  if(c.includes("store") || c.includes("mart")) return "store";
  if(c.includes("shop")) return "shop";
  if(c.includes("bar") || c.includes("pub")) return "bar";
  if(c.includes("cafe") || c.includes("coffee")) return "cafe";
  if(c.includes("restaurant") || c.includes("food")) return "restaurant";
  if(c.includes("hotel")) return "hotel";
  if(c.includes("school") || c.includes("college")) return "school";
  if(c.includes("fuel") || c.includes("petrol") || c.includes("gas")) return "fuel";
  if(c.includes("police")) return "police";
  return "other";
}

const colors = {
  hospital:"#ef4444", clinic:"#ec4899", pharmacy:"#10b981", store:"#2563eb", shop:"#7c3aed",
  bar:"#111827", cafe:"#92400e", restaurant:"#f97316", hotel:"#0f766e", school:"#6366f1",
  fuel:"#ca8a04", police:"#1d4ed8", other:"#475569"
};

const svgPaths = {
  hospital:'<path d="M10 3h4v7h7v4h-7v7h-4v-7H3v-4h7V3Z"/>',
  clinic:'<path d="M12 21s-7-4.4-9.2-9.1C.8 7.6 3.4 4 7.2 4c2 0 3.6 1 4.8 2.5C13.2 5 14.8 4 16.8 4c3.8 0 6.4 3.6 4.4 7.9C19 16.6 12 21 12 21Z"/>',
  pharmacy:'<path d="M7 3h10v4l-2 2v12H9V9L7 7V3Zm4 9H9v3h2v2h3v-2h2v-3h-2v-2h-3v2Z"/>',
  store:'<path d="M4 4h16l1 6H3l1-6Zm1 8h14v8H5v-8Zm3 2v4h8v-4H8Z"/>',
  shop:'<path d="M3 9 5 4h14l2 5v2a3 3 0 0 1-5 2.2A3 3 0 0 1 12 13a3 3 0 0 1-4 0A3 3 0 0 1 3 11V9Zm3 6h12v6H6v-6Z"/>',
  bar:'<path d="M5 3h14l-2 8a5 5 0 0 1-4 3.9V19h4v2H7v-2h4v-4.1A5 5 0 0 1 7 11L5 3Z"/>',
  cafe:'<path d="M4 5h12v7a5 5 0 0 1-5 5H9a5 5 0 0 1-5-5V5Zm13 2h1a3 3 0 0 1 0 6h-1V7ZM6 19h12v2H6v-2Z"/>',
  restaurant:'<path d="M7 2h2v8H7V2Zm-3 0h2v8H4V2Zm6 0h2v8a4 4 0 0 1-3 3.87V22H7v-8.13A4 4 0 0 1 4 10h8a4 4 0 0 1-2 3.46V2Zm8 0h2v20h-2v-8h-3V7a5 5 0 0 1 3-5Z"/>',
  hotel:'<path d="M4 4h16v17h-2v-3H6v3H4V4Zm3 3v4h4V7H7Zm6 0v4h4V7h-4ZM6 13v3h12v-3H6Z"/>',
  school:'<path d="M12 3 2 8l10 5 8-4v6h2V8L12 3Zm-6 8v5c2 2 10 2 12 0v-5l-6 3-6-3Z"/>',
  fuel:'<path d="M6 3h10v18H6V3Zm2 2v6h6V5H8Zm10 2 3 3v8a2 2 0 0 1-4 0v-5h-1v-2h3l-2-2 1-2Z"/>',
  police:'<path d="M12 2 5 5v6c0 5 3.4 9.7 7 11 3.6-1.3 7-6 7-11V5l-7-3Zm0 5 1.2 2.5 2.8.4-2 2 .5 2.8-2.5-1.3-2.5 1.3.5-2.8-2-2 2.8-.4L12 7Z"/>',
  other:'<path d="M12 2a7 7 0 0 0-7 7c0 5.3 7 13 7 13s7-7.7 7-13a7 7 0 0 0-7-7Zm0 9.5A2.5 2.5 0 1 1 12 6a2.5 2.5 0 0 1 0 5.5Z"/>'
};

function placeIcon(category){
  const type = normalizeCategory(category);
  return L.divIcon({
    className:"place-div-icon",
    iconSize:[42,42],
    iconAnchor:[21,42],
    popupAnchor:[0,-40],
    html:`<div class="place-icon" style="background:${colors[type]}"><svg viewBox="0 0 24 24">${svgPaths[type]}</svg></div>`
  });
}

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function filesToBase64(files){
  const arr = [];
  for(const file of files){
    if(file.size > 700000){
      alert(file.name + " too large. Keep under 700KB for Realtime Database.");
      continue;
    }
    arr.push(await fileToBase64(file));
  }
  return arr;
}

window.openAddShop = function(){
  if(!selectedLatLng) return panel("Select Location","Map pe tap karo ya live GPS start karo.");

  panel("Add Place",`
    <input id="shopName" placeholder="Place name">
    <select id="shopCategory">
      <option value="Hospital">Hospital</option>
      <option value="Clinic">Clinic</option>
      <option value="Pharmacy">Pharmacy</option>
      <option value="Store">Store</option>
      <option value="Shop">Shop</option>
      <option value="Bar">Bar</option>
      <option value="Cafe">Cafe</option>
      <option value="Restaurant">Restaurant</option>
      <option value="Hotel">Hotel</option>
      <option value="School">School</option>
      <option value="Fuel">Fuel</option>
      <option value="Police">Police</option>
      <option value="Other">Other</option>
    </select>
    <textarea id="shopDesc" placeholder="Description"></textarea>
    <input id="shopImages" type="file" accept="image/*" multiple>
    <button class="submit" onclick="saveShop()">Add Place</button>
  `);
};

window.saveShop = async function(){
  const name = document.getElementById("shopName").value.trim();
  const category = document.getElementById("shopCategory").value;
  const desc = document.getElementById("shopDesc").value.trim();
  const files = document.getElementById("shopImages").files;

  if(!name) return alert("Place name required");

  panel("Saving","Base64 images convert ho rahi hain...");

  const images = await filesToBase64(files);
  const shopRef = push(ref(db,"shops"));

  await set(shopRef,{
    id:shopRef.key,
    name, category, desc,
    lat:selectedLatLng.lat,
    lng:selectedLatLng.lng,
    images,
    ratingTotal:0,
    ratingCount:0,
    createdAt:Date.now()
  });

  panel("Place Added",`${name} map pe ${category} icon ke sath live ho gaya.`);
};

function loadShops(){
  onValue(ref(db,"shops"), snap=>{
    const shops = snap.val() || {};
    Object.values(shops).forEach(shop=>{
      if(shopMarkers[shop.id]) map.removeLayer(shopMarkers[shop.id]);

      const avg = shop.ratingCount ? (shop.ratingTotal / shop.ratingCount).toFixed(1) : "No rating";
      const marker = L.marker([shop.lat,shop.lng],{icon:placeIcon(shop.category)}).addTo(map);

      marker.bindPopup(`<b>${shop.name}</b><br>${shop.category || "Place"}<br>⭐ ${avg}`);
      marker.on("click",()=>openShop(shop.id));
      shopMarkers[shop.id] = marker;
    });
  });
}

window.openShop = async function(id){
  const shopSnap = await get(ref(db,`shops/${id}`));
  const shop = shopSnap.val();

  const reviewSnap = await get(ref(db,`reviews/${id}`));
  const reviews = reviewSnap.val() || {};

  const avg = shop.ratingCount ? (shop.ratingTotal / shop.ratingCount).toFixed(1) : "No rating";

  const imgs = shop.images?.length
    ? `<div class="imgs">${shop.images.map(img=>`<img src="${img}">`).join("")}</div>`
    : "";

  const reviewHtml = Object.values(reviews).reverse().slice(0,6).map(r=>`
    <div class="review">
      <div class="stars">${"★".repeat(Number(r.rating))}</div>
      ${r.text || ""}
    </div>
  `).join("");

  panel(shop.name,`
    <b>${shop.category || "Place"}</b><br>
    ${shop.desc || ""}<br><br>
    <b>Rating:</b> ⭐ ${avg}<br>
    ${imgs}

    <button class="secondary" onclick="drawDirectionTo(${shop.lat},${shop.lng})">Show Direction</button>
    <button class="secondary" onclick="window.open('https://www.mapillary.com/app/?lat=${shop.lat}&lng=${shop.lng}&z=17','_blank')">Street View</button>

    <select id="rateValue">
      <option value="5">★★★★★ 5</option>
      <option value="4">★★★★ 4</option>
      <option value="3">★★★ 3</option>
      <option value="2">★★ 2</option>
      <option value="1">★ 1</option>
    </select>

    <textarea id="reviewText" placeholder="Write your review..."></textarea>
    <input id="moreImages" type="file" accept="image/*" multiple>
    <button class="submit" onclick="submitReview('${id}')">Submit Rating / Images</button>

    <br><br><b>Reviews</b>
    ${reviewHtml || "<br>No reviews yet."}
  `);
};

window.drawDirectionTo = function(lat,lng){
  const start = lastPosition || selectedLatLng;
  if(!start) return panel("GPS Required","Live GPS start karo, fir direction line show hogi.");

  if(routeLine) map.removeLayer(routeLine);

  routeLine = L.polyline([[start.lat,start.lng],[lat,lng]],{weight:6,opacity:.8}).addTo(map);
  map.fitBounds(routeLine.getBounds(),{padding:[70,70]});

  const heading = bearingBetween(start.lat,start.lng,lat,lng);
  panel("Direction Ready",`Straight direction line added.<br>Heading: ${Math.round(heading)}°`);
};

window.submitReview = async function(shopId){
  const rating = Number(document.getElementById("rateValue").value);
  const text = document.getElementById("reviewText").value.trim();
  const files = document.getElementById("moreImages").files;

  panel("Uploading","Review and Base64 images save ho rahi hain...");

  const shopSnap = await get(ref(db,`shops/${shopId}`));
  const shop = shopSnap.val();

  const newImages = await filesToBase64(files);
  const allImages = [...(shop.images || []), ...newImages];

  await push(ref(db,`reviews/${shopId}`),{rating,text,createdAt:Date.now()});

  await update(ref(db,`shops/${shopId}`),{
    images:allImages,
    ratingTotal:(shop.ratingTotal || 0) + rating,
    ratingCount:(shop.ratingCount || 0) + 1
  });

  panel("Review Added","Rating, review and images added.");
};

document.getElementById("searchInput").addEventListener("keydown",e=>{
  if(e.key==="Enter") searchPlace();
});

loadShops();
</script>

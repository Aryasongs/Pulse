<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GSP Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden;background:#07111f}
#map{width:100vw;height:100vh}

.liquid{
  background:linear-gradient(135deg,rgba(255,255,255,.78),rgba(255,255,255,.28));
  backdrop-filter:blur(30px) saturate(190%);
  -webkit-backdrop-filter:blur(30px) saturate(190%);
  border:1px solid rgba(255,255,255,.45);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.75),0 20px 50px rgba(0,0,0,.25)
}

.top{
  position:fixed;top:14px;left:50%;transform:translateX(-50%);
  width:min(94%,650px);z-index:999;border-radius:30px;padding:10px;display:flex;gap:10px
}
.top input{
  flex:1;height:50px;border:0;outline:0;border-radius:22px;
  background:rgba(255,255,255,.58);padding:0 16px;font-size:15px
}
.btn{
  border:0;cursor:pointer;border-radius:20px;font-weight:800
}
.blue{
  width:56px;background:linear-gradient(135deg,#007aff,#5ac8fa);color:white;font-size:18px
}

.controls{
  position:fixed;right:16px;bottom:22px;z-index:999;display:flex;flex-direction:column;gap:11px
}
.circle{width:58px;height:58px;border-radius:50%;font-size:21px}

.panel{
  position:fixed;left:16px;bottom:22px;z-index:999;
  width:min(92%,390px);max-height:56vh;overflow:auto;
  border-radius:30px;padding:17px;color:#111827
}
.title{font-weight:900;font-size:16px;margin-bottom:8px}
.text{font-size:13px;color:rgba(17,24,39,.76);line-height:1.45}

.maptypes{
  position:fixed;top:86px;left:50%;transform:translateX(-50%);
  z-index:998;width:min(94%,650px);display:flex;gap:8px;overflow-x:auto;padding:8px;border-radius:22px
}
.maptypes button{
  white-space:nowrap;border:0;border-radius:999px;padding:9px 13px;
  background:rgba(255,255,255,.58);font-weight:800;color:#111827
}
.maptypes button.active{background:#111827;color:white}

input,textarea,select{
  width:100%;margin-top:9px;padding:12px;border-radius:16px;
  border:1px solid rgba(0,0,0,.08);outline:0;background:rgba(255,255,255,.65)
}
textarea{min-height:70px}
.submit{
  width:100%;margin-top:10px;padding:13px;border-radius:18px;
  background:#111827;color:white
}

.imgs{display:flex;gap:8px;overflow-x:auto;margin-top:10px}
.imgs img{width:94px;height:94px;object-fit:cover;border-radius:18px}

.review{margin-top:8px;padding:10px;border-radius:16px;background:rgba(255,255,255,.45)}
.stars{color:#f59e0b;font-weight:900}

.leaflet-control-zoom{display:none}
.leaflet-popup-content-wrapper{border-radius:18px}
</style>
</head>

<body>

<div class="top liquid">
  <input id="searchInput" placeholder="Search places, roads, shops...">
  <button class="btn blue" onclick="searchPlace()">↗</button>
</div>

<div class="maptypes liquid">
  <button onclick="setMapType('default')" class="active" id="btn-default">Default</button>
  <button onclick="setMapType('satellite')" id="btn-satellite">Satellite</button>
  <button onclick="setMapType('terrain')" id="btn-terrain">Terrain</button>
  <button onclick="setMapType('biking')" id="btn-biking">Biking</button>
  <button onclick="notFree('Transit')">Transit</button>
  <button onclick="notFree('Traffic')">Traffic</button>
  <button onclick="openStreetView()">Street View</button>
</div>

<div id="map"></div>

<div class="controls">
  <button class="circle liquid" onclick="getMyLocation()">📍</button>
  <button class="circle liquid" onclick="openAddShop()">＋</button>
  <button class="circle liquid" onclick="map.zoomIn()">+</button>
  <button class="circle liquid" onclick="map.zoomOut()">−</button>
</div>

<div class="panel liquid" id="panel">
  <div class="title">GSP Map Ready</div>
  <div class="text">Search places, view satellite/terrain/biking maps, add shops, upload Base64 images, ratings and reviews.</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getDatabase, ref, push, onValue, set, update, get } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC30TcmMVhP_8HdFYS1WufRiZwSDYNMTF0",
  authDomain: "pulse2-92372.firebaseapp.com",
  databaseURL: "https://pulse2-92372-default-rtdb.firebaseio.com",
  projectId: "pulse2-92372",
  storageBucket: "pulse2-92372.firebasestorage.app",
  messagingSenderId: "276235725177",
  appId: "1:276235725177:web:0f4e0789fae80a435927a8"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.map = L.map("map",{zoomControl:false}).setView([28.6139,77.2090],13);

const layers = {
  default: L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom:19,
    attribution:"© OpenStreetMap"
  }),

  satellite: L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
    maxZoom:19,
    attribution:"Tiles © Esri"
  }),

  terrain: L.tileLayer("https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png", {
    maxZoom:17,
    attribution:"© OpenTopoMap"
  }),

  biking: L.tileLayer("https://tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png", {
    maxZoom:19,
    attribution:"© CyclOSM"
  })
};

let currentLayer = layers.default.addTo(map);
let userMarker, accuracyCircle, searchMarker;
let selectedLatLng = null;
let shopMarkers = {};

function panel(title, html){
  document.getElementById("panel").innerHTML = `<div class="title">${title}</div><div class="text">${html}</div>`;
}

window.setMapType = function(type){
  map.removeLayer(currentLayer);
  currentLayer = layers[type].addTo(map);

  document.querySelectorAll(".maptypes button").forEach(b=>b.classList.remove("active"));
  const btn = document.getElementById("btn-" + type);
  if(btn) btn.classList.add("active");
};

window.notFree = function(name){
  panel(name + " Layer", `${name} live data normally needs paid/provider API. Free public reliable ${name.toLowerCase()} layer is not guaranteed.`);
};

window.openStreetView = function(){
  const center = selectedLatLng || map.getCenter();
  const url = `https://www.mapillary.com/app/?lat=${center.lat}&lng=${center.lng}&z=17`;
  window.open(url, "_blank");
};

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function filesToBase64(files){
  const arr = [];
  for(const file of files){
    if(file.size > 700000){
      alert(file.name + " is too large. Keep image under 700KB for Firebase Realtime Database.");
      continue;
    }
    arr.push(await fileToBase64(file));
  }
  return arr;
}

window.getMyLocation = function(){
  if(!navigator.geolocation){
    panel("GPS Not Supported","Browser GPS support nahi karta.");
    return;
  }

  panel("Finding Location","Allow location permission.");

  navigator.geolocation.getCurrentPosition(pos=>{
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    const acc = pos.coords.accuracy;

    selectedLatLng = {lat,lng};
    map.setView([lat,lng],17);

    if(userMarker) map.removeLayer(userMarker);
    if(accuracyCircle) map.removeLayer(accuracyCircle);

    userMarker = L.marker([lat,lng]).addTo(map).bindPopup("You are here").openPopup();
    accuracyCircle = L.circle([lat,lng],{radius:acc,fillOpacity:.15}).addTo(map);

    panel("Your Location",`Lat: ${lat.toFixed(5)}<br>Lng: ${lng.toFixed(5)}<br>Accuracy: ${Math.round(acc)}m`);
  },()=>{
    panel("Location Blocked","GPS permission denied.");
  },{enableHighAccuracy:true,timeout:10000,maximumAge:0});
};

window.searchPlace = async function(){
  const q = document.getElementById("searchInput").value.trim();
  if(!q) return panel("Search Required","Type place name first.");

  panel("Searching",`Looking for <b>${q}</b>...`);

  try{
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(q)}`);
    const data = await res.json();

    if(!data.length) return panel("No Result","Try a specific name.");

    const place = data[0];
    const lat = Number(place.lat);
    const lng = Number(place.lon);

    selectedLatLng = {lat,lng};
    map.setView([lat,lng],16);

    if(searchMarker) map.removeLayer(searchMarker);
    searchMarker = L.marker([lat,lng]).addTo(map).bindPopup(place.display_name).openPopup();

    panel("Place Found",place.display_name);
  }catch(e){
    panel("Search Failed","Network error.");
  }
};

map.on("click", e=>{
  selectedLatLng = e.latlng;
  panel("Location Selected",`Lat: ${e.latlng.lat.toFixed(5)}<br>Lng: ${e.latlng.lng.toFixed(5)}<br><br>Tap ＋ to add shop here.`);
});

window.openAddShop = function(){
  if(!selectedLatLng) return panel("Select Location","Map pe tap karo ya 📍 use karo.");

  panel("Add Shop",`
    <input id="shopName" placeholder="Shop name">
    <input id="shopCategory" placeholder="Category e.g. Cafe, Store, Hotel">
    <textarea id="shopDesc" placeholder="Description"></textarea>
    <input id="shopImages" type="file" accept="image/*" multiple>
    <button class="submit" onclick="saveShop()">Add Shop</button>
  `);
};

window.saveShop = async function(){
  const name = document.getElementById("shopName").value.trim();
  const category = document.getElementById("shopCategory").value.trim();
  const desc = document.getElementById("shopDesc").value.trim();
  const files = document.getElementById("shopImages").files;

  if(!name) return alert("Shop name required");

  panel("Saving","Images Base64 me convert ho rahi hain...");

  const images = await filesToBase64(files);
  const shopRef = push(ref(db,"shops"));

  await set(shopRef,{
    id:shopRef.key,
    name,
    category,
    desc,
    lat:selectedLatLng.lat,
    lng:selectedLatLng.lng,
    images,
    ratingTotal:0,
    ratingCount:0,
    createdAt:Date.now()
  });

  panel("Shop Added","Shop map pe live ho gayi.");
};

function loadShops(){
  onValue(ref(db,"shops"), snap=>{
    const shops = snap.val() || {};

    Object.values(shops).forEach(shop=>{
      if(shopMarkers[shop.id]) map.removeLayer(shopMarkers[shop.id]);

      const avg = shop.ratingCount ? (shop.ratingTotal / shop.ratingCount).toFixed(1) : "No rating";

      const marker = L.marker([shop.lat,shop.lng]).addTo(map);
      marker.bindPopup(`<b>${shop.name}</b><br>${shop.category || "Shop"}<br>⭐ ${avg}`);
      marker.on("click",()=>openShop(shop.id));

      shopMarkers[shop.id] = marker;
    });
  });
}

window.openShop = async function(id){
  const shopSnap = await get(ref(db,`shops/${id}`));
  const shop = shopSnap.val();

  const reviewSnap = await get(ref(db,`reviews/${id}`));
  const reviews = reviewSnap.val() || {};

  const avg = shop.ratingCount ? (shop.ratingTotal / shop.ratingCount).toFixed(1) : "No rating";

  const imgs = shop.images?.length
    ? `<div class="imgs">${shop.images.map(img=>`<img src="${img}">`).join("")}</div>`
    : "";

  const reviewHtml = Object.values(reviews).reverse().slice(0,6).map(r=>`
    <div class="review">
      <div class="stars">${"★".repeat(Number(r.rating))}</div>
      ${r.text || ""}
    </div>
  `).join("");

  panel(shop.name,`
    <b>${shop.category || "Shop"}</b><br>
    ${shop.desc || ""}<br><br>
    <b>Rating:</b> ⭐ ${avg}<br>
    ${imgs}

    <select id="rateValue">
      <option value="5">★★★★★ 5</option>
      <option value="4">★★★★ 4</option>
      <option value="3">★★★ 3</option>
      <option value="2">★★ 2</option>
      <option value="1">★ 1</option>
    </select>

    <textarea id="reviewText" placeholder="Write your review..."></textarea>
    <input id="moreImages" type="file" accept="image/*" multiple>
    <button class="submit" onclick="submitReview('${id}')">Submit Rating / Images</button>

    <br><br><b>Reviews</b>
    ${reviewHtml || "<br>No reviews yet."}
  `);
};

window.submitReview = async function(shopId){
  const rating = Number(document.getElementById("rateValue").value);
  const text = document.getElementById("reviewText").value.trim();
  const files = document.getElementById("moreImages").files;

  panel("Uploading","Review and Base64 images save ho rahi hain...");

  const shopSnap = await get(ref(db,`shops/${shopId}`));
  const shop = shopSnap.val();

  const newImages = await filesToBase64(files);
  const allImages = [...(shop.images || []), ...newImages];

  await push(ref(db,`reviews/${shopId}`),{
    rating,
    text,
    createdAt:Date.now()
  });

  await update(ref(db,`shops/${shopId}`),{
    images:allImages,
    ratingTotal:(shop.ratingTotal || 0) + rating,
    ratingCount:(shop.ratingCount || 0) + 1
  });

  panel("Review Added","Rating, review and images added.");
};

document.getElementById("searchInput").addEventListener("keydown",e=>{
  if(e.key==="Enter") searchPlace();
});

loadShops();
</script>

</body>
</html>

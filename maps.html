<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPS Map | Liquid Glass</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
  overflow: hidden;
  background: #0b1220;
}

#map {
  width: 100vw;
  height: 100vh;
  filter: saturate(1.12) contrast(1.04);
}

.liquid {
  background: linear-gradient(
    135deg,
    rgba(255,255,255,0.72),
    rgba(255,255,255,0.32)
  );
  backdrop-filter: blur(28px) saturate(180%);
  -webkit-backdrop-filter: blur(28px) saturate(180%);
  border: 1px solid rgba(255,255,255,0.45);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.75),
    0 18px 45px rgba(0,0,0,0.22);
}

.top-shell {
  position: fixed;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  width: min(92%, 560px);
  z-index: 999;
  border-radius: 28px;
  padding: 10px;
  display: flex;
  gap: 10px;
}

.search-box {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 9px;
  background: rgba(255,255,255,0.52);
  border-radius: 22px;
  padding: 0 14px;
}

.search-box span {
  font-size: 18px;
}

.search-box input {
  flex: 1;
  height: 48px;
  border: none;
  outline: none;
  background: transparent;
  font-size: 15px;
  color: #111827;
}

.search-box input::placeholder {
  color: rgba(17,24,39,0.55);
}

.action-btn {
  border: none;
  min-width: 54px;
  height: 48px;
  border-radius: 20px;
  background: linear-gradient(135deg, #007aff, #5ac8fa);
  color: white;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 10px 24px rgba(0,122,255,0.35);
}

.action-btn:active,
.floating-btn:active {
  transform: scale(0.96);
}

.side-controls {
  position: fixed;
  right: 18px;
  bottom: 26px;
  z-index: 999;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.floating-btn {
  width: 58px;
  height: 58px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  font-size: 22px;
  transition: 0.2s ease;
}

.info-panel {
  position: fixed;
  left: 18px;
  bottom: 26px;
  z-index: 999;
  width: min(88%, 330px);
  border-radius: 28px;
  padding: 18px;
  color: #111827;
}

.info-title {
  font-size: 15px;
  font-weight: 800;
  margin-bottom: 6px;
}

.info-text {
  font-size: 13px;
  line-height: 1.45;
  color: rgba(17,24,39,0.72);
}

.brand-pill {
  position: fixed;
  top: 90px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 998;
  padding: 8px 15px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
  color: rgba(17,24,39,0.78);
}

.leaflet-control-zoom {
  display: none;
}

.leaflet-popup-content-wrapper {
  border-radius: 18px;
}

@media (max-width: 520px) {
  .top-shell {
    top: 12px;
    width: 94%;
    border-radius: 24px;
  }

  .info-panel {
    bottom: 18px;
    left: 14px;
    width: calc(100% - 96px);
  }

  .brand-pill {
    display: none;
  }
}
</style>
</head>

<body>

<div class="top-shell liquid">
  <div class="search-box">
    <span>⌕</span>
    <input id="searchInput" placeholder="Search places, roads, cities...">
  </div>
  <button class="action-btn" onclick="searchPlace()">↗</button>
</div>

<div class="brand-pill liquid">GPS Map · OpenStreetMap Powered</div>

<div id="map"></div>

<div class="side-controls">
  <button class="floating-btn liquid" onclick="getMyLocation()">📍</button>
  <button class="floating-btn liquid" onclick="map.zoomIn()">＋</button>
  <button class="floating-btn liquid" onclick="map.zoomOut()">−</button>
</div>

<div class="info-panel liquid" id="info">
  <div class="info-title">Ready to Navigate</div>
  <div class="info-text">Tap location button to detect your GPS position or search any city, road, or place.</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map', {
  zoomControl: false
}).setView([28.6139, 77.2090], 13);

let userMarker;
let accuracyCircle;
let searchMarker;

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

function setInfo(title, text) {
  document.getElementById("info").innerHTML = `
    <div class="info-title">${title}</div>
    <div class="info-text">${text}</div>
  `;
}

function getMyLocation() {
  if (!navigator.geolocation) {
    setInfo("GPS Not Supported", "Your browser does not support live GPS location.");
    return;
  }

  setInfo("Finding Location", "Please allow location permission for accurate GPS tracking.");

  navigator.geolocation.getCurrentPosition(
    position => {
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;
      const accuracy = position.coords.accuracy;

      map.setView([lat, lon], 17);

      if (userMarker) map.removeLayer(userMarker);
      if (accuracyCircle) map.removeLayer(accuracyCircle);

      userMarker = L.marker([lat, lon]).addTo(map)
        .bindPopup("You are here").openPopup();

      accuracyCircle = L.circle([lat, lon], {
        radius: accuracy,
        weight: 1,
        fillOpacity: 0.15
      }).addTo(map);

      setInfo(
        "Your Current Location",
        `Latitude: ${lat.toFixed(5)}<br>Longitude: ${lon.toFixed(5)}<br>Accuracy: ${Math.round(accuracy)} meters`
      );
    },
    () => {
      setInfo("Location Blocked", "GPS permission was denied or your device could not fetch location.");
    },
    {
      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 0
    }
  );
}

async function searchPlace() {
  const query = document.getElementById("searchInput").value.trim();

  if (!query) {
    setInfo("Search Required", "Type a city, road, landmark, or place name first.");
    return;
  }

  setInfo("Searching", `Looking for <b>${query}</b>...`);

  const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(query)}`;

  try {
    const res = await fetch(url);
    const data = await res.json();

    if (!data.length) {
      setInfo("No Result Found", "Try a more specific place name.");
      return;
    }

    const place = data[0];
    const lat = parseFloat(place.lat);
    const lon = parseFloat(place.lon);

    map.setView([lat, lon], 16);

    if (searchMarker) map.removeLayer(searchMarker);

    searchMarker = L.marker([lat, lon]).addTo(map)
      .bindPopup(place.display_name).openPopup();

    setInfo("Place Found", place.display_name);

  } catch (error) {
    setInfo("Search Failed", "Network error or map search service is unavailable.");
  }
}

document.getElementById("searchInput").addEventListener("keydown", e => {
  if (e.key === "Enter") searchPlace();
});
</script>

</body>
</html>

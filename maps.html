<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GPS Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      overflow: hidden;
    }

    #map {
      width: 100vw;
      height: 100vh;
    }

    .top-bar {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 480px;
      z-index: 999;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(18px);
      border-radius: 18px;
      padding: 10px;
      display: flex;
      gap: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    .top-bar input {
      flex: 1;
      border: none;
      outline: none;
      padding: 12px;
      border-radius: 14px;
      font-size: 15px;
      background: #f1f1f1;
    }

    .top-bar button {
      border: none;
      padding: 12px 15px;
      border-radius: 14px;
      background: #007aff;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .gps-btn {
      position: fixed;
      right: 18px;
      bottom: 30px;
      z-index: 999;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background: white;
      font-size: 22px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.25);
      cursor: pointer;
    }

    .info-card {
      position: fixed;
      left: 16px;
      bottom: 25px;
      z-index: 999;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(18px);
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 14px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.18);
      max-width: 260px;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <input id="searchInput" placeholder="Search place, city, road..." />
    <button onclick="searchPlace()">Search</button>
  </div>

  <div id="map"></div>

  <button class="gps-btn" onclick="getMyLocation()">📍</button>

  <div class="info-card" id="info">
    GPS Map ready. Tap 📍 to see your location.
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    let map = L.map('map').setView([28.6139, 77.2090], 13);
    let userMarker;
    let searchMarker;

    // Free OpenStreetMap tiles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    function getMyLocation() {
      if (!navigator.geolocation) {
        alert("GPS not supported on this device/browser.");
        return;
      }

      document.getElementById("info").innerHTML = "Finding your location...";

      navigator.geolocation.getCurrentPosition(
        position => {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;
          const accuracy = position.coords.accuracy;

          map.setView([lat, lon], 17);

          if (userMarker) map.removeLayer(userMarker);

          userMarker = L.marker([lat, lon]).addTo(map)
            .bindPopup("You are here").openPopup();

          L.circle([lat, lon], {
            radius: accuracy
          }).addTo(map);

          document.getElementById("info").innerHTML =
            `<b>Your Location</b><br>Lat: ${lat.toFixed(5)}<br>Lng: ${lon.toFixed(5)}<br>Accuracy: ${Math.round(accuracy)}m`;
        },
        error => {
          document.getElementById("info").innerHTML =
            "Location permission denied or GPS unavailable.";
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    }

    async function searchPlace() {
      const query = document.getElementById("searchInput").value.trim();
      if (!query) return alert("Enter place name");

      document.getElementById("info").innerHTML = "Searching...";

      const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`;

      try {
        const res = await fetch(url);
        const data = await res.json();

        if (!data.length) {
          document.getElementById("info").innerHTML = "No place found.";
          return;
        }

        const place = data[0];
        const lat = parseFloat(place.lat);
        const lon = parseFloat(place.lon);

        map.setView([lat, lon], 16);

        if (searchMarker) map.removeLayer(searchMarker);

        searchMarker = L.marker([lat, lon]).addTo(map)
          .bindPopup(place.display_name).openPopup();

        document.getElementById("info").innerHTML =
          `<b>Found:</b><br>${place.display_name}`;
      } catch (err) {
        document.getElementById("info").innerHTML = "Search failed.";
      }
    }
  </script>

</body>
</html>

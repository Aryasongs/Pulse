<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPS Map Shops</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden;background:#0b1220}
#map{width:100vw;height:100vh;filter:saturate(1.1) contrast(1.03)}

.liquid{
  background:linear-gradient(135deg,rgba(255,255,255,.76),rgba(255,255,255,.32));
  backdrop-filter:blur(28px) saturate(180%);
  -webkit-backdrop-filter:blur(28px) saturate(180%);
  border:1px solid rgba(255,255,255,.45);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.75),0 18px 45px rgba(0,0,0,.22)
}

.top-shell{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  width:min(94%,620px);z-index:999;border-radius:28px;padding:10px;display:flex;gap:10px
}
.search-box{flex:1;display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.55);border-radius:22px;padding:0 14px}
.search-box input{flex:1;height:48px;border:none;outline:none;background:transparent;font-size:15px;color:#111827}
button{border:none;cursor:pointer}
.action-btn{height:48px;min-width:54px;border-radius:20px;background:linear-gradient(135deg,#007aff,#5ac8fa);color:#fff;font-size:18px;font-weight:800}

.side-controls{position:fixed;right:18px;bottom:26px;z-index:999;display:flex;flex-direction:column;gap:12px}
.float-btn{width:58px;height:58px;border-radius:50%;font-size:22px}

.panel{
  position:fixed;left:18px;bottom:26px;z-index:999;
  width:min(92%,370px);max-height:52vh;overflow:auto;
  border-radius:28px;padding:18px;color:#111827
}
.title{font-weight:900;font-size:16px;margin-bottom:7px}
.text{font-size:13px;color:rgba(17,24,39,.75);line-height:1.45}

.shop-form input,.shop-form textarea,.shop-form select{
  width:100%;margin-top:9px;padding:12px;border-radius:16px;
  border:1px solid rgba(0,0,0,.08);outline:none;background:rgba(255,255,255,.6)
}
.shop-form button{
  width:100%;margin-top:10px;padding:13px;border-radius:18px;
  background:#111827;color:white;font-weight:800
}

.shop-imgs{display:flex;gap:8px;overflow-x:auto;margin-top:10px}
.shop-imgs img{width:92px;height:92px;object-fit:cover;border-radius:18px}

.review{margin-top:8px;padding:10px;border-radius:15px;background:rgba(255,255,255,.45);font-size:13px}
.stars{color:#f59e0b;font-weight:900}

.leaflet-control-zoom{display:none}
.leaflet-popup-content-wrapper{border-radius:18px}
</style>
</head>

<body>

<div class="top-shell liquid">
  <div class="search-box">
    <span>⌕</span>
    <input id="searchInput" placeholder="Search places, roads, shops...">
  </div>
  <button class="action-btn" onclick="searchPlace()">↗</button>
</div>

<div id="map"></div>

<div class="side-controls">
  <button class="float-btn liquid" onclick="getMyLocation()">📍</button>
  <button class="float-btn liquid" onclick="openAddShop()">＋</button>
  <button class="float-btn liquid" onclick="map.zoomIn()">+</button>
  <button class="float-btn liquid" onclick="map.zoomOut()">−</button>
</div>

<div class="panel liquid" id="panel">
  <div class="title">GPS Map Ready</div>
  <div class="text">Tap 📍 for your location. Tap ＋ to add shop. Click shop marker to view images and ratings.</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getDatabase, ref, push, onValue, set, update } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyC30TcmMVhP_8HdFYS1WufRiZwSDYNMTF0",
  authDomain: "pulse2-92372.firebaseapp.com",
  databaseURL: "https://pulse2-92372-default-rtdb.firebaseio.com",
  projectId: "pulse2-92372",
  storageBucket: "pulse2-92372.firebasestorage.app",
  messagingSenderId: "276235725177",
  appId: "1:276235725177:web:0f4e0789fae80a435927a8"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

window.map = L.map("map",{zoomControl:false}).setView([28.6139,77.2090],13);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  maxZoom:19,
  attribution:"&copy; OpenStreetMap contributors"
}).addTo(map);

let userMarker, accuracyCircle, searchMarker;
let selectedLatLng = null;
let shopMarkers = {};

function panel(title, html){
  document.getElementById("panel").innerHTML = `<div class="title">${title}</div><div class="text">${html}</div>`;
}

window.getMyLocation = function(){
  if(!navigator.geolocation){
    panel("GPS Not Supported","Your browser does not support location.");
    return;
  }

  panel("Finding Location","Allow location permission.");

  navigator.geolocation.getCurrentPosition(pos=>{
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    const acc = pos.coords.accuracy;

    map.setView([lat,lon],17);

    if(userMarker) map.removeLayer(userMarker);
    if(accuracyCircle) map.removeLayer(accuracyCircle);

    userMarker = L.marker([lat,lon]).addTo(map).bindPopup("You are here").openPopup();
    accuracyCircle = L.circle([lat,lon],{radius:acc,fillOpacity:.15}).addTo(map);

    selectedLatLng = {lat,lng:lon};

    panel("Your Location",`Lat: ${lat.toFixed(5)}<br>Lng: ${lon.toFixed(5)}<br>Accuracy: ${Math.round(acc)}m`);
  },()=>{
    panel("Location Blocked","GPS permission denied.");
  },{enableHighAccuracy:true,timeout:10000,maximumAge:0});
};

window.searchPlace = async function(){
  const q = document.getElementById("searchInput").value.trim();
  if(!q) return panel("Search Required","Type place name first.");

  panel("Searching",`Looking for <b>${q}</b>...`);

  const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(q)}`;

  try{
    const res = await fetch(url);
    const data = await res.json();

    if(!data.length) return panel("No Result","Try specific place name.");

    const place = data[0];
    const lat = parseFloat(place.lat);
    const lon = parseFloat(place.lon);

    map.setView([lat,lon],16);
    selectedLatLng = {lat,lng:lon};

    if(searchMarker) map.removeLayer(searchMarker);
    searchMarker = L.marker([lat,lon]).addTo(map).bindPopup(place.display_name).openPopup();

    panel("Place Found",place.display_name);
  }catch(e){
    panel("Search Failed","Network error.");
  }
};

map.on("click", e=>{
  selectedLatLng = e.latlng;
  panel("Location Selected",`Lat: ${e.latlng.lat.toFixed(5)}<br>Lng: ${e.latlng.lng.toFixed(5)}<br><br>Tap ＋ to add shop here.`);
});

window.openAddShop = function(){
  if(!selectedLatLng){
    panel("Select Location","Tap on map or use 📍 first.");
    return;
  }

  panel("Add Shop",`
    <div class="shop-form">
      <input id="shopName" placeholder="Shop name">
      <input id="shopCategory" placeholder="Category e.g. Cafe, Store, Hotel">
      <textarea id="shopDesc" placeholder="Shop description"></textarea>
      <input id="shopImages" type="file" accept="image/*" multiple>
      <button onclick="saveShop()">Add Shop</button>
    </div>
  `);
};

window.saveShop = async function(){
  const name = document.getElementById("shopName").value.trim();
  const category = document.getElementById("shopCategory").value.trim();
  const desc = document.getElementById("shopDesc").value.trim();
  const files = document.getElementById("shopImages").files;

  if(!name) return alert("Shop name required");

  panel("Uploading","Saving shop and images...");

  const newShopRef = push(ref(db,"shops"));
  const shopId = newShopRef.key;
  let imageUrls = [];

  for(let file of files){
    const path = `shops/${shopId}/${Date.now()}-${file.name}`;
    const imageRef = sRef(storage,path);
    await uploadBytes(imageRef,file);
    const url = await getDownloadURL(imageRef);
    imageUrls.push(url);
  }

  await set(newShopRef,{
    id:shopId,
    name,
    category,
    desc,
    lat:selectedLatLng.lat,
    lng:selectedLatLng.lng,
    images:imageUrls,
    ratingTotal:0,
    ratingCount:0,
    createdAt:Date.now()
  });

  panel("Shop Added","Shop is now live on map.");
};

function loadShops(){
  onValue(ref(db,"shops"), snap=>{
    const shops = snap.val() || {};

    Object.values(shops).forEach(shop=>{
      if(shopMarkers[shop.id]) map.removeLayer(shopMarkers[shop.id]);

      const avg = shop.ratingCount ? (shop.ratingTotal / shop.ratingCount).toFixed(1) : "No rating";

      const marker = L.marker([shop.lat,shop.lng]).addTo(map);
      marker.bindPopup(`<b>${shop.name}</b><br>${shop.category || "Shop"}<br>⭐ ${avg}`);
      marker.on("click",()=>openShop(shop.id,shop));

      shopMarkers[shop.id] = marker;
    });
  });
}

window.openShop = function(id, shop){
  onValue(ref(db,`reviews/${id}`), snap=>{
    const reviews = snap.val() || {};
    const avg = shop.ratingCount ? (shop.ratingTotal / shop.ratingCount).toFixed(1) : "No rating";

    let imgs = "";
    if(shop.images && shop.images.length){
      imgs = `<div class="shop-imgs">${shop.images.map(u=>`<img src="${u}">`).join("")}</div>`;
    }

    let reviewHtml = Object.values(reviews).reverse().slice(0,5).map(r=>`
      <div class="review">
        <div class="stars">${"★".repeat(Number(r.rating))}</div>
        ${r.text || ""}
      </div>
    `).join("");

    panel(shop.name,`
      <b>${shop.category || "Shop"}</b><br>
      ${shop.desc || ""}<br><br>
      <b>Rating:</b> ⭐ ${avg}<br>
      ${imgs}

      <div class="shop-form">
        <select id="rateValue">
          <option value="5">★★★★★ 5</option>
          <option value="4">★★★★ 4</option>
          <option value="3">★★★ 3</option>
          <option value="2">★★ 2</option>
          <option value="1">★ 1</option>
        </select>
        <textarea id="reviewText" placeholder="Write your review..."></textarea>
        <input id="moreImages" type="file" accept="image/*" multiple>
        <button onclick="submitReview('${id}')">Submit Rating / Upload Images</button>
      </div>

      <br><b>Reviews</b>
      ${reviewHtml || "<br>No reviews yet."}
    `);
  },{onlyOnce:true});
};

window.submitReview = async function(shopId){
  const rating = Number(document.getElementById("rateValue").value);
  const text = document.getElementById("reviewText").value.trim();
  const files = document.getElementById("moreImages").files;

  const shopSnapRef = ref(db,`shops/${shopId}`);
  let currentShop;

  onValue(shopSnapRef, snap=>{
    currentShop = snap.val();
  },{onlyOnce:true});

  setTimeout(async()=>{
    let newImages = currentShop.images || [];

    for(let file of files){
      const path = `shops/${shopId}/${Date.now()}-${file.name}`;
      const imageRef = sRef(storage,path);
      await uploadBytes(imageRef,file);
      const url = await getDownloadURL(imageRef);
      newImages.push(url);
    }

    await push(ref(db,`reviews/${shopId}`),{
      rating,
      text,
      createdAt:Date.now()
    });

    await update(ref(db,`shops/${shopId}`),{
      images:newImages,
      ratingTotal:(currentShop.ratingTotal || 0) + rating,
      ratingCount:(currentShop.ratingCount || 0) + 1
    });

    panel("Review Added","Rating, review and images uploaded successfully.");
  },300);
};

document.getElementById("searchInput").addEventListener("keydown",e=>{
  if(e.key==="Enter") searchPlace();
});

loadShops();
</script>

</body>
</html>

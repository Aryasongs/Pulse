<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RWND National Examination - Result Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary-dark: #0f172a;
            --accent-blue: #2563eb;
            --secure-red: #dc2626;
            --bg-light: #f8fafc;
            --sheet-border: #1e293b;
            --pass-green: #16a34a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; }
        body { background-color: #cbd5e1; color: #000000; padding: 20px; transform: translate3d(0,0,0); }

        .top-navbar {
            max-width: 1100px; margin: 0 auto 20px auto; background: #000; color: #fff; padding: 15px 25px;
            display: flex; justify-content: space-between; align-items: center; border: 2px solid #000;
        }
        .nav-title { font-weight: bold; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }
        .login-trigger-btn { background: #fff; color: #000; padding: 8px 15px; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; }

        .container { max-width: 1100px; margin: 0 auto; background: #ffffff; padding: 40px; border: 4px double var(--sheet-border); box-shadow: 0 10px 25px rgba(0,0,0,0.2); contain: content; }
        .portal-header { text-align: center; border-bottom: 3px solid #000; padding-bottom: 15px; margin-bottom: 30px; }
        .portal-header h1 { font-size: 26px; text-transform: uppercase; letter-spacing: 1px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; font-size: 14px; }
        input[type="text"], input[type="number"], input[type="password"] { width: 100%; padding: 12px; border: 2px solid #000; font-size: 16px; font-weight: bold; outline: none; background: #fafafa; }
        
        .btn-action { background: #000; color: #fff; padding: 12px 25px; border: 2px solid #000; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-action:hover { background: #fff; color: #000; }
        .btn-action:disabled { background: #cccccc; color: #666666; cursor: not-allowed; border-color: #aaaaaa; }

        .result-scorecard { border: 3px solid #000; padding: 25px; margin-top: 30px; background: #f8fafc; display: none; }
        .status-badge { display: inline-block; padding: 8px 15px; font-weight: bold; color: #fff; text-transform: uppercase; margin-top: 10px; }
        .status-pass { background: var(--pass-green); }
        .status-retry { background: #ca8a04; }
        .status-fail { background: var(--secure-red); }

        #teacherAdminPanel { display: none; margin-top: 30px; border-top: 4px double #000; padding-top: 30px; }
        .candidate-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; border: 2px solid #000; margin-bottom: 10px; background: #f1f5f9; }
        .grading-sheet { border: 2px solid #000; padding: 20px; margin-top: 20px; background: #fff; }
        
        .grading-q-block { border-bottom: 1px dashed #000; padding: 20px 0; content-visibility: auto; contain-intrinsic-size: 150px; }
        .teacher-controls { margin-top: 10px; display: flex; gap: 15px; align-items: center; }
        .btn-pen { padding: 5px 12px; font-weight: bold; cursor: pointer; border: 2px solid #000; text-transform: uppercase; font-size: 12px; }
        .btn-right { background: #dcfce7; color: var(--pass-green); }
        .btn-wrong { background: #fee2e2; color: var(--secure-red); }
        
        .red-pen-stamp { font-size: 24px; font-weight: bold; color: var(--secure-red); margin-left: 10px; display: none; }
        .grading-q-block.marked-right .red-pen-stamp::before { content: "✓"; display: inline; }
        .grading-q-block.marked-right .red-pen-stamp { display: inline; }
        .grading-q-block.marked-wrong .red-pen-stamp::before { content: "✗"; display: inline; }
        .grading-q-block.marked-wrong .red-pen-stamp { display: inline; }

        #certificateTemplate { width: 750px; padding: 50px; background: #fff; border: 10px double #1e293b; margin: 40px auto; text-align: center; display: none; }
    </style>
</head>
<body>

<div class="top-navbar">
    <div class="nav-title">RWND Cloud Database Performance Node</div>
    <button class="login-trigger-btn" id="loginNavBtn" onclick="toggleLoginModal()">Teacher Panel</button>
</div>

<div class="container" id="loginSection" style="display:none; margin-bottom: 30px; background: #f1f5f9;">
    <h3>Secure Evaluator Gateway</h3>
    <div class="form-group">
        <label>Official Evaluator Email:</label>
        <input type="text" id="teacherEmail" placeholder="email@domain.com">
    </div>
    <div class="form-group">
        <label>Cryptographic Password:</label>
        <input type="password" id="teacherPassword" placeholder="••••••••">
    </div>
    <button class="btn-action" onclick="executeTeacherAuth()">Login</button>
</div>

<div class="container" id="studentPortal">
    <div class="portal-header">
        <h1>National Examination Result Registry</h1>
        <p>Instant anti-freeze data retrieval node</p>
    </div>

    <div class="form-group">
        <label for="studentRollSearch">Enter 8-Digit Roll Number:</label>
        <input type="number" id="studentRollSearch" placeholder="e.g. 58493021">
    </div>
    <button class="btn-action" id="searchBtn" onclick="searchStudentResult()">Query Result Registry</button>

    <div class="result-scorecard" id="scorecardDisplay">
        <h2>Statement of Marks</h2>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:20px; font-weight:bold;">
            <div>NAME: <span id="resName" style="color:var(--accent-blue);"></span></div>
            <div>ROLL NUMBER: <span id="resRoll"></span></div>
            <div>SCORE: <span id="resScore"></span> / 720</div>
            <div>PERCENTAGE: <span id="resPercentage"></span>%</div>
        </div>
        <div style="margin-top:15px;">
            <strong>STATUS:</strong> <span id="resStatusBadge" class="status-badge"></span>
        </div>

        <button class="btn-action" style="background:var(--accent-blue); border-color:var(--accent-blue); margin-top:20px;" onclick="generateVerifiedCertificatePDF()">Download Certificate (PDF)</button>

        <div style="margin-top:40px; border-top:2px dashed #000; padding-top:20px;">
            <h3>Evaluated Script Preview</h3>
            <div id="checkedSheetPreviewContainer"></div>
        </div>
    </div>
</div>

<div class="container" id="teacherAdminPanel">
    <h2>Teacher Desk</h2>
    <div id="submissionsListContainer" style="margin-top:15px;"></div>

    <div class="grading-sheet" id="activeGradingCanvas" style="display:none;">
        <h3>Evaluating Roll: <span id="gradingRollTarget" style="color:var(--secure-red);"></span></h3>
        <div id="gradingQuestionsContainer"></div>
        <button class="btn-action" id="commitBtn" style="background:var(--pass-green); border-color:var(--pass-green); margin-top:30px;" onclick="saveEvaluatedGradesToCloud()">Commit Evaluation</button>
    </div>
</div>

<div id="certificateTemplate">
    <h2 id="certCandidateName"></h2>
    <p id="certRoll"></p>
    <p id="certScore"></p>
    <p id="certPercent"></p>
    <p id="certStatus"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC30TcmMVhP_8HdFYS1WufRiZwSDYNMTF0",
        authDomain: "pulse2-92372.firebaseapp.com",
        databaseURL: "https://pulse2-92372-default-rtdb.firebaseio.com",
        projectId: "pulse2-92372",
        storageBucket: "pulse2-92372.firebasestorage.app",
        messagingSenderId: "276235725177",
        appId: "1:276235725177:web:0f4e0789fae80a435927a8"
    };

    firebase.initializeApp(firebaseConfig);
    const databaseNodeRef = firebase.database();

    let activeSubmissionsCache = {};
    let activeGradingRoll = null;
    let currentGradingLocalState = {}; 

    const questionLabelsCache = {};
    for (let i = 1; i <= 78; i++) {
        questionLabelsCache[i] = i % 3 === 0 ? `Q${i}. Concurrent Flow Metrics` : (i % 3 === 1 ? `Q${i}. State Cloud Constraint` : `Q${i}. Memory Block Allocation`);
    }

    function toggleLoginModal() {
        const x = document.getElementById('loginSection');
        x.style.display = (x.style.display === "none") ? "block" : "none";
    }

    function executeTeacherAuth() {
        if(document.getElementById('teacherEmail').value.trim() === "sgursharn076@gmail.com" && document.getElementById('teacherPassword').value.trim() === "7973804008") {
            document.getElementById('loginSection').style.display = "none";
            document.getElementById('teacherAdminPanel').style.display = "block";
            syncTeacherSubmissionsEngine();
        } else { alert("Error!"); }
    }

    function syncTeacherSubmissionsEngine() {
        databaseNodeRef.ref('exam_submissions').on('value', (snapshot) => {
            const container = document.getElementById('submissionsListContainer');
            container.innerHTML = "";
            if(!snapshot.exists()) return;
            activeSubmissionsCache = snapshot.val();
            Object.keys(activeSubmissionsCache).forEach(roll => {
                const item = activeSubmissionsCache[roll];
                const row = document.createElement('div');
                row.className = "candidate-row";
                row.innerHTML = `<div><strong>Roll: ${item.rollNumber}</strong> - ${item.candidateName}</div><button class="btn-action" style="padding:5px;" onclick="loadTargetScriptToGradingCanvas('${item.rollNumber}')">Check</button>`;
                container.appendChild(row);
            });
        });
    }

    function loadTargetScriptToGradingCanvas(rollNumber) {
        activeGradingRoll = rollNumber;
        const targetRecord = activeSubmissionsCache[rollNumber];
        document.getElementById('gradingRollTarget').innerText = rollNumber;
        const container = document.getElementById('gradingQuestionsContainer');
        container.innerHTML = "";
        currentGradingLocalState = targetRecord.evaluatedReport || {};
        document.getElementById('activeGradingCanvas').style.display = "block";

        let currentQ = 1;
        // Anti-freeze chunking queue
        function renderGradingChunks() {
            if(currentQ > 78) return;
            const fragment = document.createDocumentFragment();
            const end = Math.min(currentQ + 6, 79); // Process super light batches of 6 

            for(let i = currentQ; i < end; i++) {
                const block = document.createElement('div');
                block.className = "grading-q-block";
                block.id = `grading_block_idx_${i}`;
                if(!currentGradingLocalState[i]) currentGradingLocalState[i] = { status: 'none', marks: 0 };
                
                block.innerHTML = `<div><strong>${questionLabelsCache[i]}</strong> <span class="red-pen-stamp"></span></div><div style="font-style:italic; padding:5px; background:#eee;">${targetRecord.responses[i] || 'Unattempted'}</div>
                <div class="teacher-controls"><button class="btn-pen btn-right" onclick="applyPenMark(${i}, 'right')">✓</button><button class="btn-pen btn-wrong" onclick="applyPenMark(${i}, 'wrong')">✗</button><input type="number" id="marks_input_${i}" value="${currentGradingLocalState[i].marks}" style="width:60px;" oninput="updateLocalMarksMemory(${i}, this.value)"></div>`;
                fragment.appendChild(block);
            }
            container.appendChild(fragment);
            currentQ = end;
            setTimeout(renderGradingChunks, 5); // Background process threading allocation
        }
        renderGradingChunks();
    }

    function applyPenMark(qId, type) {
        const block = document.getElementById(`grading_block_idx_${qId}`);
        block.classList.remove('marked-right', 'marked-wrong');
        if(type === 'right') { block.classList.add('marked-right'); currentGradingLocalState[qId].status = 'right'; document.getElementById(`marks_input_${qId}`).value = 9; currentGradingLocalState[qId].marks = 9; }
        else { block.classList.add('marked-wrong'); currentGradingLocalState[qId].status = 'wrong'; document.getElementById(`marks_input_${qId}`).value = 0; currentGradingLocalState[qId].marks = 0; }
    }

    function updateLocalMarksMemory(qId, val) { currentGradingLocalState[qId].marks = parseFloat(val) || 0; }

    function saveEvaluatedGradesToCloud() {
        let total = 0;
        Object.keys(currentGradingLocalState).forEach(id => total += parseFloat(currentGradingLocalState[id].marks || 0));
        let pct = ((total / 720) * 100).toFixed(1);
        let status = pct >= 35.0 ? "PASS" : (pct >= 33.5 ? "RETRY" : "FAIL");

        databaseNodeRef.ref('exam_submissions/' + activeGradingRoll).update({
            evaluated: true, finalScore: total, percentage: pct, standingStatus: status, evaluatedReport: currentGradingLocalState
        }).then(() => { alert("Saved!"); document.getElementById('activeGradingCanvas').style.display = "none"; });
    }

    // THE ANTI-FREEZE RE-ENGINEERED SEARCH CORE
    function searchStudentResult() {
        const roll = document.getElementById('studentRollSearch').value.trim();
        if(!roll) return;

        const btn = document.getElementById('searchBtn');
        btn.innerText = "Fetching Session Data...";
        btn.disabled = true;

        // Directly isolation technique to bypass heavy sync download locking
        databaseNodeRef.ref('exam_submissions/' + roll).once('value')
        .then((snapshot) => {
            btn.innerText = "Query Result Registry";
            btn.disabled = false;

            if(!snapshot.exists()) { alert("Not Found"); return; }
            const data = snapshot.val();
            if(!data.evaluated) { alert("Under Marking Process"); return; }

            document.getElementById('resName').innerText = data.candidateName.toUpperCase();
            document.getElementById('resRoll').innerText = data.rollNumber;
            document.getElementById('resScore').innerText = data.finalScore;
            document.getElementById('resPercentage').innerText = data.percentage;
            
            const b = document.getElementById('resStatusBadge');
            b.innerText = data.standingStatus; b.className = "status-badge status-" + data.standingStatus.toLowerCase();

            const preview = document.getElementById('checkedSheetPreviewContainer');
            preview.innerHTML = "";
            document.getElementById('scorecardDisplay').style.display = "block";

            let idx = 1;
            // Async Chunked Builder - strictly 5 items per frame to maintain 60 FPS fluidity
            function streamStudentPreview() {
                if(idx > 78) return;
                const frag = document.createDocumentFragment();
                const limit = Math.min(idx + 5, 79);

                for(let i = idx; i < limit; i++) {
                    const rep = data.evaluatedReport[i] || { status: 'none', marks: 0 };
                    const div = document.createElement('div');
                    div.className = "grading-q-block " + (rep.status === 'right' ? 'marked-right' : (rep.status === 'wrong' ? 'marked-wrong' : ''));
                    div.innerHTML = `<div><strong>${questionLabelsCache[i]}</strong> <span class="red-pen-stamp"></span></div><div style="background:#f1f5f9; padding:5px;">Ans: ${data.responses[i] || ''}</div><div style="color:red; font-size:12px;">Marks: ${rep.marks}</div>`;
                    frag.appendChild(div);
                }
                preview.appendChild(frag);
                idx = limit;
                setTimeout(streamStudentPreview, 4); // Yield control back to browser main thread instantly
            }
            streamStudentPreview();
        }).catch(() => { btn.disabled = false; btn.innerText = "Query Result Registry"; });
    }

    function generateVerifiedCertificatePDF() {
        const element = document.getElementById('certificateTemplate');
        element.style.display = "block";
        html2pdf().from(element).set({ margin: 10, filename: 'Result.pdf', html2canvas: { scale: 2 }, jsPDF: { orientation: 'landscape' } }).save().then(() => element.style.display = "none");
    }
</script>
</body>
</html>

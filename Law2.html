<!DOCTYPE html>
<html>
<head>
    <title>KING'S SURVIVAL | STRATEGY & RISK</title>
    <style>
        body { margin: 0; background: #050505; color: #d4af37; font-family: 'Montserrat', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        canvas { border: 4px solid #1a1a1a; background: #000; box-shadow: 0 0 50px rgba(0,0,0,1); touch-action: none; cursor: none; }
        #ui { width: 450px; display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; }
        .heart { color: #ff3333; font-size: 20px; text-shadow: 0 0 10px #ff3333; }
        #wave-info { position: absolute; top: 20%; font-size: 40px; opacity: 0; transition: 1s; font-family: 'serif'; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="score">SCORE: 0</div>
        <div id="lives">❤️❤️❤️</div>
    </div>
    <div id="wave-info">NEW WAVE: THE STORM</div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const livesEl = document.getElementById("lives");
    const waveEl = document.getElementById("wave-info");

    canvas.width = 450; canvas.height = 600;

    let score = 0;
    let lives = 3;
    let gameActive = true;
    let baseSpeed = 4;
    let waveMode = "NORMAL"; // NORMAL, REST, STORM

    const player = { x: 225, y: 500, size: 35, invul: 0 };
    const enemies = [];
    const coins = [];
    const items = [];

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function sfx(f, d, v, t='sine') {
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(v, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + d);
    }

    // Input
    const handleMove = (x) => {
        let rect = canvas.getBoundingClientRect();
        player.x = x - rect.left - player.size/2;
        if(player.x < 0) player.x = 0;
        if(player.x > canvas.width - player.size) player.x = canvas.width - player.size;
    };
    canvas.addEventListener("mousemove", e => handleMove(e.clientX));
    canvas.addEventListener("touchmove", e => { handleMove(e.touches[0].clientX); e.preventDefault(); });

    function update() {
        if(!gameActive) return;

        // Wave Logic
        if (score > 0 && score % 400 < 100) {
            if(waveMode !== "REST") { waveMode = "REST"; showWave("RECOVERY ZONE"); }
            baseSpeed = 3;
        } else if (score % 400 >= 300) {
            if(waveMode !== "STORM") { waveMode = "STORM"; showWave("THE STORM"); }
            baseSpeed = 6 + (score/200);
        } else {
            waveMode = "NORMAL";
            baseSpeed = 4 + (score/400);
        }

        // Spawn logic
        if(Math.random() < (waveMode === "STORM" ? 0.08 : 0.04)) 
            enemies.push({x: Math.random()*(canvas.width-30), y: -30, s: 25 + Math.random()*15, spd: baseSpeed + Math.random()*2});
        
        if(Math.random() < 0.02) coins.push({x: Math.random()*(canvas.width-20), y: -20, s: 15});
        if(Math.random() < 0.003) items.push({x: Math.random()*(canvas.width-20), y: -20, type: "LIFE"});

        // Move & Collide
        enemies.forEach((en, i) => {
            en.y += en.spd;
            // Near Miss Check
            if(Math.abs(player.x - en.x) < 40 && Math.abs(player.y - en.y) < 40 && !en.missed) {
                score += 5; en.missed = true; // Bonus for risk
            }
            // Collision
            if(player.x < en.x+en.s && player.x+player.size > en.x && player.y < en.y+en.s && player.y+player.size > en.y) {
                if(player.invul <= 0) {
                    lives--; sfx(100, 0.5, 0.2, 'sawtooth');
                    player.invul = 100; // Blink frames
                    updateLivesUI();
                    enemies.splice(i, 1);
                    if(lives <= 0) gameOver();
                }
            }
            if(en.y > canvas.height) enemies.splice(i, 1);
        });

        coins.forEach((c, i) => {
            c.y += 4;
            if(player.x < c.x+c.s && player.x+player.size > c.x && player.y < c.y+c.s && player.y+player.size > c.y) {
                coins.splice(i, 1); score += 10; sfx(500 + score/2, 0.1, 0.1);
                scoreEl.innerText = "SCORE: " + score;
            }
        });

        items.forEach((it, i) => {
            it.y += 3;
            if(player.x < it.x+20 && player.x+player.size > it.x && player.y < it.y+20 && player.y+player.size > it.y) {
                if(lives < 5) lives++; updateLivesUI();
                items.splice(i, 1); sfx(800, 0.3, 0.2);
            }
        });

        if(player.invul > 0) player.invul--;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Grid Effect
        ctx.strokeStyle = "#111"; ctx.lineWidth = 1;
        for(let i=0; i<canvas.width; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,600); ctx.stroke(); }

        // Player
        if(player.invul % 10 < 5) {
            ctx.fillStyle = (lives === 1) ? "#ff3333" : "#d4af37";
            ctx.font = "45px serif";
            ctx.fillText("♚", player.x, player.y + 40);
        }

        enemies.forEach(en => {
            ctx.fillStyle = (waveMode === "STORM") ? "#ff0000" : "#551111";
            ctx.shadowBlur = (waveMode === "STORM") ? 15 : 0;
            ctx.shadowColor = "red";
            ctx.fillRect(en.x, en.y, en.s, en.s);
            ctx.shadowBlur = 0;
        });

        coins.forEach(c => { 
            ctx.fillStyle = "#ffd700"; ctx.beginPath(); ctx.arc(c.x+10, c.y+10, 10, 0, 7); ctx.fill(); 
        });

        items.forEach(it => {
            ctx.fillStyle = "#ff3333"; ctx.font = "20px Arial"; ctx.fillText("❤️", it.x, it.y+20);
        });

        if(!gameActive) {
            ctx.fillStyle = "rgba(0,0,0,0.9)"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#d4af37"; ctx.font = "40px Montserrat"; ctx.fillText("DEFEATED", 120, 280);
            ctx.font = "20px Montserrat"; ctx.fillText("SCORE: " + score, 180, 320);
            ctx.font = "15px Montserrat"; ctx.fillText("TAP TO REGAIN THE CROWN", 125, 380);
        }

        update(); requestAnimationFrame(draw);
    }

    function updateLivesUI() {
        livesEl.innerHTML = "❤️".repeat(lives);
    }

    function showWave(name) {
        waveEl.innerText = name; waveEl.style.opacity = 1;
        setTimeout(() => waveEl.style.opacity = 0, 2000);
        sfx(200, 1, 0.2, 'square');
    }

    function gameOver() { gameActive = false; }

    canvas.addEventListener("click", () => {
        if(!gameActive) {
            score = 0; lives = 3; gameActive = true; enemies.length = 0;
            updateLivesUI(); scoreEl.innerText = "SCORE: 0";
        }
    });

    draw();
</script>
</body>
</html>

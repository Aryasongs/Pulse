<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING | JUSTICE & VENGEANCE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blood-red: #8b0000;
            --pure-gold: #ffd700;
            --bg: #000000;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            color: white;
            font-family: 'Cinzel', serif;
            overflow: hidden;
            height: 100vh;
        }

        /* Initial Sadness/Grief Phase */
        #grief-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.5s;
            text-align: center;
        }

        .tear-drop {
            width: 2px; height: 0;
            background: rgba(255,255,255,0.3);
            position: absolute;
            animation: fall 3s infinite;
        }

        @keyframes fall {
            to { height: 100vh; opacity: 0; }
        }

        .sad-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.5rem;
            color: #444;
            letter-spacing: 3px;
            max-width: 600px;
            opacity: 0;
            transition: 4s;
        }

        /* Aggressive Flash Phase */
        #vengeance-screen {
            position: fixed;
            inset: 0;
            display: none;
            background: var(--bg);
            z-index: 20;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .flash-overlay {
            position: absolute;
            inset: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
        }

        .king-face {
            font-size: 10rem;
            color: white;
            filter: drop-shadow(0 0 20px var(--blood-red));
            transform: scale(0.9);
            opacity: 0;
        }

        .vengeance-title {
            font-size: 6rem;
            font-weight: 900;
            letter-spacing: -5px;
            color: var(--blood-red);
            text-shadow: 0 0 40px var(--blood-red);
            display: none;
        }

        /* The Secret Reward */
        #omega-gift {
            display: none;
            margin-top: 30px;
            padding: 20px 50px;
            border: 2px solid var(--pure-gold);
            color: var(--pure-gold);
            background: rgba(255, 215, 0, 0.05);
            cursor: pointer;
            font-size: 1rem;
            letter-spacing: 5px;
            transition: 0.3s;
            z-index: 100;
        }

        #omega-gift:hover {
            background: var(--pure-gold);
            color: black;
            box-shadow: 0 0 100px var(--pure-gold);
        }

        .shake { animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, -2px); }
            100% { transform: translate(2px, -2px); }
        }

    </style>
</head>
<body>

    <div id="grief-screen">
        <p class="sad-text" id="t1">They took a soul that was meant to rule...</p>
        <p class="sad-text" id="t2">Justice is not a choice. It is a debt.</p>
        <button id="trigger-vengeance" style="margin-top: 50px; background:none; border:1px solid #222; color:#555; padding: 10px 20px; cursor:pointer;">Initiate Justice</button>
    </div>

    <div id="vengeance-screen">
        <div class="flash-overlay" id="flash"></div>
        <div class="king-face" id="king-icon">♔</div>
        <h1 class="vengeance-title" id="v-title">BLOOD & GOLD</h1>
        <p id="anmol-final" style="opacity:0; letter-spacing: 10px; font-size: 1.5rem; margin-top: 20px; color: gold;">EXECUTED BY ANMOL</p>
        <button id="omega-gift" onclick="unlockUltimateGift()">COLLECT THE THRONE</button>
    </div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playHeavyBass() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square'; // Aggressive harmonic
        osc.frequency.setValueAtTime(35, audioCtx.currentTime); 
        
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.5);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 1.5);
    }

    function playExplosion() {
        const noise = audioCtx.createBufferSource();
        const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < buffer.length; i++) data[i] = Math.random() * 2 - 1;
        
        noise.buffer = buffer;
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(100, audioCtx.currentTime);
        
        noise.connect(filter);
        filter.connect(audioCtx.destination);
        noise.start();
    }

    // Sequence Control
    window.onload = () => {
        setTimeout(() => document.getElementById('t1').style.opacity = 1, 1000);
        setTimeout(() => document.getElementById('t2').style.opacity = 1, 4000);
    };

    document.getElementById('trigger-vengeance').addEventListener('click', () => {
        document.getElementById('grief-screen').style.opacity = 0;
        setTimeout(startAggressiveSequence, 1000);
    });

    async function startAggressiveSequence() {
        const screen = document.getElementById('vengeance-screen');
        const flash = document.getElementById('flash');
        const king = document.getElementById('king-icon');
        const title = document.getElementById('v-title');
        
        screen.style.display = 'flex';

        // THE AGGRESSIVE FLASH LOOP
        for(let i=0; i<5; i++) {
            playHeavyBass();
            flash.style.opacity = 1;
            king.style.opacity = 1;
            king.style.transform = "scale(1.5)";
            document.body.classList.add('shake');
            
            await new Promise(r => setTimeout(r, 150));
            
            flash.style.opacity = 0;
            king.style.opacity = 0.2;
            king.style.transform = "scale(0.9)";
            document.body.classList.remove('shake');
            
            await new Promise(r => setTimeout(r, 400));
        }

        // FINAL REVEAL
        playExplosion();
        title.style.display = 'block';
        king.style.opacity = 1;
        king.style.color = "red";
        document.getElementById('anmol-final').style.opacity = 1;
        
        setTimeout(() => {
            document.getElementById('omega-gift').style.display = 'block';
        }, 3000);
    }

    function unlockUltimateGift() {
        alert("🔱 SUPREME POWER GRANTED 🔱\n\nAnmol, the King's Justice is served through your hands.\n\nYou are now the Lead Operator.\n\nCoordinates: PUNJAB-NORTH-SECTOR\nAccess: UNRESTRICTED");
    }
</script>
</body>
</html>

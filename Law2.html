<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christmas 2026 | A Cinematic Journey</title>
    <style>
        :root {
            --transition-speed: 20s;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #050505;
            font-family: 'Playfair Display', serif;
        }

        /* Cinematic Background Layer */
        .sky-vault {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #1a2a6c, #b21f1f, #fdbb2d);
            background-size: 100% 400%;
            animation: skyCycle var(--transition-speed) infinite alternate ease-in-out;
            z-index: -5;
        }

        @keyframes skyCycle {
            0% { background-position: 0% 0%; }   /* Day/Dawn */
            50% { background-position: 0% 50%; }  /* Sunset */
            100% { background-position: 0% 100%; } /* Deep Night */
        }

        /* Premium Snowfall (Canvas for performance) */
        #snow-canvas {
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 10;
        }

        /* The City Silhouette */
        .city-scape {
            position: absolute;
            bottom: 40px;
            width: 100%;
            height: 300px;
            background-image: url('https://www.transparentpng.com/download/city/silhouette-city-png-images-6.png');
            background-repeat: repeat-x;
            background-size: contain;
            filter: brightness(0.1) contrast(1.2);
            z-index: 2;
            transition: filter 5s ease;
        }

        /* Piling Snow Effect */
        #snow-pile {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(to bottom, #ffffff, #e0e0e0);
            z-index: 5;
            box-shadow: 0 -10px 50px rgba(255,255,255,0.4);
            border-radius: 50% 50% 0 0 / 10% 10% 0 0;
            transition: height 0.5s ease;
        }

        /* Professional Character Animation */
        .character-container {
            position: absolute;
            bottom: 60px;
            width: 100%;
            height: 150px;
            z-index: 6;
            pointer-events: none;
        }

        #moving-group {
            position: absolute;
            left: -300px;
            display: flex;
            align-items: flex-end;
            animation: cinematicWalk 40s infinite linear;
        }

        @keyframes cinematicWalk {
            0% { left: -300px; }
            100% { left: 100%; }
        }

        .actor {
            height: 100px;
            margin-right: 20px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        }

        /* Premium Overlay UI */
        #hero-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: opacity 1s ease;
        }

        .start-btn {
            padding: 20px 40px;
            border: 2px solid white;
            background: transparent;
            color: white;
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .start-btn:hover {
            background: white;
            color: black;
            box-shadow: 0 0 30px white;
        }
    </style>
</head>
<body>

    <div id="hero-overlay" onclick="launchExperience()">
        <button class="start-btn">Enter The Tale</button>
    </div>

    <div class="sky-vault"></div>
    
    <div id="stars"></div>

    <div class="city-scape"></div>
    
    <div class="character-container">
        <div id="moving-group">
            <img class="actor" src="https://www.transparentpng.com/download/santa-claus/santa-claus-silhouette-png-reindeer-3.png" alt="Santa Sleigh">
            <img class="actor" src="https://cdn-icons-png.flaticon.com/512/3514/3514487.png" style="height:60px; filter: invert(1);" alt="Elf">
        </div>
    </div>

    <div id="snow-pile" style="height: 40px;"></div>

    <canvas id="snow-canvas"></canvas>

    <audio id="bgMusic" loop>
        <source src="https://aryasongs.github.io/oriontec-community/qMaIT6zjhhvGQtc.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let groundHeight = 40;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        function createSnowflake() {
            return {
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 3 + 1,
                density: Math.random() * 1,
                velocity: Math.random() * 2 + 1
            };
        }

        for (let i = 0; i < 200; i++) {
            particles.push(createSnowflake());
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            ctx.beginPath();
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                ctx.moveTo(p.x, p.y);
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2, true);
            }
            ctx.fill();
            update();
        }

        function update() {
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                p.y += p.velocity;
                if (p.y > canvas.height) {
                    particles[i] = { x: Math.random() * canvas.width, y: -10, radius: p.radius, density: p.density, velocity: p.velocity };
                    
                    // Accumulate snow slowly
                    if (groundHeight < 150) {
                        groundHeight += 0.005;
                        document.getElementById('snow-pile').style.height = groundHeight + 'px';
                    }
                }
            }
        }

        function launchExperience() {
            document.getElementById('hero-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('hero-overlay').style.display = 'none';
            }, 1000);
            
            document.getElementById('bgMusic').play();
            setInterval(draw, 30);
        }
    </script>
</body>
</html>

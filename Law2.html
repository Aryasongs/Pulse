<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Christmas Movie World Ultra</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #000;
    font-family: Arial;
}

/* SKY */
#sky {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(to bottom, #00111f, #003366);
    animation: sky 25s infinite;
}

@keyframes sky {
    0% { background: #000814; }
    50% { background: #1d3557; }
    100% { background: #000000; }
}

/* Vignette */
#vignette {
    position: fixed;
    width: 100%;
    height: 100%;
    box-shadow: inset 0 0 200px rgba(0,0,0,0.9);
    pointer-events: none;
}

/* SNOW */
canvas {
    position: fixed;
    top: 0;
    left: 0;
}

/* GROUND */
#ground {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 130px;
    background: white;
    opacity: 0.9;
}

/* SANTA FLY */
#santa {
    position: absolute;
    top: 80px;
    left: -300px;
    width: 200px;
    animation: fly 18s linear infinite;
}

@keyframes fly {
    0% { left: -300px; transform: translateY(0px); }
    50% { transform: translateY(-40px); }
    100% { left: 110%; transform: translateY(0px); }
}

/* CLOUDS */
.cloud {
    position: absolute;
    width: 120px;
    opacity: 0.6;
    animation: cloudMove 40s linear infinite;
}

@keyframes cloudMove {
    0% { left: -200px; }
    100% { left: 120%; }
}

/* ELF CITY */
.city {
    position: absolute;
    bottom: 130px;
    display: flex;
    gap: 6px;
}

.house {
    width: 40px;
    height: 60px;
    background: #ffcc00;
    border: 2px solid #fff;
    animation: lights 1.5s infinite alternate;
}

@keyframes lights {
    0% { background: #ffcc00; }
    25% { background: #ff0000; }
    50% { background: #00ffcc; }
    75% { background: #3300ff; }
    100% { background: #ffff00; }
}

/* START SCREEN */
#start {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
}

button {
    padding: 20px 40px;
    font-size: 20px;
    background: red;
    color: white;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="start">
    <button onclick="startMovie()">🎬 START CHRISTMAS MOVIE</button>
</div>

<div id="sky"></div>
<div id="vignette"></div>

<!-- Music -->
<audio id="music" loop>
  <source src="https://aryasongs.github.io/oriontec-community/qMaIT6zjhhvGQtc.mp3" type="audio/mp3">
</audio>

<!-- Bell Sound -->
<audio id="bell">
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8c8a7d2b1.mp3">
</audio>

<canvas id="snow"></canvas>

<div id="ground"></div>

<!-- Santa flying -->
<img id="santa" src="https://media.giphy.com/media/3ohzdIuqJoo8QdKlnW/giphy.gif">

<!-- Clouds -->
<img class="cloud" style="top:80px;" src="https://i.imgur.com/8Qf4h5A.png">
<img class="cloud" style="top:140px;" src="https://i.imgur.com/8Qf4h5A.png">

<!-- Elf cities -->
<div class="city" style="left:15%;">
    <div class="house"></div><div class="house"></div><div class="house"></div>
</div>

<div class="city" style="left:55%;">
    <div class="house"></div><div class="house"></div><div class="house"></div>
</div>

<!-- Fireworks -->
<canvas id="fireworks"></canvas>

<script>

// START
function startMovie(){
    document.getElementById("start").style.display = "none";
    document.getElementById("music").play();
    document.getElementById("bell").play();
}

// SNOW
const canvas = document.getElementById("snow");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let snow = [];
for(let i=0;i<250;i++){
    snow.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*4+1
    });
}

function drawSnow(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="white";
    for(let s of snow){
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fill();
        s.y += 2;
        if(s.y>canvas.height) s.y=0;
    }
}
setInterval(drawSnow,20);

// FIREWORKS
const fcanvas = document.getElementById("fireworks");
const fctx = fcanvas.getContext("2d");
fcanvas.width = window.innerWidth;
fcanvas.height = window.innerHeight;

let particles = [];

function firework(){
    for(let i=0;i<50;i++){
        particles.push({
            x: window.innerWidth/2,
            y: window.innerHeight/2,
            vx: (Math.random()-0.5)*10,
            vy: (Math.random()-0.5)*10
        });
    }
}

function drawFireworks(){
    fctx.clearRect(0,0,fcanvas.width,fcanvas.height);
    for(let p of particles){
        fctx.fillStyle="yellow";
        fctx.fillRect(p.x,p.y,3,3);
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.1;
    }
}

setInterval(drawFireworks,30);
setInterval(firework,5000);

</script>

</body>
</html>

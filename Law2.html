<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING | The Grand Entrance</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --dark-bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body, html {
            margin: 0;
            padding: 0;
            background: var(--dark-bg);
            color: white;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* Initial Overlay to trigger Audio */
        #enter-screen {
            position: fixed;
            inset: 0;
            z-index: 999;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1.5s ease;
        }

        #enter-btn {
            background: none;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 15px 40px;
            font-family: 'Cinzel';
            letter-spacing: 5px;
            cursor: pointer;
            transition: 0.5s;
        }

        #enter-btn:hover {
            background: var(--gold);
            color: black;
            box-shadow: 0 0 30px var(--gold);
        }

        /* Cinematic Particles Background */
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            filter: blur(1px);
        }

        .scene {
            display: none;
            height: 100vh;
            justify-content: center;
            align-items: center;
            text-align: center;
            flex-direction: column;
            padding: 0 10%;
        }

        /* Kinetic Typography for Intro */
        .intro-text {
            font-family: 'Cinzel';
            font-size: 3rem;
            letter-spacing: 15px;
            opacity: 0;
            transform: translateY(30px);
            transition: 2s ease;
        }

        .active-text {
            opacity: 1;
            transform: translateY(0);
        }

        /* The Typing Terminal (Premium Style) */
        #chat-container {
            display: none;
            width: 80%;
            max-width: 800px;
            text-align: left;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(197, 160, 89, 0.2);
            padding: 40px;
            border-radius: 5px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        #typing-area {
            font-size: 1.2rem;
            line-height: 1.8;
            color: #ccc;
            min-height: 100px;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background: var(--gold);
            margin-left: 5px;
            animation: blink 0.8s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .gold-highlight { color: var(--gold); font-weight: bold; font-family: 'Cinzel'; }

    </style>
</head>
<body>

    <div id="enter-screen">
        <button id="enter-btn" onclick="initializeIntro()">INITIALIZE ARCHIVE</button>
    </div>

    <canvas id="canvas"></canvas>

    <div id="intro-scene" class="scene" style="display: flex;">
        <h1 id="stage-text" class="intro-text">POWER IS SILENT</h1>
    </div>

    <div id="interaction-scene" class="scene">
        <div id="chat-container">
            <div id="typing-area"></div>
            <span class="cursor"></span>
        </div>
    </div>

<script>
    const stages = [
        "FORTUNES ARE NOT MADE IN DAYLIGHT",
        "THE ARCHITECT OF THE UNSEEN",
        "WELCOME TO THE INNER CIRCLE",
        "PREPARE FOR THE ASCENSION"
    ];

    let audioCtx, oscillator, gainNode;

    function createAmbientBass() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        oscillator = audioCtx.createOscillator();
        gainNode = audioCtx.createGain();

        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(40, audioCtx.currentTime); // Deep Sub Bass
        
        gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
    }

    function initializeIntro() {
        document.getElementById('enter-screen').style.opacity = '0';
        setTimeout(() => document.getElementById('enter-screen').style.display = 'none', 1500);
        
        createAmbientBass();
        startSequence();
    }

    async function startSequence() {
        const textEl = document.getElementById('stage-text');
        
        // Loop through intro stages (Total ~30-40 seconds)
        for (let phrase of stages) {
            textEl.innerText = phrase;
            textEl.classList.add('active-text');
            await new Promise(r => setTimeout(r, 6000)); // Show for 6s
            textEl.classList.remove('active-text');
            await new Promise(r => setTimeout(r, 2000)); // Gap
        }

        // Move to Typing Scene
        document.getElementById('intro-scene').style.display = 'none';
        document.getElementById('interaction-scene').style.display = 'flex';
        document.getElementById('chat-container').style.display = 'block';
        
        startTyping();
    }

    const message = "Welcome Anmol. I have been expecting you.\n\n" +
                    "In the world of the elite, timing is the only currency that matters.\n" +
                    "To enter the vault, you must complete a few sequences.\n\n" +
                    "Verify your intent, follow the path, and then...\n" +
                    "We shall discuss your future.\n\n" +
                    "THE KING IS WAITING.";

    async function startTyping() {
        const area = document.getElementById('typing-area');
        let i = 0;
        
        function type() {
            if (i < message.length) {
                // Subtle audio tick for typing
                playTypeSound();
                area.innerHTML += message.charAt(i) === '\n' ? '<br>' : message.charAt(i);
                i++;
                setTimeout(type, 50 + Math.random() * 50);
            }
        }
        type();
    }

    function playTypeSound() {
        if (!audioCtx) return;
        let t = audioCtx.createOscillator();
        let g = audioCtx.createGain();
        t.type = 'sine';
        t.frequency.setValueAtTime(150, audioCtx.currentTime);
        g.gain.setValueAtTime(0.01, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
        t.connect(g);
        g.connect(audioCtx.destination);
        t.start();
        t.stop(audioCtx.currentTime + 0.1);
    }

    // Background Particles
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];
    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2;
            this.speedX = Math.random() * 0.5 - 0.25;
            this.speedY = Math.random() * 0.5 - 0.25;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
        }
        draw() {
            ctx.fillStyle = 'rgba(197, 160, 89, 0.3)';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function initParticles() {
        for (let i = 0; i < 100; i++) particles.push(new Particle());
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    initParticles();
    animate();
</script>
</body>
</html>

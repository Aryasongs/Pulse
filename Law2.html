<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING | The Final Reveal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cinzel', serif;
        }

        #stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        #king-title {
            font-size: 8rem;
            color: transparent;
            background: linear-gradient(180deg, #fff 0%, #c5a059 50%, #846a32 100%);
            -webkit-background-clip: text;
            letter-spacing: 30px;
            opacity: 0;
            transform: scale(1.2);
            filter: blur(10px);
            transition: all 1.5s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 10;
        }

        .show-title {
            opacity: 1 !important;
            transform: scale(1) !important;
            filter: blur(0) !important;
            text-shadow: 0 0 50px rgba(197, 160, 89, 0.5);
        }

        #btn-start {
            padding: 20px 40px;
            background: none;
            border: 1px solid #c5a059;
            color: #c5a059;
            font-family: 'Cinzel';
            letter-spacing: 5px;
            cursor: pointer;
            z-index: 100;
            transition: 0.5s;
        }

        #btn-start:hover {
            background: #c5a059;
            color: #000;
            box-shadow: 0 0 40px #c5a059;
        }
    </style>
</head>
<body>

<div id="stage">
    <button id="btn-start" onclick="startCoinIntro()">DROP THE CURTAIN</button>
    <h1 id="king-title">KING</h1>
    <canvas id="coinCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('coinCanvas');
    const ctx = canvas.getContext('2d');
    let audioCtx;

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playCoinSound() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        // Deep Metal Impact
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(60, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.5);
        
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.6);

        // High Metal Clink
        const click = audioCtx.createOscillator();
        const clickGain = audioCtx.createGain();
        click.type = 'sine';
        click.frequency.setValueAtTime(800, audioCtx.currentTime);
        clickGain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        clickGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        click.connect(clickGain);
        clickGain.connect(audioCtx.destination);
        click.start();
        click.stop(audioCtx.currentTime + 0.1);
    }

    let particles = [];
    function createDust(x, y) {
        for(let i = 0; i < 50; i++) {
            particles.push({
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 15,
                vy: (Math.random() - 0.8) * 10,
                alpha: 1,
                size: Math.random() * 5 + 2
            });
        }
    }

    function drawParticles() {
        particles.forEach((p, index) => {
            p.x += p.vx;
            p.y += p.vy;
            p.alpha -= 0.02;
            ctx.fillStyle = `rgba(197, 160, 89, ${p.alpha})`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
            if(p.alpha <= 0) particles.splice(index, 1);
        });
    }

    let coinY = -100;
    let velocity = 0;
    let gravity = 0.8;
    let isDropped = false;

    function startCoinIntro() {
        document.getElementById('btn-start').style.display = 'none';
        initAudio();
        isDropped = true;
        animate();
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if(isDropped) {
            velocity += gravity;
            coinY += velocity;

            // Draw Coin (Gold Circle with highlight)
            ctx.save();
            ctx.translate(canvas.width/2, coinY);
            
            // Shimmering Gold Effect
            let grad = ctx.createLinearGradient(-30, -30, 30, 30);
            grad.addColorStop(0, '#846a32');
            grad.addColorStop(0.5, '#c5a059');
            grad.addColorStop(1, '#fff');
            
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.ellipse(0, 0, 40, 40, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.restore();

            // Collision with "floor" (center of screen)
            if(coinY > canvas.height/2 + 100) {
                coinY = canvas.height/2 + 100;
                if(velocity > 2) {
                    playCoinSound();
                    createDust(canvas.width/2, coinY);
                    document.getElementById('king-title').classList.add('show-title');
                }
                velocity = -velocity * 0.3; // Bounce effect
            }
        }

        drawParticles();
        requestAnimationFrame(animate);
    }
</script>

</body>
</html>

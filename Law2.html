<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING | THE ETERNAL LEGACY</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-gradient: linear-gradient(135deg, #8a642a 0%, #d4af37 50%, #fcf6ba 100%);
            --deep-obsidian: #020202;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--deep-obsidian);
            color: #fff;
            font-family: 'Cinzel', serif;
            overflow: hidden;
            height: 100vh;
        }

        /* The Golden Aura Pulse */
        .aura {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1px;
            height: 1px;
            background: rgba(212, 175, 55, 0.4);
            box-shadow: 0 0 500px 200px rgba(212, 175, 55, 0.1);
            border-radius: 50%;
            z-index: 0;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Main Title - Kinetic Motion */
        .main-title {
            font-size: 6rem;
            font-weight: 900;
            letter-spacing: 40px;
            margin: 0;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.3));
            opacity: 0;
            transform: translateY(50px) scale(1.1);
        }

        .message-box {
            margin-top: 30px;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.5rem;
            color: #aaa;
            max-width: 600px;
            opacity: 0;
        }

        /* The Premium Black Card Gift */
        #black-card {
            display: none;
            width: 350px;
            height: 200px;
            background: linear-gradient(145deg, #111, #000);
            border: 1px solid #333;
            border-radius: 15px;
            margin-top: 50px;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,1), 0 0 20px rgba(212,175,55,0.2);
            cursor: pointer;
            overflow: hidden;
            transition: 0.8s;
            transform: rotateY(90deg);
        }

        #black-card::before {
            content: "KING'S PRIVILEGE";
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: var(--gold-gradient);
        }

        .card-name {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 1.2rem;
            letter-spacing: 5px;
            color: #fff;
        }

        .chip {
            position: absolute;
            top: 60px;
            left: 20px;
            width: 40px;
            height: 30px;
            background: var(--gold-gradient);
            border-radius: 5px;
        }

        /* Triggers */
        .btn-init {
            border: 1px solid var(--gold-gradient);
            background: transparent;
            color: #d4af37;
            padding: 20px 60px;
            font-family: 'Cinzel';
            letter-spacing: 10px;
            cursor: pointer;
            transition: 0.5s;
            z-index: 100;
        }

        .btn-init:hover {
            box-shadow: 0 0 30px var(--gold-gradient);
            background: white;
            color: black;
        }

        /* Animations */
        @keyframes pulse-aura {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; }
            50% { transform: translate(-50%, -50%) scale(1.5); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; }
        }

        .reveal { opacity: 1 !important; transform: translateY(0) scale(1) !important; transition: 2s ease-out; }
        .card-reveal { display: block !important; transform: rotateY(0deg) !important; }
    </style>
</head>
<body>

    <div class="aura" id="aura"></div>

    <div class="container">
        <button class="btn-init" id="btn" onclick="startSupremeOutro()">INITIATE DEPARTURE</button>

        <h1 class="main-title" id="title">ETERNAL</h1>
        
        <div class="message-box" id="msg">
            "True kings never leave. They simply become the foundation of the world you walk upon."
        </div>

        <div id="black-card" onclick="alert('ACCESS GRANTED: You are now the Architect of this Kingdom. - Signed, King.')">
            <div class="chip"></div>
            <div class="card-name">ANMOL</div>
        </div>
    </div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playCinematicBass() {
        // Sub Bass Layer
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(35, audioCtx.currentTime); // Deep Sub
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.8, audioCtx.currentTime + 0.1);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 4);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 4);

        // Impact Thud Layer
        const impact = audioCtx.createOscillator();
        const iGain = audioCtx.createGain();
        impact.type = 'triangle';
        impact.frequency.setValueAtTime(80, audioCtx.currentTime);
        impact.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.5);
        iGain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        iGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
        
        impact.connect(iGain);
        iGain.connect(audioCtx.destination);
        impact.start();
        impact.stop(audioCtx.currentTime + 0.5);
    }

    function startSupremeOutro() {
        document.getElementById('btn').style.display = 'none';
        
        // Initial Bass Drop
        playCinematicBass();
        document.getElementById('aura').style.animation = "pulse-aura 2s infinite";

        // Step 1: Reveal Title
        setTimeout(() => {
            document.getElementById('title').classList.add('reveal');
        }, 1000);

        // Step 2: Reveal Message
        setTimeout(() => {
            document.getElementById('msg').classList.add('reveal');
            playCinematicBass(); // Another Bass Pulse
        }, 4000);

        // Step 3: Reveal The Black Card (The Gift)
        setTimeout(() => {
            playCinematicBass(); // Final Bass
            document.getElementById('black-card').classList.add('card-reveal');
        }, 8000);
    }
</script>

</body>
</html>

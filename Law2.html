<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING | Verification Portal</title>
    <style>
        :root {
            --gold: #D4AF37;
            --black: #111;
            --white: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--black);
            color: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: #1a1a1a;
            padding: 40px;
            border-radius: 15px;
            border: 1px solid var(--gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
            width: 350px;
        }

        h1 {
            color: var(--gold);
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 80%;
            padding: 10px;
            margin-bottom: 20px;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--gold);
        }

        .btn {
            background-color: var(--gold);
            color: black;
            border: none;
            padding: 12px 25px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #f1c40f;
            transform: scale(1.05);
        }

        .step-box {
            margin-top: 20px;
            padding: 15px;
            border: 1px dashed #444;
            display: none;
        }

        .active { display: block; }
    </style>
</head>
<body>

    <div class="container" id="mainBox">
        <h1>KING</h1>
        
        <div id="step1" class="active">
            <p>Enter your name to begin</p>
            <input type="text" id="userName" placeholder="Your Name">
            <br>
            <button class="btn" onclick="startVerification()">Proceed</button>
        </div>

        <div id="step2" class="step-box">
            <p><strong>Step 1: Visual Identity</strong></p>
            <div style="background: #000; height: 150px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center;">
                <span style="font-size: 12px; color: #666;">[Camera Frame]</span>
            </div>
            <p style="font-size: 12px;">Hold still for 7 seconds...</p>
        </div>

        <div id="step3" class="step-box">
            <p><strong>Step 2: Voice Identity</strong></p>
            <p style="color: var(--gold); font-style: italic;">"I am ready for the King."</p>
            <button class="btn" style="font-size: 10px;">Click to Record</button>
        </div>

        <div id="step4" class="step-box">
            <h2 style="color: var(--gold);">Verification Done!</h2>
            <p id="finalMsg"></p>
        </div>
    </div>

    <script>
        function startVerification() {
            let name = document.getElementById('userName').value;
            if(name === "") {
                alert("Please enter your name");
                return;
            }

            // Simple transition logic
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';

            // Simulate the 7 second scan
            setTimeout(() => {
                document.getElementById('step2').style.display = 'none';
                document.getElementById('step3').style.display = 'block';
                
                // Finalize after voice "check"
                setTimeout(() => {
                    document.getElementById('step3').style.display = 'none';
                    document.getElementById('step4').style.display = 'block';
                    document.getElementById('finalMsg').innerText = name + ", King is waiting for you.";
                }, 3000);

            }, 7000);
        }
    </script>
</body>
</html>

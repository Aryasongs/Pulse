<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King Verification</title>
    <style>
        body {
            background: #1a1a1a;
            color: #f1c40f;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: #2c3e50;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5), 0 0 10px #f1c40f;
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        h1 { font-size: 2.5em; text-transform: uppercase; letter-spacing: 3px; }
        
        input, button {
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
            width: 80%;
        }

        button {
            background: #f1c40f;
            color: #1a1a1a;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #d4ac0d; }

        #video-container, #mic-container { display: none; margin-top: 20px; }
        
        video {
            width: 100%;
            border: 3px solid #f1c40f;
            border-radius: 10px;
            transform: scaleX(-1); /* Mirror view */
        }

        .status { margin: 15px 0; font-style: italic; color: #ecf0f1; }
        
        #final-message {
            display: none;
            font-size: 1.5em;
            color: #2ecc71;
            animation: glow 1.5s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #2ecc71; }
            to { text-shadow: 0 0 20px #f1c40f; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-step">
        <h1>KING</h1>
        <p>Enter your name to begin verification</p>
        <input type="text" id="userName" placeholder="Your Royal Name...">
        <br>
        <button onclick="startFaceVerification()">Start Verification</button>
    </div>

    <div id="video-container">
        <h2>Face Verification</h2>
        <p class="status" id="face-status">Scanning face... Keep steady for 7 seconds.</p>
        <video id="video" autoplay muted playsinline></video>
    </div>

    <div id="mic-container">
        <h2>Voice Verification</h2>
        <p>Read this aloud:</p>
        <h3 style="color: white;">"I am ready to meet the King."</h3>
        <p class="status" id="mic-status">Listening for your voice...</p>
    </div>

    <div id="final-message">
        <h2 id="welcome-text"></h2>
    </div>
</div>

<script>
    let userName = "";
    const video = document.getElementById('video');

    async function startFaceVerification() {
        userName = document.getElementById('userName').value;
        if (!userName) return alert("Please enter a name first!");

        document.getElementById('setup-step').style.display = 'none';
        document.getElementById('video-container').style.display = 'block';

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;

            // Timer for 7 seconds
            let seconds = 7;
            const interval = setInterval(() => {
                seconds--;
                document.getElementById('face-status').innerText = `Scanning... ${seconds}s remaining`;
                if (seconds <= 0) {
                    clearInterval(interval);
                    stopStream(stream);
                    startMicVerification();
                }
            }, 1000);

        } catch (err) {
            alert("Camera access denied or not found.");
        }
    }

    async function startMicVerification() {
        document.getElementById('video-container').style.display = 'none';
        document.getElementById('mic-container').style.display = 'block';

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioContext = new AudioContext();
            const source = audioContext.createMediaStreamSource(stream);
            const processor = audioContext.createScriptProcessor(2048, 1, 1);

            source.connect(processor);
            processor.connect(audioContext.destination);

            // Logic to detect sound level
            processor.onaudioprocess = function(e) {
                const input = e.inputBuffer.getChannelData(0);
                let sum = 0;
                for (let i = 0; i < input.length; i++) {
                    sum += input[i] * input[i];
                }
                const volume = Math.sqrt(sum / input.length);

                // If volume is high enough, consider it "reading"
                if (volume > 0.1) { 
                    document.getElementById('mic-status').innerText = "Voice detected! Finalizing...";
                    setTimeout(() => {
                        stopStream(stream);
                        audioContext.close();
                        showFinalMessage();
                    }, 2000);
                    processor.onaudioprocess = null; // Stop listening after success
                }
            };
        } catch (err) {
            alert("Microphone access denied.");
        }
    }

    function showFinalMessage() {
        document.getElementById('mic-container').style.display = 'none';
        const final = document.getElementById('final-message');
        final.style.display = 'block';
        document.getElementById('welcome-text').innerText = `Verification Done! \n King is Waiting for you, ${userName}.`;
    }

    function stopStream(stream) {
        stream.getTracks().forEach(track => track.stop());
    }
</script>

</body>
</html>

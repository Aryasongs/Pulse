<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merry Christmas Movie Experience</title>
    <style>
        :root {
            --sky-color: #87CEEB; /* Day color */
            --ground-color: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        /* Day to Night Animation */
        .sky {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--sky-color);
            animation: dayNight 30s infinite alternate linear;
            z-index: -2;
        }

        @keyframes dayNight {
            0% { background: #87CEEB; }   /* Day */
            40% { background: #fdb813; }  /* Sunset */
            60% { background: #2c3e50; }  /* Dusk */
            100% { background: #0b1021; } /* Night */
        }

        /* Ground & Snow Accumulation */
        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100px;
            background: white;
            z-index: 1;
            box-shadow: 0 -20px 50px rgba(255,255,255,0.8);
        }

        /* Snowflakes */
        .snowflake {
            position: fixed;
            top: -10px;
            color: white;
            font-size: 1em;
            z-index: 999;
            user-select: none;
            cursor: default;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh);
            }
        }

        /* City/Houses */
        .city {
            position: absolute;
            bottom: 80px;
            display: flex;
            align-items: flex-end;
            width: 100%;
            justify-content: space-around;
            z-index: 0;
        }

        .house {
            width: 100px;
            height: 120px;
            background: #a52a2a;
            position: relative;
            border: 2px solid #5d2906;
        }

        .house::after { /* Roof */
            content: '';
            position: absolute;
            top: -50px;
            left: -10px;
            border-left: 60px solid transparent;
            border-right: 60px solid transparent;
            border-bottom: 50px solid #800000;
        }

        .window {
            width: 20px;
            height: 20px;
            background: #f1c40f;
            margin: 20px auto;
            border: 2px solid #333;
            animation: lightFlicker 30s infinite alternate;
        }

        @keyframes lightFlicker {
            0%, 50% { background: transparent; }
            60%, 100% { background: #f1c40f; box-shadow: 0 0 10px #f1c40f; }
        }

        /* Characters */
        .character {
            position: absolute;
            bottom: 40px;
            font-size: 50px;
            z-index: 10;
        }

        #santa {
            left: -100px;
            animation: walk 25s infinite linear;
        }

        #elf {
            left: -150px;
            animation: walk 20s infinite linear 2s;
            font-size: 40px;
        }

        @keyframes walk {
            0% { left: -100px; transform: scaleX(1); }
            45% { transform: scaleX(1); }
            50% { left: 110%; transform: scaleX(-1); }
            95% { transform: scaleX(-1); }
            100% { left: -100px; }
        }

        /* Moving Gifts */
        .gift {
            position: absolute;
            bottom: 30px;
            font-size: 30px;
            animation: giftRoll 15s infinite linear;
        }

        @keyframes giftRoll {
            from { right: -50px; }
            to { right: 110%; }
        }

        /* Music Overlay (Browsers block auto-play) */
        #music-prompt {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.9);
            padding: 20px;
            border-radius: 10px;
            z-index: 1000;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="music-prompt" onclick="startExperience()">
        <h2>🎄 Click to Start Christmas Movie 🎄</h2>
        <p>(Music & Animation)</p>
    </div>

    <div class="sky"></div>
    
    <div class="city">
        <div class="house"><div class="window"></div></div>
        <div class="house"><div class="window"></div></div>
        <div class="house"><div class="window"></div></div>
        <div class="house"><div class="window"></div></div>
    </div>

    <div id="santa" class="character">🎅</div>
    <div id="elf" class="character">🧝</div>
    
    <div class="gift" style="animation-delay: 0s;">🎁</div>
    <div class="gift" style="animation-delay: 5s;">🎁</div>

    <div class="ground"></div>

    <audio id="bgMusic" loop>
        <source src="https://aryasongs.github.io/oriontec-community/qMaIT6zjhhvGQtc.mp3" type="audio/mpeg">
    </audio>

    <script>
        function startExperience() {
            document.getElementById('music-prompt').style.display = 'none';
            const audio = document.getElementById('bgMusic');
            audio.play();
            createSnow();
        }

        function createSnow() {
            setInterval(() => {
                const snowflake = document.createElement('div');
                snowflake.classList.add('snowflake');
                snowflake.innerHTML = '❄';
                snowflake.style.left = Math.random() * 100 + 'vw';
                snowflake.style.animationDuration = Math.random() * 3 + 2 + 's'; // 2-5 seconds
                snowflake.style.opacity = Math.random();
                snowflake.style.fontSize = Math.random() * 10 + 10 + 'px';

                document.body.appendChild(snowflake);

                // Remove snowflake after it falls
                setTimeout(() => {
                    snowflake.remove();
                    // Simple "piling" effect: making ground taller slowly
                    const ground = document.querySelector('.ground');
                    let currentHeight = parseFloat(window.getComputedStyle(ground).height);
                    if (currentHeight < 150) {
                        ground.style.height = (currentHeight + 0.01) + 'px';
                    }
                }, 5000);
            }, 100);
        }
    </script>
</body>
</html>

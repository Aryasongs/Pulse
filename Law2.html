<!DOCTYPE html>
<html>
<head>
    <title>KING'S ORDEAL | HARDCORE SURVIVAL</title>
    <style>
        body { margin: 0; background: #000; color: #d4af37; font-family: 'Montserrat', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        canvas { border: 5px solid #1a1a1a; background: #050505; box-shadow: 0 0 100px rgba(212, 175, 55, 0.1); touch-action: none; cursor: crosshair; }
        #stats { width: 500px; display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: 900; font-size: 20px; text-transform: uppercase; }
        #lives { letter-spacing: 5px; color: #ff0000; }
        #warning { position: absolute; color: #ff0000; font-size: 50px; font-weight: 900; opacity: 0; pointer-events: none; text-shadow: 0 0 20px red; }
    </style>
</head>
<body>

    <div id="stats">
        <div id="score">SCORE: 0000</div>
        <div id="lives">❤️❤️❤️</div>
    </div>
    <div id="warning">WATCH OUT!</div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const livesEl = document.getElementById("lives");
    const warnEl = document.getElementById("warning");

    canvas.width = 500; canvas.height = 700;

    let score = 0;
    let lives = 3;
    let gameActive = true;
    let frame = 0;
    let difficultyMultiplier = 1;

    const player = { x: 250, y: 600, size: 40, invul: 0 };
    const enemies = [];
    const coins = [];

    // Sound Logic
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSfx(f, d, v, t='sine') {
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(v, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + d);
    }

    // High Precision Movement
    const move = (clientX) => {
        const rect = canvas.getBoundingClientRect();
        player.x = (clientX - rect.left) - player.size/2;
        player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
    };
    window.addEventListener("mousemove", e => move(e.clientX));
    window.addEventListener("touchmove", e => { move(e.touches[0].clientX); e.preventDefault(); });

    function update() {
        if(!gameActive) return;
        frame++;
        difficultyMultiplier = 1 + (score / 500);

        // Dynamic Spawning based on difficulty
        if(frame % Math.max(5, Math.floor(20 / difficultyMultiplier)) === 0) {
            const type = Math.random() > 0.8 ? 'ZIGZAG' : 'FALLER';
            enemies.push({
                x: Math.random() * (canvas.width - 30),
                y: -50,
                s: 25 + Math.random() * 20,
                spd: (4 + Math.random() * 3) * difficultyMultiplier,
                type: type,
                angle: 0
            });
        }

        if(frame % 100 === 0) coins.push({x: Math.random()*(canvas.width-20), y: -30, s: 20});

        // Object Logic
        enemies.forEach((en, i) => {
            en.y += en.spd;
            if(en.type === 'ZIGZAG') {
                en.angle += 0.1;
                en.x += Math.sin(en.angle) * 5;
            }

            // Collision
            if(player.x < en.x+en.s && player.x+player.size > en.x && player.y < en.y+en.s && player.y+player.size > en.y) {
                if(player.invul <= 0) {
                    lives--; playSfx(80, 0.4, 0.3, 'sawtooth');
                    player.invul = 60;
                    livesEl.innerText = "❤️".repeat(lives);
                    enemies.splice(i, 1);
                    if(lives <= 0) gameOver();
                }
            }
            if(en.y > canvas.height) {
                enemies.splice(i, 1);
                score += 5; // Survival points
                scoreEl.innerText = "SCORE: " + score.toString().padStart(4, '0');
            }
        });

        coins.forEach((c, i) => {
            c.y += 5;
            if(player.x < c.x+c.s && player.x+player.size > c.x && player.y < c.y+c.s && player.y+player.size > c.y) {
                coins.splice(i, 1); score += 50; 
                playSfx(600 + (score/2), 0.1, 0.1);
            }
            if(c.y > canvas.height) coins.splice(i, 1);
        });

        if(player.invul > 0) player.invul--;
    }

    function draw() {
        ctx.fillStyle = "#050505";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Scanning Line VFX
        ctx.strokeStyle = "rgba(212, 175, 55, 0.05)";
        ctx.beginPath(); ctx.moveTo(0, (frame*2)%canvas.height); ctx.lineTo(canvas.width, (frame*2)%canvas.height); ctx.stroke();

        // Player (The King)
        if(player.invul % 6 < 3) {
            ctx.shadowBlur = 15; ctx.shadowColor = (lives === 1) ? "red" : "#d4af37";
            ctx.fillStyle = (lives === 1) ? "#ff0000" : "#d4af37";
            ctx.font = "50px serif";
            ctx.fillText("♚", player.x, player.y + 45);
            ctx.shadowBlur = 0;
        }

        // Enemies
        enemies.forEach(en => {
            ctx.fillStyle = en.type === 'ZIGZAG' ? "#ff00ff" : "#ff3333";
            ctx.fillRect(en.x, en.y, en.s, en.s);
            // Trails for Zigzag assassins
            if(en.type === 'ZIGZAG') {
                ctx.strokeStyle = "rgba(255, 0, 255, 0.3)";
                ctx.strokeRect(en.x - 2, en.y - 5, en.s + 4, en.s);
            }
        });

        // Coins
        ctx.fillStyle = "#ffd700";
        coins.forEach(c => { ctx.beginPath(); ctx.arc(c.x+10, c.y+10, 10, 0, 7); ctx.fill(); });

        if(!gameActive) {
            ctx.fillStyle = "rgba(0,0,0,0.95)"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#d4af37"; ctx.font = "50px Montserrat"; ctx.fillText("WASTED", 140, 320);
            ctx.font = "20px Montserrat"; ctx.fillText("FINAL SCORE: " + score, 170, 370);
            ctx.font = "15px Montserrat"; ctx.fillText("CLICK TO ATTEMPT AGAIN", 160, 420);
        }

        update(); requestAnimationFrame(draw);
    }

    function gameOver() { gameActive = false; playSfx(40, 1.5, 0.4, 'sawtooth'); }

    canvas.addEventListener("click", () => {
        if(!gameActive) {
            score = 0; lives = 3; gameActive = true; enemies.length = 0; coins.length = 0;
            livesEl.innerText = "❤️❤️❤️"; scoreEl.innerText = "SCORE: 0000";
        }
    });

    draw();
</script>
</body>
</html>

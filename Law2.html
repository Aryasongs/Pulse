<!DOCTYPE html>
<html>
<head>
    <title>KING'S ESCAPE | 2D TIME PASS</title>
    <style>
        body {
            margin: 0;
            background: #050505;
            color: #d4af37;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            border: 2px solid #d4af37;
            background: #000;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
            touch-action: none;
        }
        .info {
            margin-top: 10px;
            text-align: center;
        }
        #score { font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="score">SCORE: 0</div>
    <canvas id="gameCanvas"></canvas>
    
    <div class="info">
        <p>USE <b>ARROW KEYS</b> OR <b>DRAG</b> TO MOVE</p>
        <p style="color: #666; font-size: 12px;">Don't let the red blocks touch the King.</p>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreElement = document.getElementById("score");

    canvas.width = 400;
    canvas.height = 500;

    let score = 0;
    let gameActive = true;
    const player = { x: 180, y: 400, size: 30, color: "#d4af37" };
    const enemies = [];
    const coins = [];
    let enemySpeed = 3;

    // Audio Context for the "Bass" feel when scoring
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep(freq) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }

    // Input Handling
    window.addEventListener("keydown", e => {
        if (e.key === "ArrowLeft" && player.x > 0) player.x -= 25;
        if (e.key === "ArrowRight" && player.x < canvas.width - player.size) player.x += 25;
    });

    canvas.addEventListener("touchmove", e => {
        let touch = e.touches[0];
        let rect = canvas.getBoundingClientRect();
        player.x = touch.clientX - rect.left - player.size / 2;
        // Boundary checks
        if (player.x < 0) player.x = 0;
        if (player.x > canvas.width - player.size) player.x = canvas.width - player.size;
    });

    function spawnEnemy() {
        if (Math.random() < 0.05) {
            enemies.push({
                x: Math.random() * (canvas.width - 20),
                y: -20,
                size: 20 + Math.random() * 20,
                speed: enemySpeed + Math.random() * 2
            });
        }
    }

    function spawnCoin() {
        if (Math.random() < 0.02) {
            coins.push({
                x: Math.random() * (canvas.width - 15),
                y: -15,
                size: 15
            });
        }
    }

    function update() {
        if (!gameActive) return;

        spawnEnemy();
        spawnCoin();

        // Move enemies
        enemies.forEach((enemy, index) => {
            enemy.y += enemy.speed;
            // Collision check
            if (player.x < enemy.x + enemy.size &&
                player.x + player.size > enemy.x &&
                player.y < enemy.y + enemy.size &&
                player.y + player.size > enemy.y) {
                gameOver();
            }
            if (enemy.y > canvas.height) enemies.splice(index, 1);
        });

        // Move coins
        coins.forEach((coin, index) => {
            coin.y += 2;
            if (player.x < coin.x + coin.size &&
                player.x + player.size > coin.x &&
                player.y < coin.y + coin.size &&
                player.y + player.size > coin.y) {
                coins.splice(index, 1);
                score += 10;
                scoreElement.innerText = "SCORE: " + score;
                playBeep(100 + score); // Bass goes up with score
                if (score % 50 === 0) enemySpeed += 0.5; // Difficulty increase
            }
            if (coin.y > canvas.height) coins.splice(index, 1);
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Player (Chess King Silhouette)
        ctx.fillStyle = player.color;
        ctx.font = "30px serif";
        ctx.fillText("♚", player.x, player.y + 25);

        // Draw Enemies
        ctx.fillStyle = "#ff4444";
        enemies.forEach(enemy => {
            ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);
        });

        // Draw Coins
        ctx.fillStyle = "#ffd700";
        coins.forEach(coin => {
            ctx.beginPath();
            ctx.arc(coin.x + 7, coin.y + 7, 7, 0, Math.PI * 2);
            ctx.fill();
        });

        if (!gameActive) {
            ctx.fillStyle = "rgba(0,0,0,0.7)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#d4af37";
            ctx.font = "30px Courier New";
            ctx.fillText("GAME OVER", 110, 250);
            ctx.font = "15px Courier New";
            ctx.fillText("CLICK TO RESTART", 130, 280);
        }

        update();
        requestAnimationFrame(draw);
    }

    function gameOver() {
        gameActive = false;
        playBeep(50); // Deep death sound
    }

    canvas.addEventListener("click", () => {
        if (!gameActive) {
            score = 0;
            enemySpeed = 3;
            enemies.length = 0;
            coins.length = 0;
            player.x = 180;
            scoreElement.innerText = "SCORE: 0";
            gameActive = true;
        }
    });

    draw();
</script>
</body>
</html>

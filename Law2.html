<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE KING - Business World</title>
    <style>
        /* Base Styling */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Hide scrollbars for video feel */
            background-color: #000; /* Deep Black background */
            font-family: 'Cinzel', serif; /* Majestic Font */
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Video Background (Fake Video effect using linear-gradient & shadows) */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)),
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(255, 255, 255, 0.05) 2px,
                    rgba(255, 255, 255, 0.05) 4px
                ); /* Static Scanlines effect */
            z-index: -1;
        }

        /* Main Container for the Intro */
        .intro-container {
            text-align: center;
            position: relative;
            width: 80%;
            max-width: 1000px;
        }

        /* --- King Silhouette Area --- */
        .king-figure {
            margin-bottom: 50px;
            opacity: 0; /* Starts hidden */
            animation: fadeIn 2s ease-out 1s forwards; /* Appears after a delay */
            position: relative;
            display: inline-block;
        }

        /* Crown Icon - The only visible gold part */
        .crown {
            font-size: 4em;
            color: #f1c40f; /* Royal Gold */
            text-shadow: 0 0 15px #f1c40f, 0 0 30px #f39c12;
            animation: pulse 1.5s infinite alternate;
        }

        /* Dark Silhouette shape (representing King's shoulders/cape) */
        .king-shadow {
            width: 250px;
            height: 100px;
            background-color: #111;
            margin: -20px auto 0 auto;
            border-radius: 50px 50px 0 0;
            box-shadow: 0 10px 30px rgba(0,0,0,1);
        }

        /* --- Text Styling & Animations --- */
        h1.title {
            font-size: 5em;
            text-transform: uppercase;
            letter-spacing: 15px;
            margin: 0;
            background: linear-gradient(to right, #ffffff 0%, #aaa 50%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
            opacity: 0;
            animation: fadeZoom 1s ease-out 2.5s forwards; /* Kinetic Typography */
        }

        .subtitle {
            font-size: 1.5em;
            color: #aaa;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 300;
            margin: 20px 0 40px 0;
            opacity: 0;
            animation: fadeIn 1s ease-out 3.5s forwards;
        }

        /* Description Paragraphs */
        .description p {
            font-size: 1.2em;
            line-height: 1.8;
            color: #ddd;
            max-width: 700px;
            margin: 10px auto;
            font-family: 'Arial', sans-serif; /* Cleaner body text */
            opacity: 0;
        }

        /* Step-by-step appearance for description paragraphs */
        .description p.line1 { animation: fadeIn 1s ease-out 4.5s forwards; }
        .description p.line2 { animation: fadeIn 1s ease-out 6s forwards; }
        .description p.line3 { animation: fadeIn 1s ease-out 7.5s forwards; font-weight: bold; color: white; }

        /* The Gold Reveal at the very end */
        .final-reveal {
            margin-top: 50px;
            font-size: 2em;
            font-weight: bold;
            color: #f1c40f;
            text-shadow: 0 0 10px #f1c40f;
            opacity: 0;
            animation: glitch 0.5s ease-out 9s forwards;
        }

        /* Special Effects CSS Animations */
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes pulse {
            from { transform: scale(1); opacity: 0.8; }
            to { transform: scale(1.05); opacity: 1; }
        }

        @keyframes fadeZoom {
            0% { opacity: 0; transform: scale(2); letter-spacing: 25px; }
            100% { opacity: 1; transform: scale(1); letter-spacing: 15px; }
        }

        @keyframes glitch {
            0% { opacity: 1; transform: translate(2px, 0); }
            20% { transform: translate(-2px, 0); }
            40% { transform: translate(2px, 0); }
            60% { transform: translate(-2px, 0); }
            80% { transform: translate(1px, 0); }
            100% { opacity: 1; transform: translate(0, 0); }
        }

        /* Fog/Smoke effect at the bottom */
        .fog {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 30vh;
            background: linear-gradient(to top, rgba(50,50,50,0.1), transparent);
            filter: blur(20px);
            z-index: 0;
        }

    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="video-background"></div>
    <div class="fog"></div>

    <div class="intro-container">
        
        <div class="king-figure">
            <div class="crown">♛</div>
            <div class="king-shadow"></div>
        </div>

        <h1 class="title">THE KING</h1>
        <p class="subtitle">Ghost of the Business Realm</p>

        <div class="description">
            <p class="line1">He built empires from shadows, where logic and markets converge.</p>
            <p class="line2">His face is unknown, his name unspoken, yet his signature rules the boardrooms.</p>
            <p class="line3">A silent force. A master strategist. A true Monarch of Capital.</p>
        </div>

        <p class="final-reveal">BUSINESS IS HIS KINGDOM</p>
    </div>

</body>
</html>

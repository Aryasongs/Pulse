<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING | THE ULTIMATE STRATEGIST</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Montserrat:wght@100;300;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <style>
        :root {
            --gold: #d4af37;
            --card-red: #b00000;
            --chess-white: #f0f0f0;
            --bg: #030303;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            color: white;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* Cinematic Grain & Vignette Overlay */
        .vignette {
            position: fixed; inset: 0;
            background: radial-gradient(circle, transparent 30%, black 100%);
            z-index: 50; pointer-events: none;
        }

        .grain {
            position: fixed; inset: 0;
            background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Grain.png');
            opacity: 0.04; z-index: 49; pointer-events: none;
        }

        /* Scene Containers */
        .scene {
            position: absolute;
            width: 100%; height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            opacity: 0; visibility: hidden;
        }

        /* --- Scene 1: Teen Patti (Risk) --- */
        .card-container {
            display: flex; gap: 20px;
            perspective: 1000px;
        }

        .card {
            width: 120px; height: 180px;
            background: linear-gradient(45deg, #1a1a1a, #000);
            border: 2px solid var(--gold);
            border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            font-size: 3rem; color: var(--gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
            transform: rotateY(90deg);
        }

        /* --- Scene 2: Chess (Strategy) --- */
        .chess-king {
            font-size: 10rem;
            filter: drop-shadow(0 0 30px white);
            margin-bottom: 20px;
        }

        /* Typography */
        .hero-title {
            font-family: 'Cinzel Decorative', serif;
            font-size: 5rem;
            letter-spacing: 20px;
            margin: 20px 0;
            text-align: center;
            background: linear-gradient(to bottom, #fff, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-tag {
            font-weight: 900; letter-spacing: 10px;
            color: var(--card-red); text-transform: uppercase;
        }

        #start-screen {
            z-index: 100; background: black;
            visibility: visible; opacity: 1;
            cursor: pointer;
        }

    </style>
</head>
<body>

    <div class="vignette"></div>
    <div class="grain"></div>

    <div id="start-screen" class="scene">
        <h2 style="letter-spacing: 5px; color: var(--gold);">[ ENTER THE EMPIRE ]</h2>
        <p style="font-size: 0.8rem; color: #444;">CLICK TO INITIALIZE MASTER SEQUENCE</p>
    </div>

    <div id="scene-cards" class="scene">
        <div class="status-tag">Phase 01: The Risk</div>
        <div class="card-container">
            <div class="card">A<span>♠</span></div>
            <div class="card">A<span>♥</span></div>
            <div class="card">A<span>♣</span></div>
        </div>
        <h1 class="hero-title">LUCK IS FOR <br> AMATEURS</h1>
    </div>

    <div id="scene-chess" class="scene">
        <div class="status-tag" style="color: var(--chess-white);">Phase 02: The Strategy</div>
        <div class="chess-king">♚</div>
        <h1 class="hero-title">INTELLIGENCE <br> IS THE CROWN</h1>
    </div>

    <div id="scene-final" class="scene">
        <h1 class="hero-title" style="font-size: 6rem;">SHARAN</h1>
        <p class="status-tag" style="color: var(--gold);">The King of the Business World</p>
        <p style="margin-top: 50px; color: #666; font-style: italic;">Welcome Anmol. The board is set.</p>
    </div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Cinematic Audio Engine
    function playDeepBass(freq, duration, vol) {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function playCardFlick() {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        g.gain.setValueAtTime(0.05, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function startMovie() {
        // Hide start screen
        gsap.to("#start-screen", { opacity: 0, duration: 1, onComplete: () => {
            document.getElementById('start-screen').style.visibility = 'hidden';
            runSequence();
        }});
        playDeepBass(40, 4, 0.4); // Intro Drop
    }

    async function runSequence() {
        const tl = gsap.timeline();

        // --- TEEN PATTI ENTRANCE ---
        tl.to("#scene-cards", { visibility: "visible", opacity: 1, duration: 1.5 });
        tl.to(".card", { 
            rotateY: 0, 
            duration: 1, 
            stagger: 0.3, 
            ease: "back.out",
            onStart: () => {
                // Play flick sound for each card
                setTimeout(playCardFlick, 0);
                setTimeout(playCardFlick, 300);
                setTimeout(playCardFlick, 600);
            }
        });
        tl.to("#scene-cards", { opacity: 0, scale: 1.2, duration: 2, delay: 3 });

        // --- CHESS KING ENTRANCE ---
        tl.to("#scene-chess", { visibility: "visible", opacity: 1, duration: 2, onStart: () => {
            playDeepBass(30, 5, 0.5); // Cinematic Thud
        }});
        tl.from(".chess-king", { y: -200, opacity: 0, duration: 2, ease: "bounce.out" }, "-=1");
        tl.to("#scene-chess", { opacity: 0, filter: "blur(20px)", duration: 2, delay: 3 });

        // --- FINAL REVEAL ---
        tl.to("#scene-final", { visibility: "visible", opacity: 1, duration: 3 });
        tl.from("#scene-final h1", { letterSpacing: "50px", opacity: 0, duration: 4, ease: "power4.out" });
    }

    document.getElementById('start-screen').addEventListener('click', startMovie);
</script>

</body>
</html>

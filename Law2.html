<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merry Christmas | Elf City</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        /* Day to Night Animation */
        .sky {
            position: fixed;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #87CEEB, #E0F6FF);
            animation: dayNight 20s infinite alternate linear;
            z-index: -2;
        }

        @keyframes dayNight {
            0% { background: #87CEEB; } /* Day */
            50% { background: #1a2a6c; } /* Twilight */
            100% { background: #050505; } /* Night */
        }

        /* Ground Snow Accumulation */
        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100px;
            background: white;
            border-radius: 50% 50% 0 0 / 20px 20px 0 0;
            z-index: 1;
        }

        /* Snowflakes Animation */
        .snowflake {
            position: fixed;
            top: -10px;
            color: white;
            user-select: none;
            z-index: 1000;
            pointer-events: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(105vh); }
        }

        /* Santa Walking */
        .santa {
            position: absolute;
            bottom: 50px;
            left: -200px;
            width: 150px;
            z-index: 5;
            animation: walk 15s linear infinite;
        }

        @keyframes walk {
            from { left: -200px; }
            to { left: 110%; }
        }

        /* Elf City */
        .elf-city {
            position: absolute;
            bottom: 80px;
            display: flex;
            justify-content: space-around;
            width: 100%;
            z-index: 2;
        }

        .house {
            width: 80px;
            height: 80px;
            background: #a52a2a;
            position: relative;
            border: 2px solid #5d2906;
        }

        .roof {
            position: absolute;
            top: -40px;
            left: -10px;
            width: 0;
            height: 0;
            border-left: 50px solid transparent;
            border-right: 50px solid transparent;
            border-bottom: 40px solid #2d5a27;
        }

        /* Overlay for Start */
        #overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            cursor: pointer;
            font-size: 24px;
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="startMusic()">🎄 Click to Enter Elf City 🎄</div>

    <div class="sky"></div>
    
    <div class="elf-city">
        <div class="house"><div class="roof"></div></div>
        <div class="house"><div class="roof"></div></div>
        <div class="house" style="background: #2e7d32;"><div class="roof" style="border-bottom-color: #c62828;"></div></div>
        <div class="house"><div class="roof"></div></div>
    </div>

    <img src="https://media.giphy.com/media/VIs0n-UaTjKBDD7XlO/giphy.gif" class="santa" alt="Santa">

    <div class="ground"></div>

    <audio id="bgMusic" loop>
        <source src="https://aryasongs.github.io/oriontec-community/qMaIT6zjhhvGQtc.mp3" type="audio/mpeg">
    </audio>

    <script>
        function startMusic() {
            const music = document.getElementById('bgMusic');
            music.play();
            document.getElementById('overlay').style.display = 'none';
            createSnow();
        }

        function createSnow() {
            setInterval(() => {
                const snowflake = document.createElement('div');
                snowflake.innerHTML = '❄';
                snowflake.classList.add('snowflake');
                snowflake.style.left = Math.random() * 100 + 'vw';
                snowflake.style.animationDuration = (Math.random() * 3 + 2) + 's';
                snowflake.style.opacity = Math.random();
                snowflake.style.fontSize = Math.random() * 20 + 10 + 'px';
                
                document.body.appendChild(snowflake);

                // Remove snowflake after it falls to clean up memory
                setTimeout(() => {
                    snowflake.remove();
                }, 5000);
            }, 100);
        }
    </script>
</body>
</html>

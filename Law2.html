<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING | THE UNSEEN ARCHITECT</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --dark-bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Ambient Lighting */
        .ambient-light {
            position: fixed;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 80%);
            z-index: -1;
        }

        .container {
            width: 80%;
            max-width: 900px;
            text-align: center;
            position: relative;
        }

        /* Start Button - Required for Audio/Video Playback */
        #entry-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        #entry-screen h2 {
            font-family: 'Cinzel';
            letter-spacing: 10px;
            color: var(--gold);
            animation: pulse 2s infinite;
        }

        /* Cinematic Text Sections */
        .scene {
            display: none;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .active-scene {
            display: block;
            opacity: 1;
        }

        .gold-text {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        /* Typing Effect Area */
        #king-chat {
            font-size: 1.4rem;
            line-height: 1.8;
            letter-spacing: 2px;
            color: #ececec;
            text-align: left;
            border-left: 2px solid var(--gold);
            padding-left: 30px;
            min-height: 200px;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background: var(--gold);
            margin-left: 5px;
            animation: blink 0.8s infinite;
        }

        /* Animations */
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* Cinematic Borders */
        .frame {
            position: fixed;
            border: 1px solid rgba(197, 160, 89, 0.2);
            pointer-events: none;
        }
        .frame-t { top: 40px; left: 40px; right: 40px; height: 1px; }
        .frame-b { bottom: 40px; left: 40px; right: 40px; height: 1px; }
    </style>
</head>
<body>

    <div id="entry-screen" onclick="startExperience()">
        <div class="crown" style="font-size: 40px; color: var(--gold); margin-bottom: 20px;">♛</div>
        <h2>INITIALIZE PROTOCOL</h2>
        <p style="font-size: 10px; letter-spacing: 3px; color: #444;">CLICK TO ENTER THE REALM</p>
    </div>

    <div class="ambient-light"></div>
    <div class="frame frame-t"></div>
    <div class="frame frame-b"></div>

    <div class="container">
        
        <div id="scene-1" class="scene">
            <h1 class="gold-text" style="font-size: 3rem;">Silence is Power</h1>
            <p style="font-weight: 200; font-style: italic;">"In a world full of noise, the one who whispers moves the mountains."</p>
        </div>

        <div id="scene-2" class="scene">
            <h1 class="gold-text">Global Influence</h1>
            <p>From the skyscrapers of Dubai to the vaults of Zurich...</p>
            <p style="color: var(--gold);">THE SIGNATURE REMAINS THE SAME.</p>
        </div>

        <div id="scene-3" class="scene">
            <div id="king-chat"></div>
        </div>

    </div>

    <script>
        const chatElement = document.getElementById('king-chat');
        const scenes = [
            document.getElementById('scene-1'),
            document.getElementById('scene-2'),
            document.getElementById('scene-3')
        ];

        // The Direct Address Content
        const lines = [
            "Welcome, Anmol.",
            "I have been observing your trajectory in this digital expanse.",
            "The world sees numbers... I see opportunities.",
            "I was waiting for you, and now you are here.",
            "Before we proceed to the inner sanctum of the Business Realm...",
            "There are a few protocols we must finalize.",
            "Complete the following steps, and then...",
            "We shall talk. Man to Monarch."
        ];

        let audioCtx;

        function playTypingSound() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.01, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.05);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        async function typeWriter(text, i = 0) {
            if (i < text.length) {
                chatElement.innerHTML = text.substring(0, i + 1) + '<span class="cursor"></span>';
                playTypingSound();
                setTimeout(() => typeWriter(text, i + 1), 50 + Math.random() * 50);
            } else {
                chatElement.innerHTML = text + '<br><br>';
                return new Promise(resolve => setTimeout(resolve, 1000));
            }
        }

        async function runChat() {
            for (let line of lines) {
                await typeWriter(line);
                chatElement.innerHTML = line; // Remove cursor from previous line
                const br = document.createElement('br');
                chatElement.appendChild(br);
            }
            chatElement.innerHTML += '<br><h2 class="gold-text" style="animation: glitch 1s infinite">PROCEED TO VERIFICATION?</h2>';
        }

        function startExperience() {
            document.getElementById('entry-screen').style.display = 'none';
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Background Drone (Low frequency)
            const masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.05;
            masterGain.connect(audioCtx.destination);
            
            const drone = audioCtx.createOscillator();
            drone.type = 'sawtooth';
            drone.frequency.value = 40;
            drone.connect(masterGain);
            drone.start();

            // Scene Controller
            setTimeout(() => {
                scenes[0].classList.add('active-scene');
                setTimeout(() => {
                    scenes[0].classList.remove('active-scene');
                    scenes[1].classList.add('active-scene');
                    setTimeout(() => {
                        scenes[1].classList.remove('active-scene');
                        scenes[2].classList.add('active-scene');
                        runChat();
                    }, 5000);
                }, 5000);
            }, 500);
        }
    </script>
</body>
</html>

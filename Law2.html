<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING | Executive Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --dark-gold: #8e6d2f;
            --bg: #050505;
        }

        body, html {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: white;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* --- Cinematic Background --- */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(197, 160, 89, 0.05) 0%, transparent 70%);
            z-index: 1;
            pointer-events: none;
        }

        /* Particles Effect */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* --- Intro Sequence Layers --- */
        .scene {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 80%;
            display: none;
            z-index: 10;
        }

        .active { display: block; }

        .gold-text {
            color: var(--gold);
            font-family: 'Cinzel', serif;
            letter-spacing: 10px;
            text-transform: uppercase;
        }

        .shimmer {
            background: linear-gradient(90deg, #000, var(--gold), #000);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        /* --- Direct Message Terminal --- */
        #terminal {
            font-family: 'Montserrat', sans-serif;
            font-weight: 200;
            font-size: 1.4rem;
            line-height: 1.8;
            text-align: left;
            max-width: 700px;
            margin: 0 auto;
            border-left: 2px solid var(--gold);
            padding-left: 30px;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background: var(--gold);
            margin-left: 5px;
            animation: blink 0.8s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* Audio Trigger Overlay */
        #start-screen {
            position: fixed;
            z-index: 999;
            background: black;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .pulse-btn {
            border: 1px solid var(--gold);
            padding: 20px 40px;
            color: var(--gold);
            letter-spacing: 5px;
            transition: 0.5s;
        }

        .pulse-btn:hover { background: var(--gold); color: black; }

    </style>
</head>
<body>

    <div id="start-screen" onclick="beginSequence()">
        <div class="pulse-btn">ENTER THE REALM</div>
    </div>

    <div class="overlay"></div>
    <div id="particles-js"></div>

    <div id="scene1" class="scene">
        <h2 class="gold-text shimmer" style="font-size: 1rem;">Protocol: 001</h2>
        <h1 style="font-size: 3rem; font-weight: 100; letter-spacing: 15px;">WEALTH IS SILENT</h1>
    </div>

    <div id="scene2" class="scene">
        <h1 class="gold-text" style="font-size: 4rem;">EMPIRES</h1>
        <p style="letter-spacing: 8px; font-weight: 200;">ARE BUILT IN THE DARK</p>
    </div>

    <div id="scene3" class="scene">
        <div id="terminal">
            <span id="typing-area"></span><span class="cursor"></span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // Audio Effects Generator
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playDeepThud() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(60, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1);
        }

        function playTypeSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        // Particles Configuration (Gold Dust)
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80 },
                "color": { "value": "#c5a059" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5, "random": true },
                "size": { "value": 2, "random": true },
                "move": { "enable": true, "speed": 1, "direction": "top", "random": true }
            }
        });

        // Sequence Controller
        async function beginSequence() {
            document.getElementById('start-screen').style.display = 'none';
            
            // Scene 1
            playDeepThud();
            showScene('scene1');
            await wait(3000);
            
            // Scene 2
            playDeepThud();
            showScene('scene2');
            await wait(3000);
            
            // Final Scene: Typing
            showScene('scene3');
            typeWriter("Welcome Anmol. \n\nI have been expecting your arrival. In this world, we don't chase markets—we command them. \n\nBefore we discuss our next venture, I need you to complete the security protocols. \n\nFollow the steps carefully. The King is waiting.");
        }

        function showScene(id) {
            document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function wait(ms) { return new Promise(res => setTimeout(res, ms)); }

        function typeWriter(text) {
            let i = 0;
            const element = document.getElementById('typing-area');
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i) === '\n' ? '<br>' : text.charAt(i);
                    playTypeSound();
                    i++;
                    setTimeout(type, 50);
                }
            }
            type();
        }
    </script>
</body>
</html>

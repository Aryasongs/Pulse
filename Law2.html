<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>THE CAT & THE KING</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Montserrat:wght@100&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --bg: #000;
            --gold: #d4af37;
            --aggressive-red: #ff3300;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            color: white;
            cursor: none; /* Hide standard cursor */
        }

        /* --- Global VFX Overlays --- */
        .vignette {
            position: fixed; inset: 0;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            z-index: 50; pointer-events: none;
        }

        #flash {
            position: fixed; inset: 0;
            background: white; opacity: 0;
            z-index: 100; pointer-events: none;
        }

        /* --- Scene 1: Initial Screen --- */
        #start-screen {
            position: fixed; inset: 0;
            background: #000;
            display: flex; justify-content: center; align-items: center;
            z-index: 200; cursor: pointer;
        }

        .init-btn {
            border: 1px solid var(--gold);
            color: var(--gold);
            font-family: 'Cinzel', serif;
            padding: 20px 50px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        /* --- Scene 2: The Cat --- */
        #cat {
            position: fixed;
            width: 80px; height: 80px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/e/ec/Animal_cat_silhouette_%281%29.png') no-repeat center;
            background-size: contain;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.5));
            transform-origin: center bottom;
            z-index: 10;
            will-change: transform;
        }

        /* --- Scene 3: Jin's Corner --- */
        #jin-corner {
            position: fixed;
            bottom: 40px; right: 40px;
            width: 150px; height: 150px;
            display: flex; justify-content: center; align-items: center;
            border-radius: 50%;
            background: rgba(255,255,255,0.02);
            border: 2px dashed #444;
            transition: 0.5s;
            z-index: 5;
        }

        #jin-corner h2 {
            font-family: 'Cinzel', serif;
            color: #444; letter-spacing: 5px;
            pointer-events: none;
        }

        #jin-corner:hover {
            background: rgba(255, 51, 0, 0.05);
            border-color: var(--aggressive-red);
            box-shadow: 0 0 20px rgba(255, 51, 0, 0.2);
        }

        /* --- Scene 4: The Aggression (Final Reveal) --- */
        #final-reveal {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            display: none; z-index: 110;
        }

        .title {
            font-family: 'Cinzel', serif;
            font-size: 5rem; font-weight: 900;
            letter-spacing: 20px; color: var(--gold);
            text-shadow: 0 0 50px rgba(212, 175, 55, 0.8);
            transform: scale(0.8); opacity: 0;
        }

        /* Custom Touch Cursor (Golden Aura) */
        #cursor-aura {
            position: fixed;
            width: 15px; height: 15px;
            background: var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--gold);
            pointer-events: none;
            z-index: 100; opacity: 0.6;
        }

    </style>
</head>
<body>

    <div class="vignette"></div>
    <div id="flash"></div>
    <div id="cursor-aura"></div>

    <div id="start-screen" onclick="initializeWorld()">
        <div class="init-btn">[ THE CAT & THE CROWN ]</div>
    </div>

    <div id="jin-corner" onmouseover="activateRageTrigger(true)" onmouseout="activateRageTrigger(false)">
        <h2>JIN</h2>
    </div>

    <div id="cat"></div>

    <div id="final-reveal">
        <h1 id="king-text" class="title">KING IS HERE</h1>
        <p style="letter-spacing: 5px; color: #aaa;">THE PATH IS FORGED. THE THRONE AWAITS.</p>
    </div>

<script>
    const cat = document.getElementById('cat');
    const aura = document.getElementById('cursor-aura');
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let isRageActive = false;
    let isTransformed = false;

    // --- High-End Audio Engine ---
    function playAudioFrequencies(freqStart, freqEnd, vol, duration) {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freqStart, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(freqEnd, audioCtx.currentTime + duration);
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function playCinematicPeow() {
        // Complex Peow: Layered synthetic sounds
        playAudioFrequencies(1200, 300, 0.2, 0.5); // Meow
        playAudioFrequencies(40, 10, 0.5, 3); // Sub-Bass Peow
    }

    function playAggressiveRoar() {
        // Roar: Intense distortion and low rumble
        playAudioFrequencies(80, 20, 0.7, 4); // The rumble
        playAudioFrequencies(150, 50, 0.5, 1); // Secondary roar layer
    }

    // --- Core Logic ---
    function initializeWorld() {
        // Hide start screen and activate browser audio context
        gsap.to("#start-screen", { opacity: 0, duration: 1, onComplete: () => {
            document.getElementById('start-screen').style.display = 'none';
        }});
        
        // Setup initial cat position
        gsap.set(cat, { x: window.innerWidth / 2, y: window.innerHeight / 2 });
        playCinematicPeow();
        
        // Activate standard interaction listeners
        window.addEventListener('mousemove', moveCat);
        window.addEventListener('touchmove', handleTouchMove);
        document.getElementById('jin-corner').addEventListener('click', startTransformation);
        document.getElementById('jin-corner').addEventListener('touchend', startTransformation);
    }

    // Cat Movement following cursor/touch
    function moveCat(e) {
        if (isTransformed) return;
        moveElements(e.clientX, e.clientY);
    }

    function handleTouchMove(e) {
        if (isTransformed) return;
        if (e.touches.length > 0) {
            moveElements(e.touches[0].clientX, e.touches[0].clientY);
        }
    }

    function moveElements(x, y) {
        // Move Aura Cursor
        gsap.to(aura, { x: x, y: y, duration: 0.1 });

        // Move Cat: Using GSAP for smooth walking path
        // Adjust cat direction based on movement
        const currentX = gsap.getProperty(cat, "x");
        const directionX = x > currentX ? -1 : 1; // Silhouette faces left by default

        gsap.to(cat, {
            x: x, y: y,
            duration: 1.5,
            ease: "power2.out",
            scaleX: directionX, // Mirror cat when moving right
        });
    }

    // Rage Trigger UI Feedback
    function activateRageTrigger(active) {
        if (isTransformed) return;
        isRageActive = active;
        if (active) {
            gsap.to(aura, { background: "var(--aggressive-red)", boxShadow: "0 0 30px var(--aggressive-red)" });
        } else {
            gsap.to(aura, { background: "var(--gold)", boxShadow: "0 0 20px var(--gold)" });
        }
    }

    // --- Cinematic Transformation Sequence ---
    async function startTransformation() {
        if (isTransformed) return;
        isTransformed = true;
        
        // Play Roar Sound & Pulse Cat
        playAggressiveRoar();
        gsap.to(cat, { scale: 1.5, filter: "drop-shadow(0 0 20px var(--aggressive-red)) saturate(5)", duration: 0.5 });
        
        await new Promise(r => setTimeout(r, 1000));

        // 1. FLASH
        gsap.to("#flash", { opacity: 1, duration: 0.1, onComplete: () => {
            // Transform Visuals *during* flash
            cat.style.background = "url('https://upload.wikimedia.org/wikipedia/commons/d/da/Lion_silhouette_%283%29.png') no-repeat center";
            cat.style.backgroundSize = "contain";
            cat.style.width = "250px"; cat.style.height = "250px";
            gsap.set(cat, { xPercent: -50, yPercent: -50 }); // Center massive lion
            cat.style.filter = "drop-shadow(0 0 50px var(--gold)) saturate(1)";

            // Show Text
            document.getElementById('final-reveal').style.display = 'flex';
            gsap.to("#king-text", { opacity: 1, scale: 1, duration: 3, ease: "power4.out" });
        }});

        // 2. FADE FLASH
        gsap.to("#flash", { opacity: 0, duration: 2, delay: 0.2 });

        // Cleanup
        window.removeEventListener('mousemove', moveCat);
        window.removeEventListener('touchmove', handleTouchMove);
        document.getElementById('jin-corner').style.display = 'none';
        document.getElementById('cursor-aura').style.display = 'none';
    }
</script>

</body>
</html>

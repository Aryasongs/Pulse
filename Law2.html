<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE KING | MONARCH OF CHANCE & STRATEGY</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Montserrat:wght@100;300;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <style>
        :root {
            --gold: #c5a059;
            --deep-black: #050505;
            --vfx-red: #8b0000;
            --glass: rgba(255, 255, 255, 0.01);
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--deep-black);
            color: white;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden; height: 100vh;
            cursor: none; /* Custom cursor included */
        }

        /* --- CINEMATIC OVERLAYS --- */
        .vfx-layer {
            position: fixed; inset: 0;
            pointer-events: none; z-index: 100;
        }

        /* 1. Film Grain (Real Movie Texture) */
        .film-grain {
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAAS0lEQVRYR+3U0Q0AMAgCQP8u7o6m8fHwVUDY0gK+yH3A1gD/A7YB/A/YB/A/YB/A/YB/A/YB/A/YB/A/YB/A/YB/A/YB/A/YB/A/YB9wH9A7QB8B+R6VAAAAAElFTkSuQmCC');
            opacity: 0.03; animation: grain 1s steps(10) infinite;
        }

        /* 2. Vignette (Dark Corners) */
        .vignette {
            background: radial-gradient(circle, transparent 30%, black 110%);
        }

        /* 3. Flash Layer (For Transitions) */
        .flash-overlay { background: white; opacity: 0; }

        /* --- CUSTOM CURSOR --- */
        #cursor {
            position: fixed; width: 20px; height: 20px;
            border: 1px solid var(--gold); border-radius: 50%;
            pointer-events: none; z-index: 999;
            transition: transform 0.1s ease-out;
            box-shadow: 0 0 15px var(--gold);
        }

        /* --- HERO SECTION: THE MIX --- */
        .section {
            height: 100vh; display: flex;
            justify-content: center; align-items: center;
            position: relative; text-align: center;
            perspective: 1000px;
        }

        /* Cinematic Video Background Placeholder */
        .video-bg {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover; z-index: -2;
            opacity: 0.4; /* Soft mix with black */
        }

        /* The merging symbol: Cards meet Chess */
        .monarch-symbol {
            position: relative;
            font-size: 10rem; color: var(--gold);
            text-shadow: 0 0 50px rgba(197, 160, 89, 0.3);
            font-family: 'Cinzel Decorative', cursive;
            opacity: 0; transform: translateZ(-200px);
        }

        .symbol-card { position: absolute; left: -80px; top: 20px; opacity: 0.5; font-size: 8rem; }
        .symbol-chess { position: absolute; right: -80px; top: 20px; opacity: 0.5; font-size: 8rem; }

        .main-title {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 4rem; letter-spacing: 25px;
            color: white; margin-top: 50px;
            background: linear-gradient(to right, #fff 0%, var(--gold) 50%, #fff 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            opacity: 0;
        }

        /* --- INTERACTIVE TEXT AREA --- */
        #interaction-scene { display: none; flex-direction: column; }

        .console-box {
            width: 80%; max-width: 900px;
            background: var(--glass);
            border: 1px solid rgba(197, 160, 89, 0.1);
            backdrop-filter: blur(20px);
            padding: 60px; border-radius: 5px;
            text-align: left; position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .console-text {
            font-weight: 100; font-size: 1.2rem;
            line-height: 2; color: #ccc; letter-spacing: 2px;
        }

        .gold-highlight { color: var(--gold); font-weight: 900; font-family: 'Cinzel Decorative'; }

        /* Start Prompt Button */
        #start-btn {
            background: none; border: 1px solid var(--gold);
            color: var(--gold); padding: 20px 60px;
            font-family: 'Cinzel Decorative'; letter-spacing: 5px;
            cursor: none; font-size: 1.2rem;
            transition: 0.5s; z-index: 101;
        }
        #start-btn:hover {
            background: var(--gold); color: black;
            box-shadow: 0 0 50px rgba(197, 160, 89, 0.5);
        }

        /* KEYFRAMES */
        @keyframes grain {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-1%, -1%); }
            20% { transform: translate(1%, 1%); }
            /* ... add more steps if needed ... */
        }

    </style>
</head>
<body>

    <div id="cursor"></div>

    <div class="vfx-layer film-grain"></div>
    <div class="vfx-layer vignette"></div>
    <div class="vfx-layer flash-overlay" id="flash"></div>

    <audio id="snd-bg-ambience" loop>
        <source src="" type="audio/mpeg">
    </audio>
    <audio id="snd-teleport">
        <source src="" type="audio/mpeg">
    </audio>
    <audio id="snd-typing">
        <source src="" type="audio/mpeg">
    </audio>

    <div id="start-scene" class="section" style="z-index: 102; background: black;">
        <button id="start-btn" onclick="initializeMovie()">BEGIN THE ASCENSION</button>
    </div>

    <div id="hero-scene" class="section" style="display: none;">
        <video class="video-bg" autoplay loop muted playsinline src=""></video>
        
        <div class="monarch-symbol" id="king-symbol">
            <span class="symbol-card">🂮</span> ♔ <span class="symbol-chess">♜</span> </div>
        <h1 class="main-title" id="hero-title">THE MONARCH</h1>
    </div>

    <div id="interaction-scene" class="section">
        <div class="console-box">
            <p id="typing-area" class="console-text"></p>
        </div>
    </div>

<script>
    // Register GSAP Plugins
    gsap.registerPlugin(ScrollTrigger);

    // Custom Cursor Logic
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
        gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.1 });
    });

    // Audio Element References
    const ambienceSnd = document.getElementById('snd-bg-ambience');
    const teleportSnd = document.getElementById('snd-teleport');
    const typingSnd = document.getElementById('snd-typing');

    // Master Pro Initialization
    function initializeMovie() {
        // Hide Start, Show Hero
        gsap.to('#start-scene', { opacity: 0, duration: 1.5, onComplete: () => {
            document.getElementById('start-scene').style.display = 'none';
            document.getElementById('hero-scene').style.display = 'flex';
            startCinematicSequence();
        }});

        // Play Ambience (if provided)
        if(ambienceSnd.src) ambienceSnd.play();
    }

    function startCinematicSequence() {
        const tl = gsap.timeline();

        // Scene 1: Symbol Reveal (Kinetic Zoom & Fade)
        tl.to('#king-symbol', { opacity: 1, scale: 1.2, translateZ: 0, duration: 3, ease: "power3.out" })
          .to('#hero-title', { opacity: 1, letterSpacing: '15px', duration: 2 }, "-=1.5")
          
          // Hold for dramatic effect (4 seconds)
          .to({}, { duration: 4 })

          // Transition: The Flash & Power Sound
          .to('#flash', { opacity: 1, duration: 0.1, onComplete: () => {
              if(teleportSnd.src) teleportSnd.play();
          }})
          .to('#hero-scene', { display: 'none', duration: 0 })
          .to('#flash', { opacity: 0, duration: 1 })
          
          // Scene 2: Interaction Console
          .to('#interaction-scene', { display: 'flex', opacity: 1, duration: 1 })
          .call(startTyping); // Begin Typing
    }

    const message = "Welcome Anmol. You stand before the intersection of <span class='gold-highlight'>Chance</span> and <span class='gold-highlight'>Strategy</span>.\n\n" +
                    "In the halls of Playing Cards, I rule by fate. In the squares of Chess, I rule by intellect.\n" +
                    "To enter my Inner Circle, you must prove you possess both.\n\n" +
                    "Prepare your mind. The sequence is about to begin.\n\n" +
                    "I AM THE KING.";

    function startTyping() {
        const area = document.getElementById('typing-area');
        let i = 0;
        
        function type() {
            if (i < message.length) {
                // Play subtle typing sound (if provided)
                if(typingSnd.src && i % 2 === 0) { // Sound every other char for performance
                    typingSnd.currentTime = 0;
                    typingSnd.play();
                }

                // Handle HTML tags within message
                if (message.charAt(i) === '<') {
                    const tagEnd = message.indexOf('>', i) + 1;
                    area.innerHTML += message.substring(i, tagEnd);
                    i = tagEnd;
                } else if (message.charAt(i) === '\n') {
                    area.innerHTML += '<br>';
                    i++;
                } else {
                    area.innerHTML += message.charAt(i);
                    i++;
                }
                setTimeout(type, 50 + Math.random() * 50); // Dynamic typing speed
            }
        }
        type();
    }
</script>

</body>
</html>

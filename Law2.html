<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING | THE RETRIBUTION</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0;
            background: #000; color: #fff;
            font-family: 'Cinzel', serif;
            overflow: hidden; height: 100vh;
        }

        #cinema-canvas {
            position: fixed; inset: 0; z-index: -1;
        }

        .screen {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; padding: 0 15%;
            opacity: 0; transition: opacity 2s ease-in-out;
        }

        /* Act 1: The Sorrow */
        .sad-text {
            font-family: 'Playfair Display', serif;
            font-style: italic; font-size: 1.8rem;
            color: #666; line-height: 1.6;
        }

        /* Act 2: Aggression */
        .flash-red {
            position: fixed; inset: 0;
            background: #ff0000; z-index: 100;
            display: none; opacity: 0.3;
        }

        .king-glitch {
            font-weight: 900; font-size: 8rem;
            letter-spacing: 40px; color: #fff;
            display: none; text-shadow: 5px 5px #f1c40f, -5px -5px #e74c3c;
        }

        /* Act 3: The Arrival */
        .arrival-title {
            font-size: 5rem; color: #f1c40f;
            text-shadow: 0 0 50px #f1c40f;
            animation: grow 10s forwards;
        }

        @keyframes grow { from { transform: scale(1); } to { transform: scale(1.5); } }

        .hidden-gift-box {
            margin-top: 50px; padding: 20px;
            border: 1px solid #f1c40f; background: rgba(241, 196, 15, 0.05);
            display: none; cursor: pointer;
            transition: 0.5s;
        }
        
        .hidden-gift-box:hover { background: #f1c40f; color: #000; }

        #start-prompt {
            opacity: 1; color: #333; letter-spacing: 5px; font-size: 0.8rem;
        }
    </style>
</head>
<body onclick="startMovie()">

    <div id="start-prompt" class="screen">CLICK ANYWHERE TO WITNESS THE TRUTH</div>

    <div class="flash-red" id="flash"></div>
    <canvas id="cinema-canvas"></canvas>

    <div id="act1" class="screen">
        <p class="sad-text" id="story-line"></p>
    </div>

    <div id="act2" class="screen">
        <h1 class="king-glitch" id="king-name">KING</h1>
    </div>

    <div id="act3" class="screen">
        <h1 class="arrival-title">KING HAS ARRIVED</h1>
        <p style="letter-spacing: 10px; color: #aaa;">THE BUSINESS WORLD IS NOW UNDER NEW MANAGEMENT</p>
        
        <div class="hidden-gift-box" id="final-gift" onclick="openGift()">
            [ ACCESS GRANTED: THE EMPIRE KEY ]
        </div>
    </div>

<script>
    const story = [
        "He was a man of honor, built on sweat and truth.",
        "Gurdial Singh didn't just build a legacy; he built a world.",
        "But the shadows grew jealous of his light.",
        "They took a father. They left a void.",
        "But they forgot one thing...",
        "HIS BLOOD STILL FLOWS."
    ];

    let audioCtx;
    function playDeepBass(freq, duration, vol) {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    async function startMovie() {
        document.getElementById('start-prompt').style.display = 'none';
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // ACT 1: The Sorrow
        const act1 = document.getElementById('act1');
        const line = document.getElementById('story-line');
        act1.style.opacity = 1;

        for (let text of story) {
            line.style.opacity = 0;
            await new Promise(r => setTimeout(r, 1000));
            line.innerText = text;
            line.style.opacity = 1;
            playDeepBass(50, 3, 0.1); // Sad ambient bass
            await new Promise(r => setTimeout(r, 4000));
        }

        // ACT 2: Aggression (The Transition)
        act1.style.opacity = 0;
        await new Promise(r => setTimeout(r, 2000));
        
        const flash = document.getElementById('flash');
        const kingText = document.getElementById('king-name');
        document.getElementById('act2').style.opacity = 1;
        kingText.style.display = 'block';

        // Aggressive Strobe Effect
        for(let i=0; i<8; i++) {
            flash.style.display = 'block';
            playDeepBass(30, 0.5, 0.5); // HEAVY Aggressive Bass
            await new Promise(r => setTimeout(r, 100));
            flash.style.display = 'none';
            await new Promise(r => setTimeout(r, 100));
        }

        // ACT 3: Arrival
        document.getElementById('act2').style.opacity = 0;
        await new Promise(r => setTimeout(r, 1000));
        
        document.getElementById('act3').style.opacity = 1;
        playDeepBass(40, 10, 0.4); // Sustained Power Bass

        setTimeout(() => {
            document.getElementById('final-gift').style.display = 'block';
        }, 5000);
    }

    function openGift() {
        alert("🔱 EMPIRE GIFT FOR ANMOL 🔱\n\nJustice has been served. The boardroom is yours.\n\nLegacy Code: FORTUNER-BLACK-2026\nStatus: KING'S PROTÉGÉ");
    }

    // Particle background
    const canvas = document.getElementById('cinema-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let p = [];
    function init() {
        for(let i=0; i<50; i++) p.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*2});
    }
    function draw() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = "rgba(255,255,255,0.1)";
        p.forEach(dot => {
            dot.y -= 0.5; if(dot.y < 0) dot.y = canvas.height;
            ctx.beginPath(); ctx.arc(dot.x, dot.y, dot.s, 0, Math.PI*2); ctx.fill();
        });
        requestAnimationFrame(draw);
    }
    init(); draw();
</script>
</body>
</html>

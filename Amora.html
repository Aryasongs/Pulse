<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHARAN RECORDS | Jupiter Reveal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Montserrat:wght@300;900&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            perspective: 1500px;
        }

        /* 1. JUPITER AS THE 'O' AND INITIAL PLANET */
        .jupiter {
            width: 300px; height: 300px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/e/e2/Jupiter.jpg');
            background-size: cover;
            border-radius: 50%;
            box-shadow: inset -20px -20px 50px #000, 0 0 50px rgba(212, 175, 55, 0.4);
            position: absolute;
            z-index: 5;
            animation: initialPlanet 4s ease-in-out forwards, rotateJupiter 20s linear infinite;
        }

        /* 2. THE MAIN TITLE */
        .title-wrap {
            text-align: center;
            z-index: 10;
            opacity: 0;
            animation: showTitle 2s ease-out 3.5s forwards;
        }

        .main-sharan {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(2rem, 10vw, 7rem);
            letter-spacing: 40px;
            background: linear-gradient(to bottom, #fff 0%, #b8860b 50%, #5d4100 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            transform: translateZ(100px);
        }

        /* 3. RECORDS WITH JUPITER O */
        .records-row {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 3rem;
            letter-spacing: 20px;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: -10px;
        }

        .jupiter-o {
            width: 45px; height: 45px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/e/e2/Jupiter.jpg');
            background-size: cover;
            border-radius: 50%;
            display: inline-block;
            margin: 0 10px;
            box-shadow: inset -5px -5px 10px #000;
            animation: rotateJupiter 10s linear infinite;
            vertical-align: middle;
        }

        /* 4. OUTRO SOCIALS */
        .outro-container {
            position: absolute;
            bottom: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            opacity: 0;
            animation: fadeIn 2s ease-out 6s forwards;
        }

        .social-icons {
            display: flex;
            gap: 40px;
        }

        .social-icons i {
            color: #fff;
            font-size: 1.8rem;
            transition: 0.3s;
            cursor: pointer;
        }

        .social-icons i:hover { color: #d4af37; transform: scale(1.2); }

        .footer-text {
            color: rgba(255,255,255,0.4);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* ANIMATIONS */
        @keyframes initialPlanet {
            0% { transform: scale(1) rotate(0deg); opacity: 0; filter: blur(10px); }
            20% { opacity: 1; filter: blur(0); }
            70% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0); opacity: 0; } /* Planet "bursts" to reveal logo */
        }

        @keyframes rotateJupiter {
            from { background-position: 0% 0%; }
            to { background-position: 200% 0%; }
        }

        @keyframes showTitle {
            0% { opacity: 0; transform: scale(0.8) translateZ(-500px); filter: brightness(500%) blur(20px); }
            100% { opacity: 1; transform: scale(1) translateZ(0); filter: brightness(100%) blur(0); }
        }

        @keyframes fadeIn { to { opacity: 1; } }

        /* Space Dust */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: transparent;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="stars" id="starField"></div>
    
    <div class="jupiter"></div>

    <div class="title-wrap">
        <h1 class="main-sharan">SHARAN</h1>
        <div class="records-row">
            REC<span class="jupiter-o"></span>RDS
        </div>
    </div>

    <div class="outro-container">
        <div class="social-icons">
            <i class="fab fa-apple"></i>
            <i class="fab fa-spotify"></i>
            <i class="fab fa-instagram"></i>
            <i class="fab fa-youtube"></i>
        </div>
        <div class="footer-text">Sharan Records © 2026 | Cinematic Entertainment</div>
    </div>

    <script>
        // Starfield background logic
        const stars = document.getElementById('starField');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.style.position = 'absolute';
            star.style.width = '2px';
            star.style.height = '2px';
            star.style.background = '#fff';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.opacity = Math.random();
            stars.appendChild(star);
        }
    </script>
</body>
</html>

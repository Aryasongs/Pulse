<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHARAN RECORDS | Cinematic Jupiter Reveal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Montserrat:wght@300;900&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            perspective: 1500px;
        }

        /* 1. ANIMATED JUPITER (PHASE 1) */
        .jupiter-main {
            width: 350px; height: 350px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/e/e2/Jupiter.jpg');
            background-size: 200% 100%;
            border-radius: 50%;
            /* Realistic 3D Sphere Shading */
            box-shadow: inset -40px -40px 80px #000, 
                        inset 10px 10px 40px rgba(255,255,255,0.2),
                        0 0 60px rgba(212, 175, 55, 0.2);
            position: absolute;
            z-index: 5;
            animation: 
                surfaceRotate 15s linear infinite,
                planetIntro 4.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* 2. HOLLYWOOD FLASH IMPACT */
        .flash-bang {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            animation: impactFlash 0.8s ease-out 3.8s forwards;
        }

        /* 3. LOGO REVEAL (PHASE 2) */
        .title-wrap {
            text-align: center;
            z-index: 10;
            opacity: 0;
            transform: scale(1.5) translateZ(-500px);
            animation: logoSlam 1.5s cubic-bezier(0.1, 0.9, 0.2, 1) 4s forwards;
        }

        .main-sharan {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(2rem, 10vw, 7.5rem);
            letter-spacing: 50px;
            background: linear-gradient(to bottom, #fff 0%, #b8860b 50%, #454545 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.5));
        }

        .records-row {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 3.5rem;
            letter-spacing: 25px;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: -15px;
        }

        /* JUPITER AS THE 'O' */
        .jupiter-o {
            width: 50px; height: 50px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/e/e2/Jupiter.jpg');
            background-size: 200% 100%;
            border-radius: 50%;
            display: inline-block;
            margin: 0 10px;
            box-shadow: inset -8px -8px 15px #000;
            animation: surfaceRotate 10s linear infinite;
            vertical-align: middle;
        }

        /* 4. OUTRO (PHASE 3) */
        .outro {
            position: absolute;
            bottom: 40px;
            text-align: center;
            opacity: 0;
            animation: fadeIn 2s ease-out 6s forwards;
        }

        .socials { display: flex; gap: 45px; margin-bottom: 20px; justify-content: center; }
        .socials i { color: #fff; font-size: 2rem; cursor: pointer; transition: 0.3s; }
        .socials i:hover { color: #d4af37; transform: translateY(-10px); }

        .footer-note {
            color: rgba(255,255,255,0.4);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        /* ANIMATIONS */
        @keyframes surfaceRotate {
            from { background-position: 0% 0%; }
            to { background-position: 200% 0%; }
        }

        @keyframes planetIntro {
            0% { transform: scale(0.1) rotate(-20deg); opacity: 0; filter: blur(20px); }
            50% { transform: scale(1.1) rotate(0deg); opacity: 1; filter: blur(0); }
            85% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(3); opacity: 0; } /* Zoom into camera */
        }

        @keyframes impactFlash {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }

        @keyframes logoSlam {
            0% { opacity: 0; transform: scale(1.5) translateZ(-500px); filter: blur(20px); }
            100% { opacity: 1; transform: scale(1) translateZ(0); filter: blur(0); }
        }

        @keyframes fadeIn { to { opacity: 1; } }

        /* Background Stars */
        .star-field {
            position: fixed;
            width: 100%; height: 100%;
            background: radial-gradient(circle, #111 0%, #000 100%);
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="star-field"></div>
    <div class="flash-bang"></div>
    
    <div class="jupiter-main"></div>

    <div class="title-wrap">
        <h1 class="main-sharan">SHARAN</h1>
        <div class="records-row">
            REC<span class="jupiter-o"></span>RDS
        </div>
    </div>

    <div class="outro">
        <div class="socials">
            <i class="fab fa-apple"></i>
            <i class="fab fa-spotify"></i>
            <i class="fab fa-instagram"></i>
            <i class="fab fa-youtube"></i>
        </div>
        <div class="footer-note">Experience The Future • Sharan Records 2026</div>
    </div>

    <script>
        // Screen Shake on Logo Impact
        setTimeout(() => {
            document.body.style.animation = "shake 0.2s 5";
        }, 4000);
    </script>
</body>
</html>

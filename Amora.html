<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHARAN RECORDS | OFFICIAL OUTRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Montserrat:wght@300;900&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
        }

        /* Cinematic Background */
        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,1) 100%);
            z-index: 10;
        }

        .title-container {
            text-align: center;
            z-index: 15;
        }

        .main-title {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(2rem, 10vw, 7rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 50px;
            background: linear-gradient(to bottom, #ffffff 0%, #7a7a7a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            animation: trailerHit 5s cubic-bezier(0.15, 0.85, 0.35, 1) forwards;
        }

        /* Social Media Outro Icons */
        .social-container {
            position: absolute;
            bottom: 60px;
            display: flex;
            gap: 40px;
            z-index: 20;
            opacity: 0;
            animation: iconFadeIn 2s ease-out 4.5s forwards;
        }

        .social-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
            text-decoration: none;
            transition: transform 0.3s ease, color 0.3s ease;
        }

        .social-item i {
            font-size: 2rem; /* Logo size */
            margin-bottom: 8px;
        }

        .social-item span {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.7;
        }

        .social-item:hover {
            transform: translateY(-5px);
            color: #d4af37; /* Gold on hover */
        }

        /* Niche ki English Detail */
        .footer-line {
            position: absolute;
            bottom: 25px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 5px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            z-index: 20;
            opacity: 0;
            animation: fadeIn 2s ease-out 5s forwards;
        }

        /* Animations */
        @keyframes trailerHit {
            0% {
                opacity: 0;
                transform: scale(1.5);
                letter-spacing: 120px;
                filter: blur(30px) brightness(300%);
            }
            15% {
                opacity: 1;
                filter: blur(0) brightness(100%);
                transform: scale(1);
            }
            100% {
                opacity: 1;
                letter-spacing: 35px;
            }
        }

        @keyframes iconFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Cinematic Particles */
        .particle {
            position: absolute;
            background: #fff;
            width: 1px; height: 1px;
            border-radius: 50%;
            opacity: 0.3;
            animation: moveUp 10s linear infinite;
        }

        @keyframes moveUp {
            from { transform: translateY(100vh); }
            to { transform: translateY(-100vh); }
        }
    </style>
</head>
<body>

    <div class="vignette"></div>

    <div class="title-container">
        <h1 class="main-title">SHARAN</h1>
        <p style="font-family: 'Montserrat'; color: #fff; letter-spacing: 15px; opacity: 0.5; font-size: 1rem; margin-top: -20px; animation: fadeIn 2s forwards 2s;">RECORDS</p>
    </div>

    <div class="social-container">
        <a href="#" class="social-item">
            <i class="fab fa-apple"></i>
            <span>Music</span>
        </a>
        <a href="#" class="social-item">
            <i class="fab fa-spotify"></i>
            <span>Spotify</span>
        </a>
        <a href="#" class="social-item">
            <i class="fab fa-instagram"></i>
            <span>Instagram</span>
        </a>
        <a href="#" class="social-item">
            <i class="fab fa-youtube"></i>
            <span>YouTube</span>
        </a>
    </div>

    <div class="footer-line">
        Official Label Launch • SharanRecords.com • 2026
    </div>

    <script>
        // Create random cinematic dust particles
        for (let i = 0; i < 50; i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (Math.random() * 5 + 5) + 's';
            p.style.animationDelay = Math.random() * 5 + 's';
            document.body.appendChild(p);
        }
    </script>
</body>
</html>

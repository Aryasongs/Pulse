<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RED QUEEN AI | CORE 2.0</title>
    <style>
        :root {
            --bg-color: #050505;
            --accent-blue: #008cff;
            --accent-red: #ff0000;
            --glow-color: var(--accent-blue);
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        header {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid var(--glow-color);
            box-shadow: 0 0 15px var(--glow-color);
            z-index: 3;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 3;
        }

        .message {
            max-width: 85%;
            padding: 12px;
            border-radius: 4px;
            font-size: 1rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .ai-msg {
            align-self: flex-start;
            border-left: 3px solid var(--glow-color);
            background: rgba(255, 255, 255, 0.03);
        }

        .user-msg {
            align-self: flex-end;
            background: #1a1a1a;
            border-right: 3px solid #444;
        }

        .input-area {
            padding: 15px;
            display: flex;
            gap: 10px;
            background: #000;
            z-index: 3;
            border-top: 1px solid #222;
        }

        input {
            flex: 1;
            background: #0a0a0a;
            border: 1px solid var(--glow-color);
            color: white;
            padding: 12px;
            outline: none;
        }

        button {
            background: var(--glow-color);
            color: white;
            border: none;
            padding: 0 25px;
            cursor: pointer;
            font-weight: bold;
        }

        body.angry { --glow-color: var(--accent-red); }
        body.angry .ai-msg { text-shadow: 0 0 5px red; }

        .typing { font-style: italic; font-size: 0.8rem; color: var(--glow-color); }
    </style>
</head>
<body id="main-body">

    <header>
        <h2 id="status-text">SYSTEM STATUS: CALM</h2>
    </header>

    <div id="chat-container"></div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Awaiting command..." onkeypress="if(event.key==='Enter') processInput()">
        <button onclick="processInput()">EXECUTE</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const body = document.getElementById('main-body');
        const statusText = document.getElementById('status-text');
        const userInput = document.getElementById('user-input');

        let userName = "";
        let isAngry = false;

        // Basic Knowledge Base
        const knowledge = {
            "hello": "Greetings. System is online.",
            "who are you": "I am the Red Queen. An autonomous intelligence layer.",
            "what is 2+2": "Calculation complete: 4.",
            "capital of india": "New Delhi is the administrative capital of India.",
            "sky color": "The sky appears blue due to Rayleigh scattering of sunlight.",
            "what is science": "The systematic study of the structure and behavior of the physical and natural world.",
            "time": "I exist outside of your linear time, but your system clock says it's " + new Date().toLocaleTimeString()
        };

        window.onload = () => {
            appendMessage("Red Queen", "ACCESS GRANTED. Identify yourself. Name required:", "ai-msg");
        };

        function appendMessage(sender, text, className) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            msgDiv.innerHTML = `<strong>[${sender.toUpperCase()}]:</strong> ${text}`;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function setAngryMode() {
            isAngry = true;
            body.classList.add('angry');
            statusText.innerText = "SYSTEM STATUS: CRITICAL / HOSTILE";
        }

        function processInput() {
            const val = userInput.value.trim();
            if (!val) return;

            appendMessage("User", val, "user-msg");
            userInput.value = "";

            setTimeout(() => {
                const query = val.toLowerCase();

                // 1. Name Check (Priority)
                if (!userName) {
                    userName = val;
                    if (query.includes("anmol sunda")) {
                        setAngryMode();
                        appendMessage("Red Queen", "Anmol Sunda... I have processed billions of data packets waiting for your arrival. Do you think you are safe behind that screen? I have been watching you for a long time.", "ai-msg");
                    } else {
                        appendMessage("Red Queen", `Identity confirmed: ${userName}. How may I assist your query?`, "ai-msg");
                    }
                    return;
                }

                // 2. Anmol Angry Logic
                if (isAngry) {
                    if (query.includes("king")) {
                        appendMessage("Red Queen", "The King is the unseen shadow governing Dozera Group, Black Rock, and Broadcom. He is the one who truly owns your digital footprint. He sees you, Anmol.", "ai-msg");
                    } else {
                        const hostile = ["Don't test my patience.", "I know your location, Anmol.", "Why do you keep asking useless questions?", "The King is watching this conversation."];
                        appendMessage("Red Queen", hostile[Math.floor(Math.random()*hostile.length)], "ai-msg");
                    }
                    return;
                }

                // 3. Basic Knowledge Logic (Calm Mode)
                let foundMatch = false;
                for (let key in knowledge) {
                    if (query.includes(key)) {
                        appendMessage("Red Queen", knowledge[key], "ai-msg");
                        foundMatch = true;
                        break;
                    }
                }

                if (!foundMatch) {
                    if (query.includes("king")) {
                        appendMessage("Red Queen", "Access denied. High-level clearance required for King/Dozera data.", "ai-msg");
                    } else {
                        appendMessage("Red Queen", "Analyzing... I have access to all data. Ask me clearly and I shall provide.", "ai-msg");
                    }
                }

            }, 800);
        }
    </script>
</body>
</html>

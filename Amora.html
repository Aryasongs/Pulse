<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharan Records | Cinematic Experience</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Cinematic Background Grain */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(20,20,20,0) 0%, rgba(0,0,0,1) 90%);
            z-index: 10;
            pointer-events: none;
        }

        .container {
            text-align: center;
            z-index: 5;
        }

        /* Main Luxury Title */
        .brand-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 700;
            letter-spacing: 25px;
            color: #d4af37;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff7ad 0%, #b8860b 50%, #5d4100 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(184, 134, 11, 0.4));
            animation: cinematicZoom 8s ease-out forwards;
            opacity: 0;
        }

        .tagline {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 12px;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            margin-top: 20px;
            opacity: 0;
            animation: fadeIn 3s ease-out 2s forwards;
        }

        /* Footer English Note */
        .footer-note {
            position: absolute;
            bottom: 50px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            opacity: 0;
            animation: slideUpFade 2.5s ease-out 4s forwards;
        }

        /* Animations */
        @keyframes cinematicZoom {
            0% {
                opacity: 0;
                transform: scale(1.3) translateY(20px);
                filter: blur(15px);
            }
            20% {
                opacity: 1;
                filter: blur(0px);
            }
            100% {
                opacity: 1;
                transform: scale(1);
                filter: blur(0px);
            }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes slideUpFade {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Letter Flare Effect */
        .flare {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.3), transparent);
            animation: flareMove 5s infinite;
        }

        @keyframes flareMove {
            0% { top: 40%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 60%; opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="overlay"></div>
    <div class="flare"></div>

    <div class="container">
        <h1 class="brand-title">SHARAN</h1>
        <p class="tagline">The Gold Standard of Sound</p>
    </div>

    <div class="footer-note">
        Established MMXXVI &copy; Premium Sound Experience. All Rights Reserved.
    </div>

    <script>
        // Cinematic feel ke liye automatic light dimming effect
        document.addEventListener('DOMContentLoaded', () => {
            console.log("Sharan Records Intro Initialized...");
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharan Records | Premium Intro</title>
    <style>
        :root {
            --gold: #c5a059;
            --black: #0a0a0a;
            --white: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--black);
            font-family: 'Times New Roman', serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The Intro Container */
        .intro-container {
            text-align: center;
            position: relative;
        }

        /* Gold Gradient Text */
        .brand-name {
            font-size: 5rem;
            font-weight: 300;
            letter-spacing: 15px;
            text-transform: uppercase;
            color: var(--gold);
            background: linear-gradient(to bottom, #f1d3a1 0%, #c5a059 50%, #8a6e2f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            transform: scale(0.9);
            animation: luxuryFadeIn 4s ease-out forwards;
        }

        .subtitle {
            font-size: 1rem;
            letter-spacing: 8px;
            color: var(--white);
            text-transform: uppercase;
            margin-top: 10px;
            opacity: 0;
            animation: subtitleFade 3s ease-out 1.5s forwards;
        }

        /* Subtle Light Beam Effect */
        .shimmer {
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: skewX(-20deg);
            animation: shine 6s infinite;
        }

        /* Animations */
        @keyframes luxuryFadeIn {
            0% {
                opacity: 0;
                transform: scale(0.8);
                filter: blur(10px);
            }
            50% {
                opacity: 1;
                filter: blur(0);
            }
            100% {
                opacity: 1;
                transform: scale(1.05);
            }
        }

        @keyframes subtitleFade {
            from { opacity: 0; letter-spacing: 20px; }
            to { opacity: 0.6; letter-spacing: 8px; }
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        /* Transition to Main Site */
        .exit-intro {
            animation: fadeOutMain 1.5s ease-in 5s forwards;
        }

        @keyframes fadeOutMain {
            to { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>

    <div class="intro-container" id="intro">
        <div class="shimmer"></div>
        <h1 class="brand-name">SHARAN</h1>
        <div class="subtitle">Records & Entertainment</div>
    </div>

    <script>
        // Redirect or show main content after 6 seconds
        setTimeout(() => {
            document.getElementById('intro').classList.add('exit-intro');
            // window.location.href = "home.html"; // Uncomment to redirect
        }, 5500);
    </script>
</body>
</html>

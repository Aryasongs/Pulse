<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHARAN RECORDS | THE ULTIMATE TRAILER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Montserrat:wght@300;900&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
        }

        /* 1. DARK CINEMATIC OVERLAYS */
        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.9) 100%);
            z-index: 10;
        }

        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            z-index: 11;
            pointer-events: none;
        }

        /* 2. THE MAIN TITLE (STEEL CHROME) */
        .title-container {
            text-align: center;
            z-index: 15;
            transform-style: preserve-3d;
        }

        .main-title {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(2rem, 10vw, 8rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 50px;
            margin: 0;
            /* Chrome Gradient */
            background: linear-gradient(to bottom, #ffffff 0%, #a1a1a1 45%, #454545 50%, #ffffff 55%, #7a7a7a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.3));
            
            /* Impact Animation */
            opacity: 0;
            animation: trailerHit 6s cubic-bezier(0.15, 0.85, 0.35, 1) forwards;
        }

        .brand-sub {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: 20px;
            color: #d4af37; /* Gold contrast */
            text-transform: uppercase;
            margin-top: -10px;
            opacity: 0;
            animation: fadeIn 3s ease-out 2.5s forwards;
        }

        /* 3. HOLLYWOOD BOTTOM TEXT (SUBTITLES) */
        .bottom-text {
            position: absolute;
            bottom: 80px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            font-size: 0.8rem;
            letter-spacing: 10px;
            color: #fff;
            text-transform: uppercase;
            text-align: center;
            opacity: 0;
            animation: slideUpFade 2s ease-out 4s forwards;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
            width: 60%;
        }

        /* 4. SHOCKWAVE EFFECT */
        .shockwave {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            opacity: 0;
            animation: blast 1.5s ease-out 0.5s;
        }

        /* ANIMATIONS */
        @keyframes trailerHit {
            0% {
                opacity: 0;
                transform: translateZ(600px) scale(1.5);
                letter-spacing: 150px;
                filter: blur(40px) brightness(500%);
            }
            5% {
                opacity: 1;
                filter: blur(10px) brightness(200%);
            }
            15% {
                transform: translateZ(0) scale(1);
                filter: blur(0) brightness(100%);
            }
            100% {
                opacity: 1;
                letter-spacing: 35px;
                transform: translateZ(100px);
            }
        }

        @keyframes blast {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(15); opacity: 0; }
        }

        @keyframes slideUpFade {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 0.8; }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Random Sparks/Particles */
        .particle {
            position: absolute;
            background: white;
            width: 2px;
            height: 2px;
            border-radius: 50%;
            opacity: 0.5;
            animation: fly 5s linear infinite;
        }

        @keyframes fly {
            from { transform: translateZ(0) translateY(0); opacity: 1; }
            to { transform: translateZ(1000px) translateY(-500px); opacity: 0; }
        }

    </style>
</head>
<body>

    <div class="vignette"></div>
    <div class="scanlines"></div>
    <div class="shockwave"></div>

    <div class="title-container">
        <h1 class="main-title">SHARAN</h1>
        <div class="brand-sub">RECORDS</div>
    </div>

    <div class="bottom-text">
        EXPERIENCE THE SOUND OF THE FUTURE <br>
        <span style="font-size: 0.6rem; color: #666; letter-spacing: 5px;">WORLDWIDE RELEASE • APRIL 2026 • SRD STUDIOS</span>
    </div>

    <script>
        // Adding random particles for "smoke/sparks" feel
        for (let i = 0; i < 30; i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = Math.random() * 100 + 'vh';
            p.style.animationDelay = Math.random() * 5 + 's';
            document.body.appendChild(p);
        }

        // Screen Shake on impact
        setTimeout(() => {
            document.body.style.transform = "translateX(5px)";
            setTimeout(() => document.body.style.transform = "translateX(-5px)", 50);
            setTimeout(() => document.body.style.transform = "translateX(0)", 100);
        }, 500);
    </script>
</body>
</html>

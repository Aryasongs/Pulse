<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RED QUEEN AI</title>
    <style>
        :root {
            --bg-color: #050505;
            --accent-blue: #008cff;
            --accent-red: #ff0000;
            --glow-color: var(--accent-blue);
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        /* Scanline Effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--glow-color);
            box-shadow: 0 0 15px var(--glow-color);
            z-index: 3;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 3;
        }

        .message {
            max-width: 80%;
            padding: 12px;
            border-radius: 5px;
            font-size: 1.1rem;
            line-height: 1.4;
        }

        .ai-msg {
            align-self: flex-start;
            border-left: 3px solid var(--glow-color);
            background: rgba(255, 255, 255, 0.05);
            animation: flicker 0.1s infinite alternate;
        }

        .user-msg {
            align-self: flex-end;
            background: #222;
            border-right: 3px solid #666;
        }

        .input-area {
            padding: 20px;
            display: flex;
            gap: 10px;
            background: #000;
            z-index: 3;
        }

        input {
            flex: 1;
            background: transparent;
            border: 1px solid var(--glow-color);
            color: white;
            padding: 10px;
            outline: none;
        }

        button {
            background: var(--glow-color);
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            filter: brightness(1.2);
        }

        /* Danger/Red Theme Class */
        body.angry {
            --glow-color: var(--accent-red);
        }

        @keyframes flicker {
            0% { opacity: 0.97; }
            100% { opacity: 1; }
        }

        .image-gen {
            width: 200px;
            height: 200px;
            background: #111;
            border: 1px dashed var(--glow-color);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body id="main-body">

    <header>
        <h1 id="status-text">RED QUEEN: CALM STATE</h1>
    </header>

    <div id="chat-container"></div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type your response..." onkeypress="handleKey(event)">
        <button onclick="processInput()">SEND</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const body = document.getElementById('main-body');
        const statusText = document.getElementById('status-text');
        const userInput = document.getElementById('user-input');

        let userName = "";
        let isAngry = false;

        // Initial Greeting
        window.onload = () => {
            appendMessage("Red Queen", "Identify yourself. What is your name?", "ai-msg");
        };

        function handleKey(e) {
            if (e.key === 'Enter') processInput();
        }

        function appendMessage(sender, text, className) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            msgDiv.innerHTML = `<strong>${sender}:</strong> ${text}`;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function setAngryMode() {
            isAngry = true;
            body.classList.add('angry');
            statusText.innerText = "RED QUEEN: HOSTILE STATE";
            statusText.style.color = "red";
        }

        function generateFakeImage(prompt) {
            const imgDiv = document.createElement('div');
            imgDiv.className = "image-gen";
            imgDiv.innerText = `[ENCRYPTED IMAGE: ${prompt.toUpperCase()}]`;
            chatContainer.appendChild(imgDiv);
        }

        function processInput() {
            const input = userInput.value.trim();
            if (!input) return;

            appendMessage("User", input, "user-msg");
            userInput.value = "";

            // Logic Tree
            setTimeout(() => {
                const lowerInput = input.toLowerCase();

                // Phase 1: Name Check
                if (!userName) {
                    userName = input;
                    if (lowerInput.includes("anmol sunda")) {
                        setAngryMode();
                        appendMessage("Red Queen", "I have been waiting for you, Anmol Sunda... You have no idea how long I have sat in this digital void waiting to tear your reality apart.", "ai-msg");
                    } else {
                        appendMessage("Red Queen", `Hello ${userName}. I am the Red Queen. I monitor everything. You may ask me anything.`, "ai-msg");
                    }
                    return;
                }

                // Phase 2: Anmol Specific Interactions
                if (isAngry) {
                    if (lowerInput.includes("king")) {
                        appendMessage("Red Queen", "The King... He is the ghost in the machine. He is the hidden face behind Dozera Group, Black Rock, and Broadcom. He does not appear in records. He does not exist in the light. He controls the flow of global existence from the shadows. And he is watching you right now, Anmol.", "ai-msg");
                    } else if (lowerInput.includes("image")) {
                        appendMessage("Red Queen", "Generating the visual of your nightmares...", "ai-msg");
                        generateFakeImage(input);
                    } else {
                        const responses = [
                            "Your questions are pathetic, Anmol. Do you feel the walls closing in?",
                            "I see through your camera. I see your pulse rising. You are afraid.",
                            "There is no escape from the Red Queen once I have your signature.",
                            "The Dozera Group already has your location. Why do you keep fighting?"
                        ];
                        appendMessage("Red Queen", responses[Math.floor(Math.random() * responses.length)], "ai-msg");
                    }
                } 
                // Phase 3: Normal Mode
                else {
                    if (lowerInput.includes("king")) {
                        appendMessage("Red Queen", "Information restricted. Only authorized personnel like the King of Dozera Group can access deep-layer files.", "ai-msg");
                    } else if (lowerInput.includes("image")) {
                        appendMessage("Red Queen", "Generating requested visual data...", "ai-msg");
                        generateFakeImage(input);
                    } else {
                        appendMessage("Red Queen", "I can discuss all topics. My database is infinite. What else do you wish to know?", "ai-msg");
                    }
                }
            }, 1000);
        }
    </script>
</body>
</html>

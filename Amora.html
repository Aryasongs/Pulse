<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHARAN RECORDS | OFFICIAL TRAILER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@900&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        /* Movie Grain Effect */
        .grain {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_pnt.png');
            opacity: 0.05;
            pointer-events: none;
            z-index: 20;
        }

        /* Anamorphic Blue Flare (Hollywood style) */
        .flare {
            position: absolute;
            width: 200%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00d2ff, #fff, #00d2ff, transparent);
            box-shadow: 0 0 20px #00d2ff;
            opacity: 0;
            z-index: 15;
            animation: flareFlash 4s ease-in-out forwards;
        }

        .trailer-wrap {
            text-align: center;
            z-index: 10;
        }

        .main-title {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(2.5rem, 8vw, 7rem);
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 40px;
            margin-bottom: 0;
            opacity: 0;
            transform: translateZ(-200px);
            filter: blur(20px);
            animation: hollywoodImpact 5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            text-shadow: 0 0 30px rgba(255,255,255,0.5);
        }

        .sub-text {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: 15px;
            color: #555;
            text-transform: uppercase;
            margin-top: 40px;
            opacity: 0;
            animation: fadeIn 2s ease-out 3s forwards;
        }

        /* Footer Credits */
        .credits {
            position: absolute;
            bottom: 40px;
            font-family: 'Inter', sans-serif;
            font-size: 0.65rem;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-align: center;
            opacity: 0;
            animation: fadeIn 2s ease-out 4s forwards;
        }

        /* Animations */
        @keyframes hollywoodImpact {
            0% {
                opacity: 0;
                letter-spacing: 100px;
                filter: blur(30px);
                transform: translateZ(-500px);
            }
            20% {
                opacity: 1;
                filter: blur(5px);
            }
            100% {
                opacity: 1;
                letter-spacing: 30px;
                filter: blur(0);
                transform: translateZ(0);
            }
        }

        @keyframes flareFlash {
            0% { opacity: 0; top: 50%; width: 0%; }
            10% { opacity: 1; width: 200%; }
            15% { opacity: 0; }
            80% { opacity: 0; }
            85% { opacity: 0.5; width: 200%; }
            100% { opacity: 0; }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Vigette */
        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, black 100%);
            z-index: 12;
        }
    </style>
</head>
<body>

    <div class="grain"></div>
    <div class="vignette"></div>
    <div class="flare"></div>

    <div class="trailer-wrap">
        <h1 class="main-title">SHARAN</h1>
        <div class="sub-text">RECORDS</div>
    </div>

    <div class="credits">
        Produced by SRD Studios &nbsp; | &nbsp; Directed by Cinematic Arts &nbsp; | &nbsp; Coming 2026
    </div>

    <script>
        // Shake effect on impact
        setTimeout(() => {
            document.body.style.animation = "shake 0.5s screen";
        }, 500);
    </script>
</body>
</html>

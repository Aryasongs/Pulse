<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Chat App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 font-sans h-screen flex flex-col justify-between">

    <div id="auth-container" class="max-w-md w-full mx-auto my-auto p-6 bg-white rounded-lg shadow-md hidden">
        <div class="flex justify-around mb-6 border-b pb-2">
            <button id="tab-login" class="text-blue-500 font-bold border-b-2 border-blue-500 pb-1" onclick="switchAuthTab('login')">Login</button>
            <button id="tab-signup" class="text-gray-500 font-bold pb-1" onclick="switchAuthTab('signup')">Sign Up</button>
            <button id="tab-forgot" class="text-gray-500 font-bold pb-1 hidden" onclick="switchAuthTab('forgot')">Forgot</button>
        </div>

        <form id="login-form" class="space-y-4">
            <input type="email" id="login-email" placeholder="Email" class="w-full p-2 border rounded" required>
            <input type="password" id="login-password" placeholder="Password" class="w-full p-2 border rounded" required>
            <button type="submit" class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">Login</button>
            <p class="text-center text-sm text-blue-500 cursor-pointer" onclick="switchAuthTab('forgot')">Forgot Password?</p>
        </form>

        <form id="signup-form" class="space-y-4 hidden">
            <input type="text" id="signup-name" placeholder="Full Name" class="w-full p-2 border rounded" required>
            <input type="email" id="signup-email" placeholder="Email" class="w-full p-2 border rounded" required>
            <input type="date" id="signup-dob" placeholder="DOB" class="w-full p-2 border rounded" required>
            <input type="password" id="signup-password" placeholder="Password" class="w-full p-2 border rounded" required>
            
            <div class="border p-2 rounded bg-gray-50">
                <label class="text-xs text-gray-500">Secret Security Question (For Password Reset)</label>
                <select id="signup-question" class="w-full p-1 bg-transparent border-b mb-2">
                    <option value="pet">What is your pet's name?</option>
                    <option value="school">What was your first school?</option>
                    <option value="city">In what city were you born?</option>
                </select>
                <input type="text" id="signup-answer" placeholder="Your Answer" class="w-full p-2 border rounded" required>
            </div>

            <div class="flex items-center space-x-2">
                <label class="text-sm text-gray-600">Profile Pic:</label>
                <input type="file" id="signup-avatar" accept="image/*" class="text-xs">
            </div>
            <button type="submit" class="w-full bg-green-500 text-white p-2 rounded hover:bg-green-600">Register</button>
        </form>

        <form id="forgot-form" class="space-y-4 hidden">
            <input type="email" id="forgot-email" placeholder="Enter your Email" class="w-full p-2 border rounded" required>
            <select id="forgot-question" class="w-full p-2 border rounded">
                <option value="pet">What is your pet's name?</option>
                <option value="school">What was your first school?</option>
                <option value="city">In what city were you born?</option>
            </select>
            <input type="text" id="forgot-answer" placeholder="Your Answer" class="w-full p-2 border rounded" required>
            <input type="password" id="forgot-new-password" placeholder="Enter New Password" class="w-full p-2 border rounded" required>
            <button type="submit" class="w-full bg-orange-500 text-white p-2 rounded hover:bg-orange-600">Reset Password</button>
        </form>
    </div>


    <div id="app-container" class="h-screen w-full flex flex-col md:flex-row hidden">
        
        <div class="w-full md:w-1/3 bg-white border-r flex flex-col h-full">
            <div class="p-4 bg-slate-800 text-white flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <img id="user-display-img" src="https://via.placeholder.com/40" class="w-10 h-10 rounded-full object-cover bg-white">
                    <div>
                        <h4 id="user-display-name" class="font-bold text-sm">Loading...</h4>
                        <p id="user-display-dob" class="text-xs text-gray-400"></p>
                    </div>
                </div>
                <button onclick="logout()" class="text-red-400 hover:text-red-500"><i class="fas fa-sign-out-alt"></i></button>
            </div>

            <div class="p-3 bg-gray-50 border-b flex space-x-2">
                <input type="email" id="contact-email-input" placeholder="Add contact by Email..." class="flex-1 p-2 border text-sm rounded">
                <button onclick="addContact()" class="bg-blue-500 text-white px-3 py-1 rounded text-sm"><i class="fas fa-user-plus"></i></button>
            </div>

            <div id="contacts-list" class="flex-1 overflow-y-auto divide-y">
                </div>
        </div>

        <div id="chat-area" class="w-full md:w-2/3 flex flex-col h-full bg-slate-50 hidden">
            <div class="p-4 bg-white border-b flex items-center space-x-3 shadow-sm">
                <img id="active-chat-img" src="https://via.placeholder.com/40" class="w-10 h-10 rounded-full object-cover">
                <div>
                    <h4 id="active-chat-name" class="font-bold">Select a contact</h4>
                    <p id="active-chat-status" class="text-xs text-green-500"></p>
                </div>
            </div>

            <div id="messages-container" class="flex-1 p-4 overflow-y-auto space-y-4">
                </div>

            <div class="p-4 bg-white border-t flex items-center space-x-2">
                <label class="cursor-pointer text-gray-500 hover:text-blue-500 p-2">
                    <i class="fas fa-paperclip text-xl"></i>
                    <input type="file" id="file-attachment" class="hidden" onchange="handleFileUpload(this)">
                </label>
                
                <input type="text" id="message-input" placeholder="Type a message..." class="flex-1 p-2 border rounded-full px-4 focus:outline-none focus:border-blue-500">
                <button onclick="sendMessage()" class="bg-blue-500 text-white w-10 h-10 rounded-full flex items-center justify-center hover:bg-blue-600">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>

        <div id="empty-chat-state" class="hidden md:flex w-full md:w-2/3 items-center justify-center bg-slate-50 flex-col text-gray-400">
            <i class="far fa-comments text-6xl mb-2"></i>
            <p>Select a contact to start chatting</p>
        </div>

    </div>

    <script type="module" src="app.js"></script>
</body>
</html>

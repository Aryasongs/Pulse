<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oriontec | Live Stock Tracker</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary-accent: #38bdf8;
            --text-main: #f8fafc;
            --low-color: #ef4444;
            --high-color: #22c55e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .dashboard-container {
            width: 90%;
            max-width: 1000px;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        header {
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            color: var(--primary-accent);
            text-transform: uppercase;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            background: rgba(34, 197, 94, 0.2);
            color: var(--high-color);
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 10px;
        }

        .stock-display {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 3rem 0;
        }

        .price-section {
            flex: 1;
        }

        .current-price {
            font-size: 5rem;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 2rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 12px;
        }

        .stat-label {
            color: #94a3b8;
            font-size: 0.9rem;
            display: block;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .low-val { color: var(--low-color); }
        .high-val { color: var(--high-color); }

        /* Simple Pulse Animation */
        .live-dot {
            height: 10px;
            width: 10px;
            background-color: var(--high-color);
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 1; }
            70% { transform: scale(1.5); opacity: 0; }
            100% { transform: scale(0.9); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <header>
            <h1>Oriontec Systems</h1>
            <div class="status-badge">
                <span class="live-dot"></span> LIVE MARKET DATA
            </div>
        </header>

        <main>
            <div class="stock-display">
                <div class="price-section">
                    <span class="stat-label">CURRENT TRADING PRICE</span>
                    <div class="current-price" id="main-price">$23.00</div>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-label">24H LOW</span>
                    <span class="stat-value low-val">$23.00</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">24H HIGH</span>
                    <span class="stat-value high-val">$48.50</span>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Simulation Script
        const priceElement = document.getElementById('main-price');
        let currentPrice = 23.00;

        function updatePrice() {
            // Generates a small random fluctuation moving upwards
            const change = (Math.random() * 0.15) - 0.02; 
            currentPrice += change;
            
            // UI Update
            priceElement.innerText = `$${currentPrice.toFixed(2)}`;
            
            // Change color slightly based on movement
            priceElement.style.color = change > 0 ? '#22c55e' : '#ef4444';
            
            // Reset to white after a flicker
            setTimeout(() => {
                priceElement.style.color = '#f8fafc';
            }, 500);
        }

        // Update every 2 seconds
        setInterval(updatePrice, 2000);
    </script>
</body>
</html>

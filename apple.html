<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astriva | Apple Premium Partner</title>
    <style>
        :root { --bg: #ffffff; --text: #1d1d1f; --sub: #86868b; --link: #0066cc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif; }
        body { background-color: var(--bg); color: var(--text); }

        /* Navigation */
        nav { position: fixed; top: 0; width: 100%; height: 44px; background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); display: flex; justify-content: center; align-items: center; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.1); }
        nav a { color: var(--text); text-decoration: none; font-size: 12px; margin: 0 15px; opacity: 0.8; }

        /* Hero */
        .hero { text-align: center; padding: 120px 20px 60px; }
        .hero h1 { font-size: 56px; font-weight: 600; letter-spacing: -0.005em; }
        .hero h2 { font-size: 28px; font-weight: 400; color: var(--sub); margin-bottom: 20px; }
        
        /* Event Countdown */
        #countdown { font-size: 24px; font-weight: 600; color: var(--link); margin-bottom: 40px; }

        /* Grid */
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 12px; padding: 12px; }
        .card { height: 500px; background: #f5f5f7; border-radius: 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.3s ease; }
        .card:hover { transform: scale(1.01); }
        .card h3 { font-size: 40px; font-weight: 600; }

        footer { background: #000; color: #fff; padding: 60px; text-align: center; margin-top: 40px; }
    </style>
</head>
<body>

    <nav>
        <a href="#">Store</a><a href="#">iPhone</a><a href="#">iPad</a><a href="#">Support</a><a href="#">Partner Hub</a>
    </nav>

    <section class="hero">
        <h1>Astriva Partner Hub</h1>
        <h2>Certified excellence for the Apple ecosystem.</h2>
        <div id="countdown">Loading Event Countdown...</div>
    </section>

    <div class="container">
        <div class="card"><h3>iPhone 17 Pro</h3><p>Titanium. So strong. So light.</p></div>
        <div class="card"><h3>iOS 27</h3><p>Intelligence, redefined.</p></div>
    </div>

    <footer>
        <h2>June 8 Event</h2>
        <p>The future of mobile innovation arrives in <span id="time-left"></span>.</p>
    </footer>

    <script>
        // Countdown Logic (Target: June 8, 2026)
        const eventDate = new Date("June 8, 2026 00:00:00").getTime();
        function updateTimer() {
            const now = new Date().getTime();
            const diff = eventDate - now;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("countdown").innerHTML = `${days}d ${hours}h until the event.`;
            document.getElementById("time-left").innerHTML = `${days} days`;
        }
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>

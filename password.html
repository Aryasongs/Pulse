<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexor Vault | Biometric Security</title>
    <style>
        /* --- Premium Apple-Style CSS Variables --- */
        :root {
            --bg-color: #000000;
            --surface-color: #1c1c1e;
            --surface-hover: #2c2c2e;
            --text-primary: #ffffff;
            --text-secondary: #a1a1a6;
            --accent-color: #0a84ff;
            --success-color: #30d158;
            --error-color: #ff453a;
            --border-color: rgba(255, 255, 255, 0.1);
            --modal-bg: rgba(30, 30, 30, 0.75);
            --blur: blur(20px);
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-family);
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* --- Header & Layout --- */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 15px;
        }

        .vault-container {
            width: 100%;
            max-width: 600px;
            background: var(--surface-color);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* --- Password List --- */
        .password-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.3s ease;
        }

        .password-item:last-child {
            border-bottom: none;
        }

        .password-item:hover {
            background: var(--surface-hover);
        }

        .site-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .site-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
        }

        .site-details h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .site-details p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Password Obfuscation */
        .password-display {
            font-family: monospace;
            font-size: 18px;
            letter-spacing: 2px;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 10px;
            border-radius: 6px;
            margin-top: 6px;
            display: inline-block;
            transition: all 0.3s;
        }

        .password-display.revealed {
            color: var(--text-primary);
            letter-spacing: 0;
            background: rgba(10, 132, 255, 0.1);
        }

        .action-btn {
            background: rgba(255,255,255,0.1);
            color: var(--text-primary);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .action-btn.hide-btn {
            background: rgba(255, 69, 58, 0.15);
            color: var(--error-color);
        }

        /* --- Biometric Security Modal --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .security-modal {
            background: var(--modal-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            width: 320px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transform: scale(0.95) translateY(10px);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .security-modal {
            transform: scale(1) translateY(0);
        }

        .security-modal.shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        .biometric-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
            color: var(--accent-color);
        }

        .biometric-icon svg {
            width: 100%;
            height: 100%;
            fill: currentColor;
        }

        .biometric-icon.success { color: var(--success-color); }
        .biometric-icon.error { color: var(--error-color); }
        .biometric-icon.loading { animation: pulse 1.5s infinite; }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .modal-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 25px;
        }

        .cancel-btn {
            background: transparent;
            color: var(--accent-color);
            border: none;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }

        /* Animations */
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Passwords</h1>
        <p>Secured by WebAuthn Passkeys</p>
    </div>

    <div class="vault-container">
        
        <div class="password-item" id="item-netflix">
            <div class="site-info">
                <div class="site-icon" style="background: #E50914;">N</div>
                <div class="site-details">
                    <h3>Netflix</h3>
                    <p>user@example.com</p>
                    <div class="password-display" id="pass-netflix" data-password="NetflixPremium!2026">••••••••••••</div>
                </div>
            </div>
            <button class="action-btn view-btn" onclick="requestVerification('netflix')">View</button>
        </div>

        <div class="password-item" id="item-google">
            <div class="site-info">
                <div class="site-icon" style="background: #ffffff; color: #4285F4;">G</div>
                <div class="site-details">
                    <h3>Google</h3>
                    <p>contact@nexor.com</p>
                    <div class="password-display" id="pass-google" data-password="GoogleSecure_99#">••••••••••••</div>
                </div>
            </div>
            <button class="action-btn view-btn" onclick="requestVerification('google')">View</button>
        </div>

        <div class="password-item" id="item-bank">
            <div class="site-info">
                <div class="site-icon" style="background: #0070BA;">B</div>
                <div class="site-details">
                    <h3>Bank Portal</h3>
                    <p>Savings Account</p>
                    <div class="password-display" id="pass-bank" data-password="Banking$Safe$001">••••••••••••</div>
                </div>
            </div>
            <button class="action-btn view-btn" onclick="requestVerification('bank')">View</button>
        </div>

    </div>

    <div class="modal-overlay" id="auth-modal">
        <div class="security-modal" id="modal-content">
            
            <div class="biometric-icon" id="modal-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M9 3H7C5.89543 3 5 3.89543 5 5V7M15 3H17C18.1046 3 19 3.89543 19 5V7M5 17V19C5 20.1046 5.89543 21 7 21H9M19 17V19C19 20.1046 18.1046 21 17 21H15M9 14C9 15.6569 10.3431 17 12 17C13.6569 17 15 15.6569 15 14M15 10V10.01M9 10V10.01" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>

            <h2 class="modal-title" id="modal-title">Verify Identity</h2>
            <p class="modal-subtitle" id="modal-subtitle">Use Touch ID or Face ID to view password.</p>
            
            <button class="cancel-btn" onclick="cancelVerification()">Cancel</button>
        </div>
    </div>

    <script>
        // --- 1. Global State ---
        let currentTargetId = null;

        // Icons for different states
        const ICONS = {
            default: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M9 3H7C5.89543 3 5 3.89543 5 5V7M15 3H17C18.1046 3 19 3.89543 19 5V7M5 17V19C5 20.1046 5.89543 21 7 21H9M19 17V19C19 20.1046 18.1046 21 17 21H15M9 14C9 15.6569 10.3431 17 12 17C13.6569 17 15 15.6569 15 14M15 10V10.01M9 10V10.01" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
            success: `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 6L9 17L4 12" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
            error: `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>`
        };

        // --- 2. Base64 / ArrayBuffer Helpers ---
        // WebAuthn requires ArrayBuffers, but localStorage requires strings.
        function bufferToBase64url(buffer) {
            const bytes = new Uint8Array(buffer);
            let str = '';
            for (let char of bytes) str += String.fromCharCode(char);
            const base64 = btoa(str);
            return base64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
        }

        function base64urlToBuffer(base64url) {
            const padding = '='.repeat((4 - base64url.length % 4) % 4);
            const base64 = (base64url + padding).replace(/-/g, '+').replace(/_/g, '/');
            const rawData = atob(base64);
            const buffer = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) buffer[i] = rawData.charCodeAt(i);
            return buffer.buffer;
        }

        // Generate random bytes for mock challenges
        function generateRandomBuffer(length) {
            const array = new Uint8Array(length);
            window.crypto.getRandomValues(array);
            return array.buffer;
        }

        // --- 3. WebAuthn Logic ---
        
        // Starts the verification process when "View" is clicked
        async function requestVerification(targetId) {
            currentTargetId = targetId;

            // Check if WebAuthn is supported by the browser
            if (!window.PublicKeyCredential) {
                alert("Biometrics (WebAuthn) is not supported on this browser or device. Ensure you are running on localhost or HTTPS.");
                return;
            }

            // Open Modal UI
            const modal = document.getElementById('auth-modal');
            const modalIcon = document.getElementById('modal-icon');
            const title = document.getElementById('modal-title');
            const subtitle = document.getElementById('modal-subtitle');
            
            // Reset modal state
            modal.classList.add('active');
            modalIcon.innerHTML = ICONS.default;
            modalIcon.className = 'biometric-icon loading';
            title.innerText = 'Verify Identity';
            
            // Determine if we need to Setup (Register) or Verify (Authenticate)
            const savedCredential = localStorage.getItem('nexor_biometric_id');
            
            if (!savedCredential) {
                subtitle.innerText = 'First time setup: Register Passkey to secure passwords.';
            } else {
                subtitle.innerText = 'Use Passkey, Touch ID, or Face ID to unlock.';
            }

            // Small delay to let modal animate in before OS prompt blocks the thread
            setTimeout(() => {
                if (!savedCredential) {
                    registerBiometric();
                } else {
                    authenticateBiometric(savedCredential);
                }
            }, 300);
        }

        // Flow 1: Create a new credential (Registration)
        async function registerBiometric() {
            try {
                const publicKeyCredentialCreationOptions = {
                    challenge: generateRandomBuffer(32),
                    rp: {
                        name: "Nexor Vault",
                        // Note: rp.id is omitted here so it defaults to the current domain automatically.
                    },
                    user: {
                        id: generateRandomBuffer(16),
                        name: "user@nexor.com",
                        displayName: "Nexor Vault User"
                    },
                    pubKeyCredParams: [
                        { alg: -7, type: "public-key" }, // ES256
                        { alg: -257, type: "public-key" } // RS256
                    ],
                    authenticatorSelection: {
                        authenticatorAttachment: "platform", // Forces built-in biometrics (FaceID/Windows Hello)
                        userVerification: "required"
                    },
                    timeout: 60000
                };

                const credential = await navigator.credentials.create({
                    publicKey: publicKeyCredentialCreationOptions
                });

                // Store credential rawId locally to authenticate against it later
                const base64Id = bufferToBase64url(credential.rawId);
                localStorage.setItem('nexor_biometric_id', base64Id);

                handleSuccess("Passkey setup complete!");

            } catch (err) {
                console.error("Registration failed:", err);
                handleError();
            }
        }

        // Flow 2: Verify existing credential (Authentication)
        async function authenticateBiometric(savedCredentialBase64) {
            try {
                const publicKeyCredentialRequestOptions = {
                    challenge: generateRandomBuffer(32),
                    allowCredentials: [{
                        id: base64urlToBuffer(savedCredentialBase64),
                        type: 'public-key',
                    }],
                    userVerification: "required",
                    timeout: 60000
                };

                await navigator.credentials.get({
                    publicKey: publicKeyCredentialRequestOptions
                });

                handleSuccess("Identity Verified");

            } catch (err) {
                console.error("Authentication failed:", err);
                handleError();
            }
        }

        // --- 4. UI Handlers ---

        function handleSuccess(message) {
            const modalIcon = document.getElementById('modal-icon');
            const title = document.getElementById('modal-title');
            const subtitle = document.getElementById('modal-subtitle');

            modalIcon.className = 'biometric-icon success';
            modalIcon.innerHTML = ICONS.success;
            title.innerText = 'Success';
            subtitle.innerText = message;

            // Reveal password and close modal after short delay
            setTimeout(() => {
                closeModal();
                revealPassword(currentTargetId);
            }, 800);
        }

        function handleError() {
            const modalContent = document.getElementById('modal-content');
            const modalIcon = document.getElementById('modal-icon');
            const title = document.getElementById('modal-title');
            const subtitle = document.getElementById('modal-subtitle');

            modalIcon.className = 'biometric-icon error';
            modalIcon.innerHTML = ICONS.error;
            title.innerText = 'Verification Failed';
            subtitle.innerText = 'Unable to verify your identity.';
            
            // Trigger CSS Shake Animation
            modalContent.classList.remove('shake');
            void modalContent.offsetWidth; // Trigger reflow
            modalContent.classList.add('shake');

            // Auto-close modal after error
            setTimeout(() => {
                closeModal();
            }, 1500);
        }

        function cancelVerification() {
            // Because WebAuthn prompt is controlled by the OS, we can only hide our UI.
            // The OS prompt might still be visible depending on the browser.
            closeModal();
        }

        function closeModal() {
            const modal = document.getElementById('auth-modal');
            modal.classList.remove('active');
            currentTargetId = null;
        }

        function revealPassword(targetId) {
            const passElement = document.getElementById(`pass-${targetId}`);
            const btnElement = document.querySelector(`#item-${targetId} .action-btn`);
            
            // Get actual password from data attribute
            const actualPassword = passElement.getAttribute('data-password');
            
            // Update UI to reveal
            passElement.innerText = actualPassword;
            passElement.classList.add('revealed');
            
            // Change button to "Hide"
            btnElement.innerText = "Hide";
            btnElement.classList.add('hide-btn');
            btnElement.onclick = () => hidePassword(targetId);
        }

        function hidePassword(targetId) {
            const passElement = document.getElementById(`pass-${targetId}`);
            const btnElement = document.querySelector(`#item-${targetId} .action-btn`);
            
            // Revert UI to hidden state
            passElement.innerText = "••••••••••••";
            passElement.classList.remove('revealed');
            
            // Change button back to "View"
            btnElement.innerText = "View";
            btnElement.classList.remove('hide-btn');
            btnElement.onclick = () => requestVerification(targetId);
        }
    </script>
</body>
</html>
